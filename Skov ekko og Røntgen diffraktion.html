<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skovens Akustik - Bølgespredning med Lyd</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b1a10;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #2e8b57;
            pointer-events: none;
            z-index: 10;
        }
        h2 { margin: 0 0 10px 0; color: #4db8ff; }
        p { margin: 5px 0; line-height: 1.5; font-size: 14px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="info-panel">
        <h2>3D Spredning & Ekkotæthed (Nu med lyd)</h2>
        <p><strong>Klik med musen</strong> for at udløse et håndklap.</p>
        <p>Du vil høre det primære klap, efterfulgt af en <br>sværm af mikroskopiske, asynkrone ekkoer<br>(flutter-ekko) fra stammerne.</p>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // --- LYD OPSÆTNING (Web Audio API - omskrevet for at undgå formateringsfejl) ---
        let audioCtx;
        if (window.AudioContext) {
            audioCtx = new window.AudioContext();
        } else {
            if (window.webkitAudioContext) {
                audioCtx = new window.webkitAudioContext();
            }
        }

        // Funktion til at syntetisere et "klap" eller et ekko via hvid støj
        function playNoiseBurst(volume, duration, panX) {
            if (!audioCtx) { return; }
            
            // Browser-sikkerhed kræver, at AudioContext genoptages ved bruger-interaktion
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const bufferSize = Math.floor(audioCtx.sampleRate * duration);
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            // Fyld bufferen op med tilfældig hvid støj
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;

            // Styr lyden med et eksponentielt henfald for at få det til at lyde som et skarpt smæld
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            let targetNode = gainNode;

            // Panorering (højre/venstre) baseret på træets position
            if (audioCtx.createStereoPanner) {
                const panner = audioCtx.createStereoPanner();
                panner.pan.value = panX;
                gainNode.connect(panner);
                targetNode = panner;
            }

            // Forbind lyd-noderne og afspil
            targetNode.connect(audioCtx.destination);
            noiseSource.start();
        }
        // --- SLUT LYD OPSÆTNING ---

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const trees = new Array();
        const numTrees = 180; 
        for (let i = 0; i < numTrees; i++) {
            trees.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 4 + 2 
            });
        }

        let waves = new Array();
        const waveSpeed = 2.5;

        window.addEventListener('mousedown', function(e) {
            // Afspil det oprindelige håndklap (Høj volumen, længere varighed, centreret)
            playNoiseBurst(0.8, 0.15, 0); 

            waves.push({
                x: e.clientX,
                y: e.clientY,
                radius: 0,
                energy: 1.0,        
                isPrimary: true,    
                hitTrees: new Set() 
            });
        });

        function animate() {
            ctx.fillStyle = 'rgba(11, 26, 16, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            trees.forEach(function(tree) {
                ctx.beginPath();
                ctx.arc(tree.x, tree.y, tree.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#3cb371';
                ctx.fill();
                ctx.strokeStyle = '#2e8b57';
                ctx.stroke();
            });

            for (let i = waves.length - 1; i >= 0; i--) {
                let w = waves[i];
                
                w.radius += waveSpeed;
                
                if (w.isPrimary) {
                    w.energy -= 0.003;
                } else {
                    w.energy -= 0.008;
                }

                if (w.energy <= 0) {
                    waves.splice(i, 1);
                    continue;
                }
                
                if (w.radius > Math.max(canvas.width, canvas.height)) {
                    waves.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
                
                if (w.isPrimary) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, ' + w.energy + ')';
                    ctx.lineWidth = 2;
                } else {
                    ctx.strokeStyle = 'rgba(77, 184, 255, ' + (w.energy * 0.7) + ')';
                    ctx.lineWidth = 1;
                }
                ctx.stroke();

                if (w.isPrimary) {
                    trees.forEach(function(tree, index) {
                        if (!w.hitTrees.has(index)) {
                            const dx = tree.x - w.x;
                            const dy = tree.y - w.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            // Tjek om bølgefronten rammer træet
                            if (dist < w.radius + tree.radius) {
                                if (dist > w.radius - waveSpeed * 2) {
                                    w.hitTrees.add(index);
                                    
                                    // Udregn stereopanorering (-1 er fuld venstre, 1 er fuld højre)
                                    let pan = (tree.x / canvas.width) * 2 - 1;
                                    
                                    // Afspil et ekko. Lydstyrken gøres afhængig af bølgefrontens energi
                                    let echoVolume = w.energy * 0.04; 
                                    playNoiseBurst(echoVolume, 0.05, pan);

                                    waves.push({
                                        x: tree.x,
                                        y: tree.y,
                                        radius: tree.radius,
                                        energy: w.energy * 0.4, 
                                        isPrimary: false
                                    });
                                }
                            }
                        }
                    });
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
