
<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newton's Cannon by Michael Grant. 2014-10-18 (Web Replica)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #d4d0c8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
      .vb6-window {
            background-color: #f0f0f0;
            border: 2px solid #a0a0a0;
            padding: 15px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            width: 100%;
            box-sizing: border-box;
        }
      .top-bar { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
      .top-bar > div { display: flex; flex-direction: column; font-size: 12px; }
      .btn { 
            padding: 8px 15px; 
            font-size: 13px; 
            cursor: pointer; 
            background: #e1e1e1; 
            border: 1px solid #777; 
            border-radius: 3px; 
            min-width: 70px;
        }
      .btn:active { background: #ccc; }
      .readouts { 
            display: flex; 
            gap: 20px; 
            font-size: 12px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid #ccc; 
            flex-wrap: wrap; 
        }
      .readouts > div { display: flex; flex-direction: column; }
      .readouts span.val { font-weight: bold; margin-top: 4px; }
        input[type=text], input[type=number] { padding: 3px; border: 1px inset #ccc; font-size: 12px; }

      .main-area { display: flex; flex-wrap: wrap; gap: 20px; }
        
      .canvas-container {
            background-color: #f5f5f5;
            border: 2px inset #d0d0d0;
            width: 450px;
            height: 450px;
            position: relative;
            flex-shrink: 0;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
      .controls-right { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 250px; }
      .toggle-btns { display: flex; flex-direction: column; gap: 10px; align-items: flex-start;}
        
      .sliders-container { display: flex; justify-content: space-between; height: 200px; margin-top: 10px; }
      .v-slider-group { display: flex; flex-direction: column; align-items: center; font-size: 11px; }
      .v-slider-group span { margin-bottom: 5px; font-weight: bold; }
        
        input[type=range][orient=vertical] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 20px;
            height: 150px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body { padding: 5px; }
          .main-area { flex-direction: column; }
          .canvas-container { 
                width: 100%; 
                height: auto;
                aspect-ratio: 1 / 1; 
                max-height: 45vh; /* Sikrer at man kan se hele jorden på små skærme */
            }
          .sliders-container { height: 160px; }
            input[type=range][orient=vertical] { height: 100px; }
        }
    </style>
</head>
<body>
    <div class="vb6-window">
        <div class="top-bar">
            <button class="btn" id="btnStart">Start</button>
            <button class="btn" id="btnStop">Stop</button>
            <div><span>Delay</span><input type="text" id="inpDelay" value="10000" style="width:60px;"></div>
            <div><span>Mass of Earth [10^24 kg]</span><span style="font-weight:bold; margin-top:4px;">5.97219</span></div>
            <div style="flex-grow:1;"></div>
            <button class="btn" id="btnReset">Reset</button>
        </div>
        
        <div class="readouts">
            <div><span>Gravitational konstant [10^11]</span><span class="val">6.6738</span></div>
            <div><span>Time Increment [0.01 s]</span><input type="number" id="inpTimeInc" value="100" style="width:50px;"></div>
            <div><span>Time [s]</span><span class="val" id="lblTime">Blank</span></div>
            <div><span>Apogee [km]</span><span class="val" id="lblApogee">7371</span></div>
            <div><span>Perigee [km]</span><span class="val" id="lblPerigee">7371</span></div>
            <div><span>Height [km]</span><span class="val" id="lblHeightTop">1000</span></div>
        </div>

        <div class="main-area">
            <div class="canvas-container">
                <canvas id="trailCanvas" width="1000" height="1000"></canvas>
                <canvas id="simCanvas" width="1000" height="1000"></canvas>
            </div>

            <div class="controls-right">
                <div class="toggle-btns">
                    <button class="btn" id="btnCollision" style="width:160px;">Collision with Earth</button>
                    <button class="btn" id="btnPath" style="width:160px;">Don't s show path</button>
                </div>
                
                <div style="text-align: right; font-size: 11px; margin-top: -30px;">
                    <span>Power</span><br><span id="valPower" style="font-weight:bold;">2</span>
                    <br><input type="range" id="sldPower" orient="vertical" min="1.97" max="2.03" step="0.01" value="2" style="height: 60px;">
                </div>

                <div class="sliders-container">
                    <div class="v-slider-group">
                        <span>Height [km]</span><span id="valHeight">1000</span>
                        <input type="range" id="sldHeight" orient="vertical" min="0" max="30000" step="10" value="1000">
                    </div>
                    <div class="v-slider-group">
                        <span>Radius [km]</span><span id="valRadius">6371</span>
                        <input type="range" id="sldRadius" orient="vertical" min="1000" max="10000" step="1" value="6371">
                    </div>
                    <div class="v-slider-group">
                        <span>Angle [deg]</span><span id="valAngle">0</span>
                        <input type="range" id="sldAngle" orient="vertical" min="-90" max="90" step="1" value="0">
                    </div>
                    <div class="v-slider-group">
                        <span>Speed [m/s]</span><span id="valSpeed">7200</span>
                        <input type="range" id="sldSpeed" orient="vertical" min="0" max="12000" step="10" value="7200">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // -------------------------------------------------------------
        // Exact Translation of VB6 Physics Engine and Logic
        // -------------------------------------------------------------
        
        const G_Const = 6.6738e-11;
        const Mass_Const = 5.97219e24;
        const Pi = 3.14159265358979;

        // Form Variables
        let Continue = false;
        let Tally = 1; 
        let Path = 1; 
        let Power = 2;
        let OrbitTid = 0;
        let apogee = 0;
        let perigee = Math.pow(10, 15);
        
        let posx = 0, posy = 0;
        let hastx = 0, hasty = 0;
        let accx = 0, accy = 0;
        let EarthRadius = 6371000;
        let scala = 1;
        let tid = 1;

        // DOM Canvas Contexts
        const trailCtx = document.getElementById('trailCanvas').getContext('2d', { alpha: false });
        const simCtx = document.getElementById('simCanvas').getContext('2d');
        
        // DOM Elements
        const lblTime = document.getElementById('lblTime');
        const lblApogee = document.getElementById('lblApogee');
        const lblPerigee = document.getElementById('lblPerigee');
        const lblHeightTop = document.getElementById('lblHeightTop');
        const inpDelay = document.getElementById('inpDelay');
        const inpTimeInc = document.getElementById('inpTimeInc');

        function GetStartPositions() {
            const radius_km = parseFloat(document.getElementById('sldRadius').value);
            const height_km = parseFloat(document.getElementById('sldHeight').value);
            EarthRadius = radius_km * 1000;
            
            // Setting a fixed visual size for the Earth to guarantee the orbit fits on the canvas
            const EarthShpHeight = 220; 
            scala = (2 * EarthRadius) / EarthShpHeight;
            
            posx = 0;
            // In the original VB6 coordinate system, Y extends downwards
            posy = -EarthRadius - (height_km * 1000);
        }

        function ApogeePerigee() {
            let dist = Math.sqrt(posx*posx + posy*posy);
            lblHeightTop.innerText = Math.round((dist - EarthRadius) / 1000);
            
            if (dist < perigee) {
                perigee = dist;
                lblPerigee.innerText = Math.round(perigee / 1000);
            }
            if (dist > apogee) {
                apogee = dist;
                lblApogee.innerText = Math.round(apogee / 1000);
            }
        }

        function Reset() {
            Continue = false;
            OrbitTid = 0;
            apogee = 0;
            perigee = Math.pow(10, 15);
            lblTime.innerText = "Blank";
            
            const speed = parseFloat(document.getElementById('sldSpeed').value);
            const angle = parseFloat(document.getElementById('sldAngle').value);
            Power = parseFloat(document.getElementById('sldPower').value);
            
            GetStartPositions();
            
            // Calculate starting velocity vectors
            hastx = speed * Math.cos(angle * Pi / 180);
            hasty = -speed * Math.sin(angle * Pi / 180);
            
            ApogeePerigee();
            drawEarth();
            drawSatellite();
        }

        function drawEarth() {
            trailCtx.fillStyle = '#f0f0f0';
            trailCtx.fillRect(0, 0, 1000, 1000);
            
            trailCtx.beginPath();
            // Centered at (500,500)
            trailCtx.arc(500, 500, EarthRadius / scala, 0, 2 * Math.PI);
            trailCtx.fillStyle = '#00cc00'; 
            trailCtx.fill();
            trailCtx.lineWidth = 2;
            trailCtx.strokeStyle = 'black';
            trailCtx.stroke();
        }

        function drawSatellite() {
            simCtx.clearRect(0, 0, 1000, 1000);
            
            simCtx.beginPath();
            simCtx.arc(500 + (posx / scala), 500 + (posy / scala), 6, 0, 2 * Math.PI);
            simCtx.fillStyle = '#ff0000';
            simCtx.fill();
            simCtx.lineWidth = 1;
            simCtx.strokeStyle = 'black';
            simCtx.stroke();
        }

        function CalculateNewAccelerations() {
            let dist = Math.sqrt(posx*posx + posy*posy);
            let a_mag = G_Const * Mass_Const / Math.pow(dist, Power);
            accx = a_mag * (posx / dist);
            accy = a_mag * (posy / dist);
        }

        function CalculateNewSpeeds() {
            hastx = hastx - accx * tid;
            hasty = hasty - accy * tid;
        }

        function CalculateNewPosition() {
            OrbitTid += tid;
            lblTime.innerText = Math.round(OrbitTid);
            
            posx = posx + hastx * tid;
            posy = posy + hasty * tid;
            let dist = Math.sqrt(posx*posx + posy*posy);
            
            // Stop on collision
            if (Tally === -1 && dist <= EarthRadius) {
                Continue = false;
            }
            
            ApogeePerigee();
            
            // Render path trail (Red PSet equivalent)
            if (Path === 1) {
                let px = 500 + (posx / scala);
                let py = 500 + (posy / scala);
                trailCtx.fillStyle = "rgb(255,0,0)";
                trailCtx.fillRect(px - 1.5, py - 1.5, 3, 3);
            }
        }

        // Main Animation Loop
        function animate() {
            if (Continue) {
                tid = parseFloat(inpTimeInc.value) / 100;
                
                // VB6 'Delay' translation to iteration steps
                let delay = parseFloat(inpDelay.value);
                let steps = delay > 0? Math.max(1, Math.floor(100000 / delay)) : 50;
                
                for(let i = 0; i < steps; i++) {
                    if (!Continue) break;
                    CalculateNewAccelerations();
                    CalculateNewSpeeds();
                    CalculateNewPosition();
                }
                drawSatellite();
            }
            requestAnimationFrame(animate);
        }

        // -------------------------------------------------------------
        // UI Event Listeners
        // -------------------------------------------------------------

        document.getElementById('btnStart').onclick = () => { Continue = true; };
        document.getElementById('btnStop').onclick = () => { Continue = false; };
        document.getElementById('btnReset').onclick = Reset;
        
        document.getElementById('btnCollision').onclick = function() {
            Tally *= -1;
            this.innerText = Tally === 1? "Collision with Earth" : "No collision with Earth";
        };
        
        document.getElementById('btnPath').onclick = function() {
            Path *= -1;
            this.innerText = Path === 1? "Don't s show path" : "Show path";
            if (Path === -1) drawEarth(); // Clears path on canvas
        };

        const bindSlider = (id, valId) => {
            document.getElementById(id).addEventListener('input', function() {
                document.getElementById(valId).innerText = this.value;
                if (!Continue) Reset();
            });
        };

        bindSlider('sldHeight', 'valHeight');
        bindSlider('sldRadius', 'valRadius');
        bindSlider('sldAngle', 'valAngle');
        bindSlider('sldSpeed', 'valSpeed');
        bindSlider('sldPower', 'valPower');

        // Boot
        Reset();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
