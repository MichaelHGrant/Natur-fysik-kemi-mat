
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyd Visualizer & Spektrum Analysator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        canvas {
            background-color: #0c0a09; /* Meget mørk grå, næsten sort */
            border-radius: 0.5rem;
        }
        .control-button {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.375rem;
            transition: all 0.2s ease-in-out;
            border: 1px solid #d1d5db; /* gray-300 */
        }
        .control-button.active {
            background-color: #4f46e5; /* indigo-600 */
            color: white;
            border-color: #4f46e5;
        }
        .control-button:not(.active) {
             background-color: white;
             color: #374151; /* gray-700 */
        }
        .control-button:hover:not(.active) {
            background-color: #f9fafb; /* gray-50 */
        }
        .legend-gradient {
            background: linear-gradient(to right, hsl(240, 100%, 50%), hsl(180, 100%, 50%), hsl(120, 100%, 50%));
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-5xl p-4 md:p-6 bg-white rounded-xl shadow-lg text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Lyd Visualizer</h1>
        <p id="status" class="text-gray-500 mb-4">Klik på knappen for at starte analysen af din mikrofon.</p>

        <!-- Kontrolpanel -->
        <div id="controls" class="hidden flex-wrap items-center justify-center gap-2 md:gap-4 mb-4 p-3 bg-gray-50 rounded-lg">
             <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-gray-600">Skala:</span>
                <button id="scaleToggleButton" class="control-button active" data-scale="log">Logaritmisk</button>
             </div>
             <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-gray-600">Peak Hold:</span>
                <button id="peakHoldButton" class="control-button">Aktiver</button>
                <button id="peakResetButton" class="control-button">Reset</button>
             </div>
             <button id="snapshotButton" class="control-button bg-green-500 text-white border-green-500 hover:bg-green-600">Tag Billede</button>
        </div>

        <!-- Startknap -->
        <button id="startButton" class="mb-4 px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75 transition-transform transform hover:scale-105">
            Start Analyse
        </button>

        <!-- Canvas til visualisering -->
        <div class="w-full aspect-video relative">
            <canvas id="visualizerCanvas" class="w-full h-full"></canvas>
        </div>

        <!-- Farveforklaring -->
        <div id="legend" class="hidden mt-4 pt-3 border-t flex flex-col sm:flex-row items-center justify-center gap-4 text-sm text-gray-600">
            <div class="flex flex-col items-center w-full sm:w-auto">
                <div class="w-full max-w-xs h-4 rounded-full legend-gradient mb-1"></div>
                <div class="flex justify-between w-full max-w-xs">
                    <span>Lavt Niveau</span>
                    <span>Højt Niveau</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded" style="background-color: #f59e0b;"></div>
                <span>Peak Hold</span>
            </div>
        </div>
    </div>

    <script>
        // DOM-elementer
        const startButton = document.getElementById('startButton');
        const controlsDiv = document.getElementById('controls');
        const legendDiv = document.getElementById('legend');
        const scaleToggleButton = document.getElementById('scaleToggleButton');
        const peakHoldButton = document.getElementById('peakHoldButton');
        const peakResetButton = document.getElementById('peakResetButton');
        const snapshotButton = document.getElementById('snapshotButton');
        const canvas = document.getElementById('visualizerCanvas');
        const statusText = document.getElementById('status');
        const canvasCtx = canvas.getContext('2d');

        // Audio og state variabler
        let audioContext, analyser, source, animationFrameId;
        let dataArray, peakHoldArray;
        let isLogScale = true;
        let isPeakHoldActive = false;
        
        const MIN_FREQ = 20;
        let MAX_FREQ;
        const AXIS_PADDING_LEFT = 40;
        const AXIS_PADDING_BOTTOM = 20;

        async function setupAudioContext() {
            if (audioContext) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                statusText.textContent = 'Mikrofon er aktiv. Prøv at lave lidt lyd!';
                startButton.style.display = 'none';
                controlsDiv.classList.remove('hidden');
                controlsDiv.classList.add('flex');
                legendDiv.classList.remove('hidden');
                legendDiv.classList.add('flex');

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 32768;
                analyser.smoothingTimeConstant = 0.8;
                analyser.minDecibels = -100;
                analyser.maxDecibels = -30;
                
                source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                peakHoldArray = new Uint8Array(bufferLength);
                MAX_FREQ = audioContext.sampleRate / 2;

                draw();
            } catch (err) {
                console.error('Fejl ved adgang til mikrofon:', err);
                statusText.textContent = 'Fejl: Kunne ikke få adgang til mikrofonen. Tjek dine browser-tilladelser.';
            }
        }

        function frequencyToX(freq, graphWidth) {
            if (isLogScale) {
                const logMin = Math.log10(MIN_FREQ);
                const logMax = Math.log10(MAX_FREQ);
                const logFreq = Math.log10(freq);
                return ((logFreq - logMin) / (logMax - logMin)) * graphWidth;
            } else {
                return (freq / MAX_FREQ) * graphWidth;
            }
        }

        function drawAxes(width, height) {
            const graphWidth = width - AXIS_PADDING_LEFT;
            const graphHeight = height - AXIS_PADDING_BOTTOM;
            canvasCtx.fillStyle = '#d1d5db';
            canvasCtx.font = '12px Inter';
            
            canvasCtx.textAlign = 'center';
            const freqLabels = isLogScale 
                ? [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000]
                : [1000, 2000, 5000, 10000, 15000, 20000];
            freqLabels.forEach(freq => {
                if (freq > MAX_FREQ) return;
                const x = AXIS_PADDING_LEFT + frequencyToX(freq, graphWidth);
                canvasCtx.globalAlpha = 0.2;
                canvasCtx.strokeStyle = '#4b5563';
                canvasCtx.beginPath();
                canvasCtx.moveTo(x, 0);
                canvasCtx.lineTo(x, graphHeight);
                canvasCtx.stroke();
                canvasCtx.globalAlpha = 1.0;
                const label = freq >= 1000 ? `${freq / 1000}k` : `${freq}`;
                canvasCtx.fillText(label, x, height - 5);
            });

            canvasCtx.textAlign = 'right';
            const minDb = analyser.minDecibels;
            const maxDb = analyser.maxDecibels;
            const dbRange = maxDb - minDb;
            for (let db = maxDb; db >= minDb; db -= 10) {
                const y = (1 - ((db - minDb) / dbRange)) * graphHeight;
                canvasCtx.globalAlpha = 0.2;
                canvasCtx.strokeStyle = '#4b5563';
                canvasCtx.beginPath();
                canvasCtx.moveTo(AXIS_PADDING_LEFT, y);
                canvasCtx.lineTo(width, y);
                canvasCtx.stroke();
                canvasCtx.globalAlpha = 1.0;
                canvasCtx.fillText(`${db}`, AXIS_PADDING_LEFT - 8, y + 4);
            }
        }

        function drawSpectrum(graphWidth, graphHeight, dataSource, color, alpha = 1.0) {
            canvasCtx.save();
            canvasCtx.globalAlpha = alpha;
            canvasCtx.translate(AXIS_PADDING_LEFT, 0);

            if (isLogScale) {
                for (let i = 0; i < graphWidth; i++) {
                    const logMin = Math.log10(MIN_FREQ);
                    const logMax = Math.log10(MAX_FREQ);
                    const startLog = logMin + (i / graphWidth) * (logMax - logMin);
                    const endLog = logMin + ((i + 1) / graphWidth) * (logMax - logMin);
                    const startFreq = Math.pow(10, startLog);
                    const endFreq = Math.pow(10, endLog);
                    const startBin = Math.round(startFreq / MAX_FREQ * dataSource.length);
                    const endBin = Math.round(endFreq / MAX_FREQ * dataSource.length);
                    let maxVal = 0;
                    for (let j = startBin; j <= endBin; j++) {
                        if (dataSource[j] > maxVal) maxVal = dataSource[j];
                    }
                    const barHeight = (maxVal / 255) * graphHeight;
                    if (typeof color === 'function') canvasCtx.fillStyle = color(maxVal);
                    else canvasCtx.fillStyle = color;
                    if (barHeight > 0) canvasCtx.fillRect(i, graphHeight - barHeight, 1, barHeight);
                }
            } else {
                const bufferLength = dataSource.length;
                let barWidth = (graphWidth / bufferLength) * 2.5;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataSource[i] / 255) * graphHeight;
                    if (typeof color === 'function') canvasCtx.fillStyle = color(dataSource[i]);
                    else canvasCtx.fillStyle = color;
                    if (barHeight > 0) canvasCtx.fillRect(x, graphHeight - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            canvasCtx.restore();
        }

        function draw() {
            animationFrameId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            if (isPeakHoldActive) {
                for (let i = 0; i < dataArray.length; i++) {
                    if (dataArray[i] > peakHoldArray[i]) peakHoldArray[i] = dataArray[i];
                }
            }

            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
            const graphWidth = width - AXIS_PADDING_LEFT;
            const graphHeight = height - AXIS_PADDING_BOTTOM;

            canvasCtx.clearRect(0, 0, width, height);
            drawAxes(width, height);
            
            const colorFunc = (val) => `hsl(${240 - (val / 255) * 120}, 100%, 50%)`;

            drawSpectrum(graphWidth, graphHeight, dataArray, colorFunc, isPeakHoldActive ? 0.6 : 1.0);

            if (isPeakHoldActive) {
                drawSpectrum(graphWidth, graphHeight, peakHoldArray, '#f59e0b');
            }
        }

        // --- Event Listeners ---
        startButton.addEventListener('click', setupAudioContext);
        scaleToggleButton.addEventListener('click', () => {
            isLogScale = !isLogScale;
            scaleToggleButton.textContent = isLogScale ? 'Logaritmisk' : 'Lineær';
            scaleToggleButton.classList.toggle('active');
        });
        peakHoldButton.addEventListener('click', () => {
            isPeakHoldActive = !isPeakHoldActive;
            peakHoldButton.textContent = isPeakHoldActive ? 'Deaktiver' : 'Aktiver';
            peakHoldButton.classList.toggle('active');
            if (!isPeakHoldActive) peakHoldArray.fill(0);
        });
        peakResetButton.addEventListener('click', () => {
            if (peakHoldArray) peakHoldArray.fill(0);
        });
        snapshotButton.addEventListener('click', () => {
            const currentFillStyle = canvasCtx.fillStyle;
            canvasCtx.globalCompositeOperation = 'destination-over';
            canvasCtx.fillStyle = '#FFFFFF';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            const image = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = image;
            link.download = `spectrum-snapshot-${new Date().toISOString().slice(0,19).replace('T','_').replace(/:/g,'-')}.png`;
            link.click();
            canvasCtx.globalCompositeOperation = 'source-over';
            canvasCtx.fillStyle = currentFillStyle;
        });
    </script>
</body>
</html>
