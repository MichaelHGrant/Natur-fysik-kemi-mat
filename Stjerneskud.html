<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Lyriderne Radiant Visualisering</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <h2>Lyridernes Radiant Visualisering</h2>
        <p>Zoom ind mod Jorden og kig mod den røde stjerne (Radianten/Lyren) for at se perspektiveffekten.</p>
        <p>Blå stjerne = Vega | Rød prik = Lyridernes Radiant | Hvide streger = Parallelle meteorer</p>
    </div>

    <script>
        // 1. Opsætning af scene, kamera og renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
        camera.position.set(0, 300, 800); // Startperspektiv ude fra rummet

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. Skab Jordkloden
        const earthRadius = 100;
        const earthGeo = new THREE.SphereGeometry(earthRadius, 32, 32);
        const earthMat = new THREE.MeshBasicMaterial({ color: 0x1155aa, wireframe: true }); // Simpel wireframe jord
        const earth = new THREE.Mesh(earthGeo, earthMat);
        scene.add(earth);

        // 3. Matematik til transformation af Astronomiske Koordinater
        // Konverterer Rektascension (RA i timer/minutter) og Deklination (Dec i grader) til x,y,z
        const skyRadius = 8000;
        function radecToXYZ(raHours, raMin, decDegrees, radius) {
            const raDecimalHours = raHours + (raMin / 60);
            const raRad = (raDecimalHours * 15) * (Math.PI / 180); // 1 time = 15 grader
            const decRad = decDegrees * (Math.PI / 180);

            // Three.js højrehåndet system
            const x = radius * Math.cos(decRad) * Math.cos(raRad);
            const y = radius * Math.sin(decRad);
            const z = -radius * Math.cos(decRad) * Math.sin(raRad);
            return new THREE.Vector3(x, y, z);
        }

        // 4. Placer Stjernebilledet Lyren og Radianten
        // Vega (RA 18h 36m, Dec +38.78 grader)
        const vegaPos = radecToXYZ(18, 36, 38.78, skyRadius);
        const vegaGeo = new THREE.SphereGeometry(50, 16, 16);
        const vegaMat = new THREE.MeshBasicMaterial({ color: 0x88bbff }); // Blå-hvid stjerne
        const vega = new THREE.Mesh(vegaGeo, vegaMat);
        vega.position.copy(vegaPos);
        scene.add(vega);

        // Radianten for Lyriderne (RA 18h 10m, Dec +33 grader)
        const radiantPos = radecToXYZ(18, 10, 33, skyRadius);
        const radiantGeo = new THREE.SphereGeometry(30, 16, 16);
        const radiantMat = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // Rød markør
        const radiant = new THREE.Mesh(radiantGeo, radiantMat);
        radiant.position.copy(radiantPos);
        scene.add(radiant);

        // Beregn hastighedsvektoren for meteorerne (peger fra radianten mod origo/Jorden)
        const meteorDirection = new THREE.Vector3().copy(radiantPos).negate().normalize();

        // 5. Partikelsystem for Meteorerne
        const meteorCount = 500;
        const meteorsGeo = new THREE.BufferGeometry();
        const meteorPositions = new Float32Array(meteorCount * 3);
        
        // Randomiserede startpositioner over Jorden
        const spawnRadius = 2000;
        const initialPositions =; // Rettelse: Tomt array til at gemme offset
        for(let i=0; i<meteorCount; i++) {
            // Skab et offset-plan vinkelret på ankomstretningen
            const offsetX = (Math.random() - 0.5) * spawnRadius;
            const offsetY = (Math.random() - 0.5) * spawnRadius;
            
            // Forskyd meteorerne tilbage langs ankomstretningen, så de falder
            const startDist = 1000 + Math.random() * 4000; 
            
            const pos = new THREE.Vector3(offsetX, offsetY, 0);
            pos.lookAt(meteorDirection); // Orienter det tilfældige felt mod faldretningen
            pos.addScaledVector(meteorDirection, -startDist); // Skub tilbage i rummet
            
            initialPositions.push({ vec: pos.clone(), dist: startDist });

            meteorPositions[i*3] = pos.x;
            meteorPositions[i*3+1] = pos.y;
            meteorPositions[i*3+2] = pos.z;
        }

        meteorsGeo.setAttribute('position', new THREE.BufferAttribute(meteorPositions, 3));
        const meteorsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 5, transparent: true, opacity: 0.8 });
        const meteorSystem = new THREE.Points(meteorsGeo, meteorsMat);
        scene.add(meteorSystem);

        // 6. Animations-sløjfen
        const speed = 25; // Faldhastighed
        
        function animate() {
            requestAnimationFrame(animate);

            // Roter Jorden let
            earth.rotation.y += 0.002;

            // Opdater meteorernes positioner (Kinematisk fald)
            const positions = meteorSystem.geometry.attributes.position.array;
            
            for(let i=0; i<meteorCount; i++) {
                // Flyt partiklen langs den parallelle retningsvektor
                positions[i*3] += meteorDirection.x * speed;
                positions[i*3+1] += meteorDirection.y * speed;
                positions[i*3+2] += meteorDirection.z * speed;
                
                // Tjek om meteoren er nået forbi Jorden (distance til origo < noget specifikt, eller gået for langt)
                const currentPos = new THREE.Vector3(positions[i*3], positions[i*3+1], positions[i*3+2]);
                
                // Rettelse: Samlet linje for betingelsen uden afbrydelse
                if(currentPos.length() < earthRadius - 20 |

| currentPos.dot(meteorDirection) > earthRadius * 2) {
                    // Nulstil positionen til startpunktet ude i rummet
                    positions[i*3] = initialPositions[i].vec.x;
                    positions[i*3+1] = initialPositions[i].vec.y;
                    positions[i*3+2] = initialPositions[i].vec.z;
                }
            }
            meteorSystem.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        // Håndtering af vinduesstørrelse
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        animate();
    </script>
</body>
</html>
