<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom Orbital Visning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #E5E7EB;
            /* Fjernet overflow: hidden for at tillade scroll på mobil */
        }
        #info-panel {
            background-color: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #374151;
        }
        @media (min-width: 768px) {
            #info-panel {
                border-top: none;
                border-left: 1px solid #374151;
            }
        }
        .orbital-button {
            transition: all 0.2s ease-in-out;
            border: 1px solid #4b5563;
            text-shadow: 0px 0px 5px rgba(0, 0, 0, 0.7);
            touch-action: manipulation; /* Gør knapper hurtigere på mobil */
        }
        .orbital-button.active {
            background-color: #3B82F6;
            color: #FFFFFF;
            font-weight: bold;
            border-color: #60A5FA;
        }
        canvas {
            display: block;
            outline: none;
        }
        /* Container til 3D view for at styre højden på mobil */
        #canvas-container {
            height: 50vh; /* 50% af skærmhøjde på mobil */
            width: 100%;
            position: relative;
        }
        @media (min-width: 768px) {
            #canvas-container {
                height: 100vh;
            }
        }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen w-screen overflow-x-hidden">

    <div id="canvas-container" class="flex-grow">
        <div class="absolute top-4 left-4 z-10 pointer-events-none">
            <h1 class="text-xl md:text-3xl font-bold text-white drop-shadow-lg">Brintatom Orbitaler</h1>
            <p class="text-sm text-gray-300 drop-shadow-md">Roter og zoom med fingrene</p>
        </div>
    </div>

    <div id="info-panel" class="w-full md:w-[450px] flex flex-col p-4 md:p-8 overflow-y-auto">
        
        <section class="mb-8">
            <h2 class="text-lg font-bold text-blue-400 mb-4 uppercase tracking-wider">Vælg Orbital</h2>
            <div id="orbital-controls" class="space-y-4">
                <div class="flex flex-wrap gap-2">
                    <button data-orbital="1s" class="orbital-button active px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">1s</button>
                </div>
                <div class="flex flex-wrap gap-2 border-t border-gray-700 pt-3">
                    <button data-orbital="2s" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">2s</button>
                    <button data-orbital="2px" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">2p<sub>x</sub></button>
                    <button data-orbital="2py" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">2p<sub>y</sub></button>
                    <button data-orbital="2pz" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">2p<sub>z</sub></button>
                </div>
                <div class="flex flex-wrap gap-2 border-t border-gray-700 pt-3">
                    <button data-orbital="3s" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">3s</button>
                    <button data-orbital="3px" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">3p<sub>x</sub></button>
                    <button data-orbital="3py" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">3p<sub>y</sub></button>
                    <button data-orbital="3pz" class="orbital-button px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">3p<sub>z</sub></button>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button data-orbital="3d_xy" class="orbital-button px-3 py-2 text-sm rounded-lg bg-gray-800 hover:bg-gray-700">3d<sub>xy</sub></button>
                    <button data-orbital="3d_yz" class="orbital-button px-3 py-2 text-sm rounded-lg bg-gray-800 hover:bg-gray-700">3d<sub>yz</sub></button>
                    <button data-orbital="3d_xz" class="orbital-button px-3 py-2 text-sm rounded-lg bg-gray-800 hover:bg-gray-700">3d<sub>x²-y²</sub></button>
                    <button data-orbital="3d_z2" class="orbital-button px-3 py-2 text-sm rounded-lg bg-gray-800 hover:bg-gray-700">3d<sub>z²</sub></button>
                </div>
            </div>
        </section>

        <section class="border-t border-gray-700 pt-6">
            <h2 class="text-xl font-bold text-white mb-3">Brint Spektrum</h2>
            <p class="text-gray-400 text-sm leading-relaxed mb-6">
                Når en elektron springer mellem disse orbitaler, udsendes energi som lys. Herunder ses de synlige overgange til n=2 (Balmer-serien).
            </p>
            
            <div class="bg-black/40 p-4 rounded-xl border border-gray-800">
                <div class="relative h-64 w-full mt-4">
                    <div class="absolute w-full border-t border-dashed border-gray-600" style="bottom: 95%;"><span class="absolute right-0 -top-4 text-[10px]">Ioniseret</span></div>
                    <div class="absolute w-full border-t border-gray-600" style="bottom: 80%;"><span class="absolute -left-6 text-[10px]">n=4</span></div>
                    <div class="absolute w-full border-t border-gray-600" style="bottom: 60%;"><span class="absolute -left-6 text-[10px]">n=3</span></div>
                    <div class="absolute w-full border-t-2 border-blue-500" style="bottom: 30%;"><span class="absolute -left-6 text-[10px] text-blue-400 font-bold">n=2</span></div>
                    <div class="absolute w-full border-t border-gray-600" style="bottom: 5%;"><span class="absolute -left-6 text-[10px]">n=1</span></div>

                    <div class="absolute w-1 bg-red-500" style="left: 30%; bottom: 30%; height: 30%;"></div>
                    <div class="absolute w-1 bg-cyan-400" style="left: 50%; bottom: 30%; height: 50%;"></div>
                    <div class="absolute w-1 bg-violet-500" style="left: 70%; bottom: 30%; height: 60%;"></div>
                </div>
                <div class="flex justify-around mt-2 text-[10px] text-gray-500">
                    <span>656nm</span>
                    <span>486nm</span>
                    <span>434nm</span>
                </div>
            </div>
        </section>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, points;
        const container = document.getElementById('canvas-container');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 30;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimerer performance
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;
            
            // Forhindrer at siden scroller når man roterer atomet på mobil
            renderer.domElement.style.touchAction = 'none';

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        const a0 = 1; 
        const waveFunctions = {
            '1s': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return Math.exp(-2 * r / a0); },
            '2s': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return Math.pow(2 - r/a0, 2) * Math.exp(-r / a0); },
            '2px': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return x*x * Math.exp(-r / a0); },
            '2py': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return y*y * Math.exp(-r / a0); },
            '2pz': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return z*z * Math.exp(-r / a0); },
            '3s': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return Math.pow(27 - 18*r/a0 + 2*Math.pow(r/a0,2), 2) * Math.exp(-2*r/(3*a0)); },
            '3px': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return x*x * Math.pow(6-r/a0, 2) * Math.exp(-2*r/(3*a0)); },
            '3py': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return y*y * Math.pow(6-r/a0, 2) * Math.exp(-2*r/(3*a0)); },
            '3pz': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return z*z * Math.pow(6-r/a0, 2) * Math.exp(-2*r/(3*a0)); },
            '3d_xy': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return Math.pow(x*y, 2) * Math.exp(-2*r/(3*a0)); },
            '3d_yz': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return Math.pow(y*z, 2) * Math.exp(-2*r/(3*a0)); },
            '3d_xz': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return Math.pow(x*z, 2) * Math.exp(-2*r/(3*a0)); },
            '3d_z2': (x, y, z) => { const r = Math.sqrt(x*x + y*y + z*z); return Math.pow(2*z*z - x*x - y*y, 2) * Math.exp(-2*r/(3*a0)); }
        };

        function generateOrbital(name) {
            if (points) scene.remove(points);
            
            const count = 50000; // Lidt færre punkter for bedre mobil performance
            const pos = [];
            const cols = [];
            const c = new THREE.Color();
            const func = waveFunctions[name] || waveFunctions['1s'];
            
            // Tilpas boks-størrelse efter orbital
            const box = name.startsWith('3') ? 50 : (name.startsWith('2') ? 25 : 12);
            const maxP = name.startsWith('3') ? 0.2 : 0.8;

            let i = 0;
            while (i < count) {
                const x = (Math.random() - 0.5) * box;
                const y = (Math.random() - 0.5) * box;
                const z = (Math.random() - 0.5) * box;
                if (func(x, y, z) > Math.random() * maxP) {
                    pos.push(x, y, z);
                    const r = Math.sqrt(x*x + y*y + z*z);
                    c.setHSL(0.6, 0.8, 0.4 + (r/box));
                    cols.push(c.r, c.g, c.b);
                    i++;
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            
            const mat = new THREE.PointsMaterial({
                size: 0.12,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.6
            });

            points = new THREE.Points(geo, mat);
            scene.add(points);
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        document.querySelectorAll('.orbital-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.orbital-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                generateOrbital(btn.dataset.orbital);
            });
        });

        init();
        generateOrbital('1s');
    </script>
</body>
</html>
