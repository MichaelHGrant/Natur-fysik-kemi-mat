<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaget ved Dybbøl - Interaktivt Rollespil</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #2c251d;
            color: #2b2b2b;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            background-color: #fffaf0;
            border: 4px solid #5a4b3c;
            border-radius: 8px;
            padding: 40px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }
        h1 {
            color: #8b0000;
            border-bottom: 2px solid #8b0000;
            padding-bottom: 10px;
            margin-top: 0;
        }
        #story-text {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 140px;
        }
        .btn {
            background-color: #5a4b3c;
            color: white;
            border: 2px solid #3a2b1c;
            padding: 12px 20px;
            margin: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
            width: 90%;
            max-width: 450px;
            font-family: 'Georgia', serif;
        }
        .btn:hover {
            background-color: #8b0000;
            transform: scale(1.02);
        }
        #historical-note {
            margin-top: 25px;
            font-size: 0.9em;
            font-style: italic;
            color: #666;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }

        /* Animationer */
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.2);
            pointer-events: none;
            opacity: 0;
            border-radius: 4px;
        }
        .flash-red {
            animation: flashRed 0.5s ease-out;
        }
        @keyframes flashRed {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay"></div>
    <h1>Slaget ved Dybbøl</h1>
    <p><i>18. april 1864 - Generalens Telt</i></p>
    <div id="story-content" class="fade-in">
        <div id="story-text">
            Forbered dig, General. Tryk på start for at begynde.
        </div>
        <div id="choices-container">
            <button class="btn" onclick="startGame()">Start Spillet (Slå lyd til)</button>
        </div>
        <p id="historical-note">Dette spil bruger browserens indbyggede lyd. Sørg for at din lyd er tændt.</p>
    </div>
</div>

<script>
    // Audio Context til at generere lyde uden eksterne filer
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Spil en dyb "kanon"-lyd
    function playCannonSound() {
        if (!audioCtx) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(100, audioCtx.currentTime); // Dyb start
        oscillator.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); // Drop i frekvens
        
        gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5);
    }

    // Spil en "klik"-lyd
    function playClickSound() {
        if (!audioCtx) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    // Animationer
    function triggerShake() {
        const container = document.getElementById('game-container');
        const overlay = document.getElementById('overlay');
        
        container.classList.remove('shake');
        overlay.classList.remove('flash-red');
        
        // Trigger reflow for at genstarte animation
        void container.offsetWidth; 
        
        container.classList.add('shake');
        overlay.classList.add('flash-red');
    }

    function triggerFade() {
        const content = document.getElementById('story-content');
        content.classList.remove('fade-in');
        void content.offsetWidth;
        content.classList.add('fade-in');
    }

    // Historien - Udvidet med flere lag

        start: {
            text: "Klokken nærmer sig 10:00. Den preussiske artilleriild har bombet skanserne til grus i ugevis. Der er en unaturlig stilhed... Infanteriet angriber snart! Hvad er dine ordrer?",
            choices: [
                { text: "Befal tropperne at holde skanserne! (Historisk)", next: "historical_hold" },
                { text: "Send besked til Panserbatteriet Rolf Krake om at beskyde kysten!", next: "rolf_krake" },
                { text: "Beordr et natligt flanke-angreb for
