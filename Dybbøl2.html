<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaget ved Dybbøl - Interaktivt Rollespil</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #2c251d;
            color: #2b2b2b;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            background-color: #fffaf0;
            border: 4px solid #5a4b3c;
            border-radius: 8px;
            padding: 40px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }
        h1 {
            color: #8b0000;
            border-bottom: 2px solid #8b0000;
            padding-bottom: 10px;
            margin-top: 0;
        }
        #story-text {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 140px;
        }
        .btn {
            background-color: #5a4b3c;
            color: white;
            border: 2px solid #3a2b1c;
            padding: 12px 20px;
            margin: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
            width: 90%;
            max-width: 450px;
            font-family: 'Georgia', serif;
        }
        .btn:hover {
            background-color: #8b0000;
            transform: scale(1.02);
        }
        #historical-note {
            margin-top: 25px;
            font-size: 0.9em;
            font-style: italic;
            color: #666;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }

        /* Animationer */
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.2);
            pointer-events: none;
            opacity: 0;
            border-radius: 4px;
        }
        .flash-red {
            animation: flashRed 0.5s ease-out;
        }
        @keyframes flashRed {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay"></div>
    <h1>Slaget ved Dybbøl</h1>
    <p><i>18. april 1864 - Generalens Telt</i></p>
    <div id="story-content" class="fade-in">
        <div id="story-text">
            Forbered dig, General. Tryk på start for at begynde.
        </div>
        <div id="choices-container">
            <button class="btn" id="start-btn">Start Spillet (Slå lyd til)</button>
        </div>
        <p id="historical-note">Dette spil bruger browserens indbyggede lyd. Sørg for at din lyd er tændt.</p>
    </div>
</div>

<script>
    // Audio Context til at generere lyde uden eksterne filer
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Spil en dyb "kanon"-lyd
    function playCannonSound() {
        if (!audioCtx) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(100, audioCtx.currentTime); 
        oscillator.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); 
        
        gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5);
    }

    // Spil en "klik"-lyd
    function playClickSound() {
        if (!audioCtx) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    // Animationer
    function triggerShake() {
        const container = document.getElementById('game-container');
        const overlay = document.getElementById('overlay');
        
        container.classList.remove('shake');
        overlay.classList.remove('flash-red');
        
        void container.offsetWidth; 
        
        container.classList.add('shake');
        overlay.classList.add('flash-red');
    }

    function triggerFade() {
        const content = document.getElementById('story-content');
        content.classList.remove('fade-in');
        void content.offsetWidth;
        content.classList.add('fade-in');
    }

    // Historien - Udvidet med flere lag
    const storyNodes = {
        start: {
            text: "Klokken nærmer sig 10:00. Den preussiske artilleriild har bombet skanserne til grus i ugevis. Der er en unaturlig stilhed... Infanteriet angriber snart! Hvad er dine ordrer?",
            choices: [
                { text: "Befal tropperne at holde skanserne! (Historisk)", next: "historical_hold" },
                { text: "Send besked til Panserbatteriet Rolf Krake om at beskyde kysten!", next: "rolf_krake" },
                { text: "Beordr et natligt flanke-angreb for at sabotere deres kanoner.", next: "sabotage" },
                { text: "Iværksæt en general-retræte over broerne til Als.", next: "retreat_als" }
            ],
            note: "Preusserne har ca. 37.000 mand klar mod dine udmattede 11.000 soldater i skanserne.",
            effect: "silence"
        },
        historical_hold: {
            text: "Kanonerne brager pludselig løs igen, efterfulgt af preussiske stormkolonner! De vælter ind over de ødelagte skanser. Det 8. Brigade kæmper desperat, men bliver løbet over ende.",
            choices: [
                { text: "Indsæt reserverne i et modangreb!", next: "counter_attack" },
                { text: "Det er tabt. Signalér tilbagetrækning.", next: "retreat_heavy_losses" }
            ],
            note: "Dette var den historiske virkelighed. Skanserne faldt en efter en i løbet af formiddagen.",
            effect: "cannon"
        },
        rolf_krake: {
            text: "Du signalerer ud til Vemmingbund. Det mægtige panserskib Rolf Krake sejler tæt under land og affyrer sine svære kanoner ind i de preussiske rækker! Fjenden tøver, og deres højre fløj bryder i panik.",
            choices: [
                { text: "Udnyt forvirringen! Fuld storm ud af skanserne!", next: "rolf_krake_charge" },
                { text: "Brug tidsvinduet til at forstærke vores svageste punkter.", next: "rolf_krake_defend" }
            ],
            note: "Rolf Krake greb faktisk ind under slaget, men var nødt til at trække sig på grund af intens beskydning.",
            effect: "cannon"
        },
        sabotage: {
            text: "I ly af mørket inden stormen, sender du en deling snigende mod de preussiske kanonstillinger. De bliver opdaget for tidligt! Det ender i en rodet ildkamp i ingenmandsland.",
            choices: [
                { text: "Send forstærkninger ud for at redde dem.", next: "total_wipeout" },
                { text: "Lad dem i stikken, vi må forsvare hovedlinjen.", next: "historical_hold" }
            ],
            note: "Et farligt spil. Den preussiske vagtpost-kæde var tæt og professionel.",
            effect: "cannon"
        },
        counter_attack: {
            text: "Dine reserver kaster sig ind i kampen med påplantede bajonetter. Kampen er brutal mand-mod-mand, men overmagten er massiv. Du mister dine bedste mænd forgæves.",
            choices: [
                { text: "Se konsekvenserne", next: "total_wipeout" }
            ],
            note: "8. Brigade mistede næsten halvdelen af sine mænd i et heroisk modangreb.",
            effect: "cannon"
        },
        rolf_krake_charge: {
            text: "Dine mænd stormer ud, støttet af flådens kanoner! Preusserne på højre fløj trækker sig, men de tilkalder hurtigt deres eget artilleri, som tvinger Rolf Krake væk. Du står nu uden dækning på åben mark.",
            choices: [
                { text: "Kæmp til sidste blodsdråbe for fædrelandet!", next: "total_wipeout" },
                { text: "Træk jer hurtigt tilbage til Als, mens preusserne samler sig.", next: "counter_retreat" }
            ],
            note: "Taktisk uforudsigeligt, men offensiven gav jer initiativet for en stund.",
            effect: "cannon"
        },
        rolf_krake_defend: {
            text: "Du bruger tiden klogt. Selvom preusserne til sidst driver skibet væk og angriber, møder de et stærkt, omorganiseret forsvar. Kampen trækker ud i dagevis, hvilket tvinger en politisk våbenhvile frem!",
            choices: [
                { text: "Spil igen", next: "start" }
            ],
            note: "En diplomatisk sejr! Ved at trække tiden ud, nåede stormagterne i London at blande sig tidligere.",
            effect: "silence"
        },
        retreat_als: {
            text: "Ligesom de Meza gjorde ved Dannevirke, tager du en hård, men fornuftig beslutning. Du rømmer skanserne og sprænger broerne. Hæren er reddet, men politikerne i København er rasende.",
            choices: [
                { text: "Spil igen", next: "start" }
            ],
            note: "Hæren er reddet til at kæmpe en anden dag, men dit ry som general er ødelagt.",
            effect: "silence"
        },
        retreat_heavy_losses: {
            text: "Du blæser til retræte. Tilbagetoget til Als bliver kaotisk og blodigt. Mange tages til fange. Vi har mistet skanserne og tusindvis af mænd, men en rest af hæren overlever.",
            choices: [
                { text: "Spil igen", next: "start" }
            ],
            note: "Dette var det sande udfald den 18. april. Det danske nederlag var totalt.",
            effect: "silence"
        },
        counter_retreat: {
            text: "Dit vovede udfald købte tid. Hæren marcherer i god orden over pontonbroerne. I har tabt Dybbøl, men reddet hærens moral og mange danske liv.",
            choices: [
                { text: "Spil igen", next: "start" }
            ],
            note: "En taktisk flot manøvre under svære omstændigheder.",
            effect: "silence"
        },
        total_wipeout: {
            text: "Blodbadet er komplet. Den danske hær udslettes af det overlegne preussiske artilleri og nådesløse infanteri. Vejen til hele Jylland og Fyn står nu åben for fjenden. Danmark er knust.",
            choices: [
                { text: "Spil igen", next: "start" }
            ],
            note: "Det værst tænkelige udfald. En militær og national katastrofe.",
            effect: "cannon"
        }
    };

    function startGame() {
        initAudio();
        playClickSound();
        showNode('start');
    }

    function showNode(nodeKey) {
        triggerFade();
        const node = storyNodes[nodeKey];
        
        if (node.effect === "cannon") {
            setTimeout(() => {
                playCannonSound();
                triggerShake();
            }, 300);
        } else {
            playClickSound();
        }

        const storyTextElement = document.getElementById('story-text');
        const choicesContainer = document.getElementById('choices-container');
        const noteElement = document.getElementById('historical-note');

        storyTextElement.innerHTML = node.text;
        noteElement.innerHTML = "<strong>Historisk note:</strong> " + (node.note || "");
        choicesContainer.innerHTML = '';

        node.choices.forEach(choice => {
            const button = document.createElement('button');
            button.innerText = choice.text;
            button.classList.add('btn');
            button.addEventListener('click', () => {
                initAudio();
                showNode(choice.next);
            });
            choicesContainer.appendChild(button);
        });
    }

    // DENNE DEL ER NY: Den binder funktionen til knappen sikkert, når siden er læst ind
    document.addEventListener('DOMContentLoaded', () => {
        const startKnap = document.getElementById('start-btn');
        if (startKnap) {
            startKnap.addEventListener('click', startGame);
        }
    });

</script>

</body>
</html>
