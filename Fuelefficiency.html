<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimer Din Kørsel V2</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .info-box {
            background: #e7f3fe;
            border-left: 5px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 5px;
            font-size: 0.9em;
            color: #555;
        }
        label { font-weight: bold; margin-bottom: 8px; }
        input[type="number"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;}
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            align-self: flex-end;
            transition: background 0.2s;
            margin-top: auto;
        }
        button:hover { background-color: #218838; }
        .result {
            font-size: 1.1em;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #d4edda;
            color: #155724;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
            line-height: 1.6;
        }
        .slack {
            color: #856404;
            background-color: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.9em;
            border: 1px solid #ffeeba;
        }
        #plot { width: 100%; height: 550px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Rækkevidde-optimering V2</h2>
    <div class="info-box">
        <strong>Faste værdier i denne model:</strong><br>
        🚗 <strong>Landevej:</strong> 80 km/t. Forbrug: 4 liter/time (20 km/l).<br>
        🏎️ <strong>Motorvej:</strong> 130 km/t. Forbrug: 13 liter/time (10 km/l).
    </div>
    
    <div class="controls">
        <div class="input-group">
            <label for="maxTime">Maksimal tid til rådighed (timer):</label>
            <input type="number" id="maxTime" value="1" min="0.1" step="0.5">
            <div class="checkbox-group">
                <input type="checkbox" id="ignoreTime"> <label for="ignoreTime" style="font-weight: normal; margin: 0 0 0 5px;">Ignorer tidsbegrænsning</label>
            </div>
        </div>
        <div class="input-group">
            <label for="maxFuel">Brændstof på tanken (liter):</label>
            <input type="number" id="maxFuel" value="40" min="1" step="1">
            <div class="checkbox-group">
                <input type="checkbox" id="ignoreFuel"> <label for="ignoreFuel" style="font-weight: normal; margin: 0 0 0 5px;">Ignorer brændstofbegrænsning</label>
            </div>
        </div>
        <button onclick="calculateAndPlot()">Udregn Rute</button>
    </div>

    <div class="result" id="resultText">
        Tryk på "Udregn Rute" for at se resultatet.
    </div>

    <div id="plot"></div>
</div>

<script>
    const speedX = 80;  
    const speedY = 130; 
    const fuelX = 4;    
    const fuelY = 13;   

    function calculateAndPlot() {
        let maxTime = parseFloat(document.getElementById('maxTime').value) || 0;
        let maxFuel = parseFloat(document.getElementById('maxFuel').value) || 0;
        
        const ignoreTime = document.getElementById('ignoreTime').checked;
        const ignoreFuel = document.getElementById('ignoreFuel').checked;

        // Hvis man ignorerer en begrænsning, sætter vi den til et urealistisk højt tal (uendeligt i praksis)
        const effectiveMaxTime = ignoreTime ? 99999 : maxTime;
        const effectiveMaxFuel = ignoreFuel ? 99999 : maxFuel;

        if (ignoreTime && ignoreFuel) {
            document.getElementById('resultText').innerHTML = "<strong>Fejl:</strong> Du skal have mindst én begrænsning, ellers kan du køre uendeligt langt!";
            Plotly.purge('plot');
            return;
        }

        let points = [];
        points.push({x: 0, y: 0});
        points.push({x: Math.min(effectiveMaxTime, effectiveMaxFuel / fuelX), y: 0});
        points.push({x: 0, y: Math.min(effectiveMaxTime, effectiveMaxFuel / fuelY)});
        
        const xIntersect = (effectiveMaxFuel - fuelY * effectiveMaxTime) / (fuelX - fuelY);
        const yIntersect = effectiveMaxTime - xIntersect;

        if (xIntersect >= -0.001 && yIntersect >= -0.001 && 
            xIntersect <= effectiveMaxTime + 0.001 && yIntersect <= effectiveMaxTime + 0.001) {
            points.push({x: Math.max(0, xIntersect), y: Math.max(0, yIntersect)});
        }

        points = points.filter((v, i, a) => a.findIndex(t => (Math.abs(t.x - v.x) < 0.01 && Math.abs(t.y - v.y) < 0.01)) === i);

        let maxDistance = -1;
        let bestPoint = null;

        points.forEach(p => {
            const distance = (speedX * p.x) + (speedY * p.y);
            if (distance > maxDistance) {
                maxDistance = distance;
                bestPoint = p;
            }
        });

        points.sort((a, b) => Math.atan2(a.y, a.x) - Math.atan2(b.y, b.x));
        if(points.length > 0) points.push(points[0]);

        // Udregn brugte ressourcer og overskud (slack)
        const usedTime = bestPoint.x + bestPoint.y;
        const usedFuel = (bestPoint.x * fuelX) + (bestPoint.y * fuelY);
        
        const slackTime = ignoreTime ? 0 : Math.max(0, maxTime - usedTime);
        const slackFuel = ignoreFuel ? 0 : Math.max(0, maxFuel - usedFuel);

        let slackHtml = "";
        if (!ignoreTime || !ignoreFuel) {
            slackHtml = `<div class="slack"><strong>Overskydende ressourcer (Hvorfor den stoppede):</strong><br>`;
            if (!ignoreTime && slackTime > 0.01) slackHtml += `• Du havde tid i overskud, men løb tør for brændstof.<br>`;
            else if (!ignoreTime && slackTime <= 0.01) slackHtml += `• ⏳ Tiden løb ud (Flaskehalsen).<br>`;
            
            if (!ignoreFuel && slackFuel > 0.01) slackHtml += `• Du havde <strong>${slackFuel.toFixed(1)} liter brændstof i overskud</strong>, fordi tiden løb ud først.<br>`;
            else if (!ignoreFuel && slackFuel <= 0.01) slackHtml += `• ⛽ Brændstoffet slap op (Flaskehalsen).<br>`;
            slackHtml += `</div>`;
        }

        document.getElementById('resultText').innerHTML = 
            `<strong>Maksimal Rækkevidde: ${maxDistance.toFixed(1)} km</strong><br><br>
             Løsning:<br>
             • <strong>${bestPoint.x.toFixed(2)} timer</strong> på landevej (${(bestPoint.x * speedX).toFixed(1)} km)<br>
             • <strong>${bestPoint.y.toFixed(2)} timer</strong> på motorvej (${(bestPoint.y * speedY).toFixed(1)} km)<br>
             <em>Totalt forbrug: ${usedFuel.toFixed(1)} liter | Total tid: ${usedTime.toFixed(2)} timer</em>
             ${slackHtml}`;

        drawPlot(points, bestPoint, effectiveMaxTime, effectiveMaxFuel, ignoreTime, ignoreFuel, maxTime, maxFuel);
    }

    function drawPlot(polygonPoints, bestPoint, effTime, effFuel, ignoreTime, ignoreFuel, origTime, origFuel) {
        const xCoords = polygonPoints.map(p => p.x);
        const yCoords = polygonPoints.map(p => p.y);

        const polygon = {
            x: xCoords,
            y: yCoords,
            fill: 'toself',
            fillcolor: 'rgba(40, 167, 69, 0.2)',
            line: {color: 'rgba(40, 167, 69, 0.8)', width: 2},
            name: 'Mulige kombinationer',
            type: 'scatter',
            mode: 'lines'
        };

        const optimalPoint = {
            x: [bestPoint.x],
            y: [bestPoint.y],
            mode: 'markers',
            marker: { symbol: 'star', size: 22, color: '#ffc107', line: {color: '#333', width: 1.5} },
            name: 'Optimalt Punkt',
            type: 'scatter'
        };
        
        let xMaxRange = ignoreTime ? (origFuel/fuelX)+1 : Math.max(origTime, origFuel/fuelX) + 1;
        let yMaxRange = ignoreFuel ? (origTime)+1 : Math.max(origTime, origFuel/fuelY) + 1;

        if(ignoreTime) yMaxRange = (origFuel/fuelY) + 1;
        if(ignoreFuel) xMaxRange = origTime + 1;

        const layout = {
            title: 'Grafisk Løsning',
            xaxis: {title: 'Timer på Landevej (x)', range: [-0.5, xMaxRange]},
            yaxis: {title: 'Timer på Motorvej (y)', range: [-0.5, yMaxRange]},
            showlegend: true
        };

        Plotly.newPlot('plot', [polygon, optimalPoint], layout);
    }

    window.onload = calculateAndPlot;
</script>

</body>
</html>
