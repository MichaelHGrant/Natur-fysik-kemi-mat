<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fysik, matematik og kemi</title>
    <style>
        :root {
            --space-black: #0b0d17;
            --aurora-green: #39ff14;
            --aurora-purple: #a020f0;
            --text-light: #e0e0e0;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--space-black);
            color: var(--text-light);
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 4rem 1rem 3rem 1rem;
            background: linear-gradient(to bottom, #1a1a2e, var(--space-black));
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            font-size: 3rem;
            color: var(--aurora-green);
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
            margin: 0;
        }

        /* Nyt Grid Layout for Main */
        main {
            width: 90%;
            max-width: 1200px;
            padding: 2rem 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .content-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid rgba(57, 255, 20, 0.2);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-5px);
            border-color: rgba(57, 255, 20, 0.6);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .content-card h3 {
            margin-top: 0;
            color: #ffffff;
            font-size: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .content-card p {
            margin-bottom: 1.5rem;
            flex-grow: 1; /* Sikrer at teksten skubber links ned i bunden */
        }

        /* Container til kort med flere links */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: auto; 
        }

            display: block;
            text-align: center;
            padding: 12px 20
