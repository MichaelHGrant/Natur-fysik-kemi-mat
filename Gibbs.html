<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Gibbs Paradoks - 2 Rektangulære Kasser</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-container { position: absolute; top: 10px; right: 10px; z-index: 100; }
    </style>
</head>
<body>
    <div id="ui-container"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';
        import RAPIER from 'https://cdn.skypack.dev/@dimforge/rapier3d-compat';

        await RAPIER.init();
        const world = new RAPIER.World({ x: 0.0, y: 0.0, z: 0.0 });

        // Opsætning af rendering med split-screen
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setScissorTest(true);

        // Scener og kameraer
        const sceneLeft = new THREE.Scene();
        const sceneRight = new THREE.Scene();
        const cameraLeft = new THREE.PerspectiveCamera(45, (window.innerWidth / 2) / window.innerHeight, 0.1, 100);
        const cameraRight = new THREE.PerspectiveCamera(45, (window.innerWidth / 2) / window.innerHeight, 0.1, 100);
        
        // Kameraet placeres skråt oppefra for let at kunne se bevægelsen frem og tilbage i dybden
        cameraLeft.position.set(0, 10, 15);
        cameraLeft.lookAt(0, 0, 0);
        cameraRight.position.set(0, 10, 15);
        cameraRight.lookAt(0, 0, 0);

        // Visuel markering af de to rektangulære kasser (wireframe, så man kan se skillevæggen indeni)
        const boxGeo = new THREE.BoxGeometry(10, 5, 10);
        const boxMat = new THREE.MeshBasicMaterial({ color: 0x44aa44, wireframe: true });
        const boxLeft = new THREE.Mesh(boxGeo, boxMat);
        const boxRight = new THREE.Mesh(boxGeo, boxMat);
        sceneLeft.add(boxLeft);
        sceneRight.add(boxRight);

        // Opret skillevægge som kinematiske rigid-bodies. 
        // Disse vipper ikke og påvirkes ikke af tyngdekraft.
        const partitionDesc = RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(0, 0, 0);
        const partitionLeftBody = world.createRigidBody(partitionDesc);
        const partitionRightBody = world.createRigidBody(partitionDesc);
        
        // Fysisk kollisionsboks for skillevæggene (f.eks. bredde 10, højde 5, tykkelse 0.2)
        const partitionColliderDesc = RAPIER.ColliderDesc.cuboid(5.0, 2.5, 0.1);
        world.createCollider(partitionColliderDesc, partitionLeftBody);
        world.createCollider(partitionColliderDesc, partitionRightBody);

        // Visuel repræsentation af skillevæggene i Three.js
        const wallGeo = new THREE.BoxGeometry(10, 5, 0.2);
        const wallMat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.8 });
        const partitionLeftMesh = new THREE.Mesh(wallGeo, wallMat);
        const partitionRightMesh = new THREE.Mesh(wallGeo, wallMat);
        sceneLeft.add(partitionLeftMesh);
        sceneRight.add(partitionRightMesh);

        // Interaktiv Brugerflade (lil-gui) til at flytte væggene
        const gui = new GUI({ container: document.getElementById('ui-container') });
        const params = { partitionZ: 0.0 };
        
        // Skydeknappen ændrer nu Z-aksen for at køre frem og tilbage
        gui.add(params, 'partitionZ', -4.5, 4.5).name('Flyt Skillevæg').onChange(value => {
            // Opdater kinematiske translationer sikkert i fysikmotoren 
            const transLeft = partitionLeftBody.translation();
            partitionLeftBody.setNextKinematicTranslation({ x: transLeft.x, y: transLeft.y, z: value });
            
            const transRight = partitionRightBody.translation();
            partitionRightBody.setNextKinematicTranslation({ x: transRight.x, y: transRight.y, z: value });
            
            // Opdater den visuelle repræsentation i Three.js
            partitionLeftMesh.position.z = value;
            partitionRightMesh.position.z = value;
        });

        // Rendering og Fysik-løkken
        function animate() {
            requestAnimationFrame(animate);
            world.step();
            
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // Venstre boks
            renderer.setViewport(0, 0, width / 2, height);
            renderer.setScissor(0, 0, width / 2, height);
            renderer.render(sceneLeft, cameraLeft);
            
            // Højre boks
            renderer.setViewport(width / 2, 0, width / 2, height);
            renderer.setScissor(width / 2, 0, width / 2, height);
            renderer.render(sceneRight, cameraRight);
        }
        animate();

        // Håndtering af vinduesstørrelse
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            
            cameraLeft.aspect = (width / 2) / height;
            cameraLeft.updateProjectionMatrix();
            
            cameraRight.aspect = (width / 2) / height;
            cameraRight.updateProjectionMatrix();
        });
    </script>
</body>
</html>
