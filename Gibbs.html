<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Gibbs Paradoks Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-container { position: absolute; top: 10px; right: 10px; z-index: 100; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; }
        h3 { margin: 0 0 10px 0; color: #ffcc00; }
        p { margin: 5px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="info">
        <h3>Gibbs Paradoks & Entropi</h3>
        <p><b>Top Venstre:</b> Forskellige partikler (Rød / Grøn)</p>
        <p><b>Top Højre:</b> Ens partikler (Mørkeblå)</p>
        <p><b>Bund Venstre:</b> Fri udvidelse (Rød)</p>
        <p><b>Bund Højre:</b> Fri udvidelse (Grøn)</p>
    </div>
    <div id="ui-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setScissorTest(true);

        class GasSimulation {
            constructor(colorLeft, colorRight, populateLeft, populateRight) {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.set(0, 2, 14);
                this.camera.lookAt(0, 0, 0);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 10, 5);
                this.scene.add(dirLight);

                const outlineMesh = new THREE.Mesh(
                    new THREE.BoxGeometry(10, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0x555555, wireframe: true })
                );
                this.scene.add(outlineMesh);

                this.partitionMesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.2, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
                );
                this.scene.add(this.partitionMesh);

                this.particles = new Array();
                
                // Her er partiklerne gjort betydeligt mindre
                this.radius = 0.05; 
                
                const geoSphere = new THREE.SphereGeometry(this.radius, 8, 8);
                
                const matLeft = new THREE.MeshStandardMaterial({ color: colorLeft, roughness: 0.2 });
                const matRight = new THREE.MeshStandardMaterial({ color: colorRight, roughness: 0.2 });

                // Her er antallet af partikler skruet meget op
                const count = 400; 
                
                this.meshLeft = new THREE.InstancedMesh(geoSphere, matLeft, count);
                this.meshRight = new THREE.InstancedMesh(geoSphere, matRight, count);
                
                this.meshLeft.count = populateLeft? count : 0;
                this.meshRight.count = populateRight? count : 0;
                
                this.scene.add(this.meshLeft);
                this.scene.add(this.meshRight);

                const speed = 7.0;
                for (let i = 0; i < count; i++) {
                    if (populateLeft) {
                        this.particles.push({
                            pos: new THREE.Vector3(-4.5 + Math.random()*4, -2.5 + Math.random()*5, -2.5 + Math.random()*5),
                            vel: new THREE.Vector3((Math.random()-0.5)*speed, (Math.random()-0.5)*speed, (Math.random()-0.5)*speed),
                            isLeft: true
                        });
                    }
                    if (populateRight) {
                        this.particles.push({
                            pos: new THREE.Vector3(0.5 + Math.random()*4, -2.5 + Math.random()*5, -2.5 + Math.random()*5),
                            vel: new THREE.Vector3((Math.random()-0.5)*speed, (Math.random()-0.5)*speed, (Math.random()-0.5)*speed),
                            isLeft: false
                        });
                    }
                }
            }

            step(dt, sliderValue) {
                let wallBottom = -3.0 + sliderValue;
                this.partitionMesh.position.y = sliderValue;

                for (let p of this.particles) {
                    p.pos.addScaledVector(p.vel, dt);

                    if (p.pos.x < -5 + this.radius) { p.pos.x = -5 + this.radius; p.vel.x *= -1; }
                    if (p.pos.x >  5 - this.radius) { p.pos.x =  5 - this.radius; p.vel.x *= -1; }
                    if (p.pos.y < -3 + this.radius) { p.pos.y = -3 + this.radius; p.vel.y *= -1; }
                    if (p.pos.y >  3 - this.radius) { p.pos.y =  3 - this.radius; p.vel.y *= -1; }
                    if (p.pos.z < -3 + this.radius) { p.pos.z = -3 + this.radius; p.vel.z *= -1; }
                    if (p.pos.z >  3 - this.radius) { p.pos.z =  3 - this.radius; p.vel.z *= -1; }

                    if (p.pos.y > wallBottom) {
                        if (p.pos.x < 0 && p.pos.x + this.radius > 0) {
                            p.pos.x = -this.radius; p.vel.x *= -1;
                        } else if (p.pos.x > 0 && p.pos.x - this.radius < 0) {
                            p.pos.x = this.radius; p.vel.x *= -1;
                        }
                    }
                }

                for (let i = 0; i < this.particles.length; i++) {
                    for (let j = i + 1; j < this.particles.length; j++) {
                        let p1 = this.particles[i];
                        let p2 = this.particles[j];
                        
                        let dx = p1.pos.x - p2.pos.x;
                        let dy = p1.pos.y - p2.pos.y;
                        let dz = p1.pos.z - p2.pos.z;
                        let distSq = dx*dx + dy*dy + dz*dz;
                        let minDist = this.radius * 2.0;

                        if (distSq < minDist*minDist) {
                            let dist = Math.sqrt(distSq);
                            if (dist === 0) dist = 0.001;
                            
                            let nx = dx / dist, ny = dy / dist, nz = dz / dist;
                            let overlap = 0.5 * (minDist - dist);
                            
                            p1.pos.add(new THREE.Vector3(nx*overlap, ny*overlap, nz*overlap));
                            p2.pos.sub(new THREE.Vector3(nx*overlap, ny*overlap, nz*overlap));

                            let dvx = p1.vel.x - p2.vel.x;
                            let dvy = p1.vel.y - p2.vel.y;
                            let dvz = p1.vel.z - p2.vel.z;
                            let velAlongNormal = dvx*nx + dvy*ny + dvz*nz;

                            if (velAlongNormal < 0) {
                                let impulse = -(2.0 * velAlongNormal) / 2.0;
                                p1.vel.add(new THREE.Vector3(nx*impulse, ny*impulse, nz*impulse));
                                p2.vel.sub(new THREE.Vector3(nx*impulse, ny*impulse, nz*impulse));
                            }
                        }
                    }
                }
            }

            updateInstances(dummy) {
                let idxLeft = 0, idxRight = 0;
                for (let p of this.particles) {
                    dummy.position.copy(p.pos);
                    dummy.updateMatrix();
                    if (p.isLeft) {
                        this.meshLeft.setMatrixAt(idxLeft++, dummy.matrix);
                    } else {
                        this.meshRight.setMatrixAt(idxRight++, dummy.matrix);
                    }
                }
                if (this.meshLeft.count > 0) this.meshLeft.instanceMatrix.needsUpdate = true;
                if (this.meshRight.count > 0) this.meshRight.instanceMatrix.needsUpdate = true;
            }
        }

        // 1: Røde vs grønne kugler (visuelt skelnerbare)
        const box1 = new GasSimulation(0xff0000, 0x00ff00, true, true);
        
        // 2: Kun mørkeblå kugler i begge sider (fuldstændig identiske)
        const box2 = new GasSimulation(0x00008b, 0x00008b, true, true);
        
        // 3: Røde kugler udvider sig mod vakuum
        const box3 = new GasSimulation(0xff0000, 0x000000, true, false);
        
        // 4: Grønne kugler udvider sig mod vakuum
        const box4 = new GasSimulation(0x000000, 0x00ff00, false, true);

        const allBoxes = [box1, box2, box3, box4];

        const gui = new GUI({ container: document.getElementById('ui-container') });
        const params = { partitionY: 0.0 };
        gui.add(params, 'partitionY', 0.0, 6.0).name('Løft Skillevæg');

        const dummy = new THREE.Object3D();
        const dt = 1.0 / 60.0;

        function animate() {
            requestAnimationFrame(animate);
            
            const w = window.innerWidth / 2;
            const h = window.innerHeight / 2;

            allBoxes.forEach((box, index) => {
                box.step(dt, params.partitionY);
                box.updateInstances(dummy);

                const col = index % 2; 
                const row = Math.floor(index / 2); 
                
                const left = col * w;
                const bottom = (1 - row) * h;

                renderer.setViewport(left, bottom, w, h);
                renderer.setScissor(left, bottom, w, h);
                
                box.camera.aspect = w / h;
                box.camera.updateProjectionMatrix();
                renderer.render(box.scene, box.camera);
            });
        }
        
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
