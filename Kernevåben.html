<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brintatom Simulation</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        canvas {
            background-color: #16213e;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            margin-top: 20px;
        }
        p {
            color: #a8dadc;
        }
    </style>
</head>
<body>
    <h2>Simulation af Brintatom</h2>
    <p>1 Proton (rød) i kernen og 1 Elektron (blå) i kredsløb</p>
    <canvas id="atomCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('atomCanvas');
        const ctx = canvas.getContext('2d');
        let angle = 0;

        function drawAtom() {
            // Ryd lærredet for hver frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const orbitRadius = 130;

            // 1. Tegn elektronens bane (usynlig linje for visuel hjælp)
            ctx.beginPath();
            ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.closePath();

            // 2. Tegn atomkernen (Proton)
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#e63946'; // Rød farve
            ctx.fill();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#e63946';
            ctx.closePath();

            // Nulstil skygge for elektronen
            ctx.shadowBlur = 0;

            // 3. Beregn elektronens position baseret på vinklen
            const electronX = centerX + orbitRadius * Math.cos(angle);
            const electronY = centerY + orbitRadius * Math.sin(angle);

            // 4. Tegn elektronen
            ctx.beginPath();
            ctx.arc(electronX, electronY, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#00b4d8'; // Blå farve
            ctx.fill();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00b4d8';
            ctx.closePath();

            // Øg vinklen for at skabe bevægelse
            angle += 0.04;

            // Bed browseren om at tegne næste frame
            requestAnimationFrame(drawAtom);
        }

        // Start simulationen
        drawAtom();
    </script>
</body>
</html>
