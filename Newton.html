<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton's Cannon - Interactive Orbital Mechanics</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0e5ec;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
       .app-container {
            background-color: #f0f0f0;
            border: 2px solid #a0a0a0;
            border-radius: 4px;
            padding: 10px;
            width: 1000px;
            display: grid;
            grid-template-columns: 200px 500px 250px;
            gap: 15px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.2);
        }
       .toolbar {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #fff;
            padding: 10px;
            border: 1px solid #ccc;
            align-items: center;
        }
        button {
            padding: 5px 15px;
            font-size: 14px;
            cursor: pointer;
            background-color: #e1e1e1;
            border: 1px solid #999;
            border-radius: 3px;
        }
        button:hover { background-color: #d1d1d1; }
       .input-group {
            display: flex;
            flex-direction: column;
            font-size: 12px;
        }
       .input-group input { width: 80px; }
       .stats-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 5px 10px;
            background: #fff;
            border: 1px solid #ccc;
        }
       .stat-box { display: flex; flex-direction: column; align-items: flex-start; }
       .stat-value { font-weight: bold; margin-top: 3px; }
       .canvas-container {
            position: relative;
            width: 500px;
            height: 500px;
            background-color: #f5f5f5;
            border: 1px inset #888;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
       .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ccc;
        }
       .slider-group-horizontal {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }
       .vertical-sliders {
            display: flex;
            justify-content: space-between;
            height: 200px;
            margin-top: 20px;
        }
       .v-slider {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
        }
        input[type=range][orient=vertical] {
            writing-mode: bt-lr; 
            -webkit-appearance: slider-vertical;
            width: 20px;
            height: 150px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="toolbar">
        <button id="btnStart">Start</button>
        <button id="btnStop">Stop</button>
        <div class="input-group">
            <label>Delay</label>
            <input type="text" value="10000" disabled>
        </div>
        <div style="flex-grow: 1;"></div>
        <div class="stat-box" style="margin-right: 20px;">
            <span>Mass of Earth [10^24 kg]</span>
            <span class="stat-value">5.97219</span>
        </div>
        <button id="btnReset">Reset</button>
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <span>Gravitational konstant [10^11]</span>
            <span class="stat-value">6.6738</span>
        </div>
        <div class="stat-box">
            <span>Time Increment [0.01 s]</span>
            <input type="number" id="inpTimeInc" value="100" style="width: 50px;">
        </div>
        <div class="stat-box">
            <span>Time [s]</span>
            <span class="stat-value" id="valTime">0.00</span>
        </div>
        <div class="stat-box">
            <span>Apogee [km]</span>
            <span class="stat-value" id="valApogee">7371.0</span>
        </div>
        <div class="stat-box">
            <span>Perigee [km]</span>
            <span class="stat-value" id="valPerigee">7371.0</span>
        </div>
        <div class="stat-box">
            <span>Height [km]</span>
            <span class="stat-value" id="valHeightTop">1000</span>
        </div>
    </div>

    <div></div>

    <div class="canvas-container">
        <canvas id="trailCanvas" width="500" height="500"></canvas>
        <canvas id="spriteCanvas" width="500" height="500"></canvas>
    </div>

    <div class="controls-panel">
        <div>
            <button id="btnCollision" style="width: 100%; margin-bottom: 10px;">Collision with Earth: ON</button>
            <button id="btnPath" style="width: 100%;">Don't show path</button>
        </div>

        <div class="slider-group-horizontal">
            <span>Power</span>
            <span id="valPower">2.0</span>
            <input type="range" id="sldPower" min="1.0" max="3.0" step="0.01" value="2.0" style="width: 100px;">
        </div>

        <div class="vertical-sliders">
            <div class="v-slider">
                <span>Height [km]</span>
                <span id="valHeightBtn" style="margin-bottom: 5px;">1000</span>
                <input type="range" id="sldHeight" orient="vertical" min="0" max="30000" step="10" value="1000">
            </div>
            <div class="v-slider">
                <span>Radius [km]</span>
                <span id="valRadius" style="margin-bottom: 5px;">6371</span>
                <input type="range" id="sldRadius" orient="vertical" min="1000" max="10000" step="1" value="6371">
            </div>
            <div class="v-slider">
                <span>Angle [deg]</span>
                <span id="valAngle" style="margin-bottom: 5px;">0</span>
                <input type="range" id="sldAngle" orient="vertical" min="-90" max="90" step="1" value="0">
            </div>
            <div class="v-slider">
                <span>Speed [m/s]</span>
                <span id="valSpeed" style="margin-bottom: 5px;">7200</span>
                <input type="range" id="sldSpeed" orient="vertical" min="0" max="12000" step="10" value="7200">
            </div>
        </div>
    </div>
</div>

<script>
    // Fysiske konstanter baseret på applikationen [1, 2]
    const G_BASE = 6.6738e-11;          
    const M_BASE = 5.97219e24;          
    const MU = G_BASE * M_BASE;         

    // DOM Elementer til Canvas
    const trailCanvas = document.getElementById('trailCanvas');
    const trailCtx = trailCanvas.getContext('2d');
    const spriteCanvas = document.getElementById('spriteCanvas');
    const spriteCtx = spriteCanvas.getContext('2d');

    // Knapper
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnReset = document.getElementById('btnReset');
    const btnCollision = document.getElementById('btnCollision');
    const btnPath = document.getElementById('btnPath');
    
    // Slidere (Skydere)
    const sldHeight = document.getElementById('sldHeight');
    const sldRadius = document.getElementById('sldRadius');
    const sldAngle = document.getElementById('sldAngle');
    const sldSpeed = document.getElementById('sldSpeed');
    const sldPower = document.getElementById('sldPower');
    const inpTimeInc = document.getElementById('inpTimeInc');

    // Tekst-værdier der skal opdateres
    const valTime = document.getElementById('valTime');
    const valApogee = document.getElementById('valApogee');
    const valPerigee = document.getElementById('valPerigee');

    let isRunning = false;
    let collisionEnabled = true;
    let showPath = true;
    let elapsedSimTime = 0;
    
    let state = { x: 0, y: 0, vx: 0, vy: 0 };

    // Justering af skala for at sikre planeter og baner kan være på lærredet [3]
    const CANVAS_DIM = 500;
    const PIXELS_PER_KM = (CANVAS_DIM / 2) / 35000;

    function initializeState() {
        const height_m = parseFloat(sldHeight.value) * 1000;
        const radius_m = parseFloat(sldRadius.value) * 1000;
        const speed = parseFloat(sldSpeed.value);
        const angle_deg = parseFloat(sldAngle.value);
        
        // Startposition sat til toppen af planeten plus højden
        const initial_r = radius_m + height_m;
        state.x = 0;
        state.y = initial_r;

        // Omregn vinkel
        const angle_rad = angle_deg * (Math.PI / 180);
        state.vx = speed * Math.cos(angle_rad);
        state.vy = speed * Math.sin(angle_rad);

        elapsedSimTime = 0;
        valTime.innerText = "0.00";
        
        updateAnalyticalOrbits();
        drawBackground();
        drawSprite();
    }

    function updateAnalyticalOrbits() {
        const r_mag = Math.sqrt(state.x**2 + state.y**2);
        const v_mag_sq = state.vx**2 + state.vy**2;
        
        const energy = (v_mag_sq / 2) - (MU / r_mag);
        const h = state.x * state.vy - state.y * state.vx;
        
        if (energy >= 0) {
            valApogee.innerText = "Escape (\u221E)";
            valPerigee.innerText = (r_mag / 1000).toFixed(1); 
            return;
        }

        const a = -MU / (2 * energy);
        const ecc = Math.sqrt(1 + (2 * energy * Math.pow(h, 2)) / Math.pow(MU, 2));
        
        const apogee_km = (a * (1 + ecc)) / 1000;
        const perigee_km = (a * (1 - ecc)) / 1000;

        valApogee.innerText = apogee_km.toFixed(1);
        valPerigee.innerText = perigee_km.toFixed(1);
    }

    function drawBackground() {
        trailCtx.fillStyle = '#f5f5f5';
        trailCtx.fillRect(0, 0, CANVAS_DIM, CANVAS_DIM);

        const radius_km = parseFloat(sldRadius.value);

        trailCtx.save();
        // Flyt origo (0,0) til midten af feltet for at matche standard Cartesian [4]
        trailCtx.translate(CANVAS_DIM / 2, CANVAS_DIM / 2);
        trailCtx.scale(1, -1); 

        // Tegn den grønne planet (Jorden)
        trailCtx.beginPath();
        trailCtx.arc(0, 0, radius_km * PIXELS_PER_KM, 0, 2 * Math.PI);
        trailCtx.fillStyle = '#00cc00'; 
        trailCtx.fill();
        trailCtx.lineWidth = 1;
        trailCtx.strokeStyle = '#000';
        trailCtx.stroke();

        trailCtx.restore();
    }

    function drawSprite() {
        spriteCtx.clearRect(0, 0, CANVAS_DIM, CANVAS_DIM);

        spriteCtx.save();
        spriteCtx.translate(CANVAS_DIM / 2, CANVAS_DIM / 2);
        spriteCtx.scale(1, -1);

        const x_km = state.x / 1000;
        const y_km = state.y / 1000;

        // Tegn den røde satellit
        spriteCtx.beginPath();
        spriteCtx.arc(x_km * PIXELS_PER_KM, y_km * PIXELS_PER_KM, 3, 0, 2 * Math.PI);
        spriteCtx.fillStyle = '#ff0000'; 
        spriteCtx.fill();

        spriteCtx.restore();
    }

    function physicsStep(dt) {
        const radius_m = parseFloat(sldRadius.value) * 1000;
        const power = parseFloat(sldPower.value);
        const r_mag = Math.sqrt(state.x**2 + state.y**2);

        if (collisionEnabled && r_mag <= radius_m) {
            isRunning = false;
            return;
        }

        // Fysik logik integreret fra acceleration [5]
        const a_mag = -MU / Math.pow(r_mag, power);
        const ax = a_mag * (state.x / r_mag);
        const ay = a_mag * (state.y / r_mag);

        state.vx += ax * dt;
        state.vy += ay * dt;
        state.x += state.vx * dt;
        state.y += state.vy * dt;

        elapsedSimTime += dt;

        if (showPath) {
            const x_km = state.x / 1000;
            const y_km = state.y / 1000;
            trailCtx.save();
            trailCtx.translate(CANVAS_DIM / 2, CANVAS_DIM / 2);
            trailCtx.scale(1, -1);
            trailCtx.fillStyle = '#000'; 
            trailCtx.fillRect(x_km * PIXELS_PER_KM, y_km * PIXELS_PER_KM, 1, 1);
            trailCtx.restore();
        }
    }

    function animate() {
        if (isRunning) {
            const dt = parseFloat(inpTimeInc.value);
            const subSteps = 10;
            const sub_dt = dt / subSteps;

            for (let i = 0; i < subSteps; i++) {
                if(!isRunning) break;
                physicsStep(sub_dt);
            }

            valTime.innerText = elapsedSimTime.toFixed(1);
            updateAnalyticalOrbits();
            drawSprite();
        }
        requestAnimationFrame(animate);
    }

    // Interaktion til knapper
    btnStart.addEventListener('click', () => { isRunning = true; });
    btnStop.addEventListener('click', () => { isRunning = false; });
    
    btnReset.addEventListener('click', () => {
        isRunning = false;
        initializeState();
        drawBackground(); 
    });

    btnCollision.addEventListener('click', () => {
        collisionEnabled =!collisionEnabled;
        btnCollision.innerText = collisionEnabled? "Collision with Earth: ON" : "Collision with Earth: OFF";
    });

    btnPath.addEventListener('click', () => {
        showPath =!showPath;
        btnPath.innerText = showPath? "Don't show path" : "Show path";
        if (!showPath) drawBackground(); 
    });

    // Dette er det fuldstændig omskrevne array, uden syntaksfejl!
    const sliders = },
        { el: sldRadius, out: },
        { el: sldAngle, out: ['valAngle'] },
        { el: sldSpeed, out: },
        { el: sldPower, out: ['valPower'] }
    ];

    sliders.forEach(s => {
        if (s.el) {
            s.el.addEventListener('input', (e) => {
                s.out.forEach(id => {
                    let element = document.getElementById(id);
                    if (element) {
                        element.innerText = e.target.value;
                    }
                });
                if (!isRunning) initializeState();
            });
        }
    });

    // Start simulationens tegne-motor
    initializeState();
    requestAnimationFrame(animate);

</script>
</body>
</html>
