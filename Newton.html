<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Newtons Kanon Simulation</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #d4d0c8; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
      .window { 
            background: #ece9d8; 
            border: 2px solid #fff; 
            box-shadow: 2px 2px 5px #888; 
            width: 800px; 
            padding: 20px; 
            display: flex; 
            gap: 20px; 
        }
      .canvas-box { 
            width: 400px; 
            height: 400px; 
            background: #f5f5f5; 
            border: 2px inset #fff; 
            position: relative; 
            overflow: hidden;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
      .controls { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
      .buttons { 
            display: flex; 
            gap: 10px; 
        }
        button { 
            padding: 8px 15px; 
            cursor: pointer; 
            font-weight: bold;
            background: #e1e1e1;
            border: 1px solid #999;
        }
        button:hover { background: #d1d1d1; }
      .info { 
            font-size: 13px; 
            background: #fff; 
            padding: 10px; 
            border: 1px inset #ccc; 
        }
      .slider-box { 
            display: flex; 
            flex-direction: column; 
            font-size: 13px; 
            font-weight: bold;
        }
        input[type=range] { 
            width: 100%; 
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="canvas-box">
            <canvas id="trailCanvas" width="400" height="400"></canvas>
            <canvas id="simCanvas" width="400" height="400"></canvas>
        </div>
        <div class="controls">
            <div class="buttons">
                <button id="btnStart">Start</button>
                <button id="btnStop">Stop</button>
                <button id="btnReset">Reset</button>
            </div>
            <div class="info">
                <strong>Konstanter:</strong><br>
                Jordens Masse: 5.97219 [10^24 kg]<br>
                Gravitationskonstant: 6.6738 [10^-11]<br><br>
                <strong>Tid [s]: </strong> <span id="valTime">0</span>
            </div>
            <div class="slider-box">
                <label>Speed [m/s]: <span id="valSpeed">7200</span></label>
                <input type="range" id="sldSpeed" min="0" max="12000" step="50" value="7200">
            </div>
            <div class="slider-box">
                <label>Height [km]: <span id="valHeight">1000</span></label>
                <input type="range" id="sldHeight" min="0" max="20000" step="100" value="1000">
            </div>
            <div class="slider-box">
                <label>Radius [km]: <span id="valRadius">6371</span></label>
                <input type="range" id="sldRadius" min="1000" max="10000" step="1" value="6371">
            </div>
            <div class="slider-box">
                <label>Angle [deg]: <span id="valAngle">0</span></label>
                <input type="range" id="sldAngle" min="-90" max="90" step="1" value="0">
            </div>
            <div class="slider-box">
                <label>Power: <span id="valPower">2.0</span></label>
                <input type="range" id="sldPower" min="1" max="3" step="0.01" value="2.0">
            </div>
        </div>
    </div>

    <script>
        var G = 6.6738e-11;
        var M = 5.97219e24;
        var MU = G * M;

        var simCanvas = document.getElementById('simCanvas');
        var simCtx = simCanvas.getContext('2d');
        var trailCanvas = document.getElementById('trailCanvas');
        var trailCtx = trailCanvas.getContext('2d');

        var btnStart = document.getElementById('btnStart');
        var btnStop = document.getElementById('btnStop');
        var btnReset = document.getElementById('btnReset');

        var sldSpeed = document.getElementById('sldSpeed');
        var sldHeight = document.getElementById('sldHeight');
        var sldRadius = document.getElementById('sldRadius');
        var sldAngle = document.getElementById('sldAngle');
        var sldPower = document.getElementById('sldPower');

        var valSpeed = document.getElementById('valSpeed');
        var valHeight = document.getElementById('valHeight');
        var valRadius = document.getElementById('valRadius');
        var valAngle = document.getElementById('valAngle');
        var valPower = document.getElementById('valPower');
        var valTime = document.getElementById('valTime');

        var isRunning = false;
        var posX = 0;
        var posY = 0;
        var velX = 0;
        var velY = 0;
        var timeSec = 0;

        var scale = 200 / 25000000; 

        function setupSim() {
            var radius_m = parseFloat(sldRadius.value) * 1000;
            var height_m = parseFloat(sldHeight.value) * 1000;
            var speed = parseFloat(sldSpeed.value);
            var angle = parseFloat(sldAngle.value) * (Math.PI / 180); 

            posX = 0;
            posY = radius_m + height_m;
            
            velX = speed * Math.cos(angle);
            velY = speed * Math.sin(angle);
            
            timeSec = 0;
            valTime.innerText = "0";

            drawEarth();
            drawSat();
        }

        function drawEarth() {
            trailCtx.clearRect(0, 0, 400, 400); 
            var radius_m = parseFloat(sldRadius.value) * 1000;

            trailCtx.save();
            trailCtx.translate(200, 200); 
            trailCtx.scale(1, -1); 

            trailCtx.beginPath();
            trailCtx.arc(0, 0, radius_m * scale, 0, 2 * Math.PI);
            trailCtx.fillStyle = '#00cc00'; 
            trailCtx.fill();
            trailCtx.lineWidth = 1;
            trailCtx.strokeStyle = '#000000';
            trailCtx.stroke();

            trailCtx.restore();
        }

        function drawSat() {
            simCtx.clearRect(0, 0, 400, 400); 
            simCtx.save();
            simCtx.translate(200, 200);
            simCtx.scale(1, -1);

            simCtx.beginPath();
            // Radiussen er her ændret fra 4 til 2 for at gøre satellitten mindre
            simCtx.arc(posX * scale, posY * scale, 2, 0, 2 * Math.PI);
            simCtx.fillStyle = '#ff0000'; 
            simCtx.fill();

            simCtx.restore();
        }

        function stepPhysics() {
            var radius_m = parseFloat(sldRadius.value) * 1000;
            var power = parseFloat(sldPower.value);
            
            var r = Math.sqrt(posX * posX + posY * posY);

            if (r <= radius_m) {
                isRunning = false;
                return;
            }

            var dt = 20; 

            var a_mag = -MU / Math.pow(r, power);
            
            var aX = a_mag * (posX / r);
            var aY = a_mag * (posY / r);

            velX += aX * dt;
            velY += aY * dt;
            posX += velX * dt;
            posY += velY * dt;

            timeSec += dt;

            trailCtx.save();
            trailCtx.translate(200, 200);
            trailCtx.scale(1, -1);
            trailCtx.fillStyle = '#000000';
            trailCtx.fillRect((posX * scale) - 0.5, (posY * scale) - 0.5, 1, 1);
            trailCtx.restore();
        }

        function loop() {
            if (isRunning) {
                for (var i = 0; i < 10; i++) {
                    if (!isRunning) break;
                    stepPhysics();
                }
                valTime.innerText = timeSec.toFixed(0);
                drawSat();
            }
            requestAnimationFrame(loop); 
        }

        btnStart.onclick = function() { isRunning = true; };
        btnStop.onclick = function() { isRunning = false; };
        btnReset.onclick = function() { isRunning = false; setupSim(); };

        sldSpeed.oninput = function() { valSpeed.innerText = this.value; if (!isRunning) setupSim(); };
        sldHeight.oninput = function() { valHeight.innerText = this.value; if (!isRunning) setupSim(); };
        sldRadius.oninput = function() { valRadius.innerText = this.value; if (!isRunning) setupSim(); };
        sldAngle.oninput = function() { valAngle.innerText = this.value; if (!isRunning) setupSim(); };
        sldPower.oninput = function() { valPower.innerText = this.value; if (!isRunning) setupSim(); };

        setupSim();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
