<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom Orbital Visning</title>
    <a href="index.html" class="back-link">← Tilbage til forsiden</a>  
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #E5E7EB;
            margin: 0;
            /* Fjernet overflow:hidden for at tillade scroll på mobil */
        }

        /* Responsiv højde på canvas */
        #canvas-container {
            height: 50vh; /* 50% af skærmen på mobil */
            width: 100%;
            position: relative;
            background: radial-gradient(circle, #1f2937 0%, #111827 100%);
        }

        @media (min-width: 768px) {
            #canvas-container {
                height: 100vh;
                position: fixed; /* Låst i baggrunden på PC */
                left: 0;
                top: 0;
                width: calc(100% - 320px);
            }
            body { overflow: hidden; }
        }

        /* UI Styling */
        .ui-section {
            background-color: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        /* Slider Fixes */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            height: 30px; /* Større klik-flade */
            touch-action: none; /* Stopper scroll når man rører slider */
        }

        input[type=range]::-webkit-slider-runnable-track {
            background: #374151;
            height: 6px;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #60A5FA;
            margin-top: -7px;
            border: 2px solid #111827;
        }

        .orbital-button {
            transition: all 0.2s;
            border: 1px solid #374151;
            touch-action: manipulation;
        }

        .orbital-button.active {
            background-color: #3B82F6;
            color: white;
            border-color: #60A5FA;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        /* Sidebar på PC, bunden på Mobil */
        #info-panel {
            width: 100%;
            background: #111827;
            border-top: 1px solid #374151;
        }

        @media (min-width: 768px) {
            #info-panel {
                width: 320px;
                height: 100vh;
                position: fixed;
                right: 0;
                top: 0;
                border-top: none;
                border-left: 1px solid #374151;
            }
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-30 pointer-events-none">
            <a href="index.html" class="inline-block mb-2 text-blue-400 pointer-events-auto text-sm">← Forside</a>
            <h1 class="text-xl md:text-2xl font-bold text-white drop-shadow-md">Brintatom Orbitaler</h1>
        </div>
    </div>

    <div class="flex flex-col flex-grow">
        
        <div class="ui-section p-4 border-b border-gray-700">
            <div class="max-w-xl mx-auto md:mx-0">
                <div class="flex items-center gap-4 mb-4">
                    <label for="n-select" class="font-bold text-blue-400">Niveau (n):</label>
                    <select id="n-select" class="bg-gray-800 border border-gray-600 text-white rounded-lg p-2 flex-grow">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>

                <div id="orbital-controls" class="flex flex-wrap gap-2 mb-6">
                    <div data-n-level="1" class="flex flex-wrap gap-2 w-full">
                        <button data-orbital="1s" class="orbital-button active px-4 py-2 rounded-lg bg-gray-800">1s</button>
                    </div>
                    <div data-n-level="2" class="hidden flex-wrap gap-2 w-full">
                        <button data-orbital="2s" class="orbital-button px-4 py-2 rounded-lg bg-gray-800">2s</button>
                        <button data-orbital="2p" class="orbital-button px-4 py-2 rounded-lg bg-gray-800">2p</button>
                    </div>
                    <div data-n-level="3" class="hidden flex-wrap gap-2 w-full">
                        <button data-orbital="3s" class="orbital-button px-4 py-2 rounded-lg bg-gray-800">3s</button>
                        <button data-orbital="3p" class="orbital-button px-4 py-2 rounded-lg bg-gray-800">3p</button>
                        <button data-orbital="3d" class="orbital-button px-4 py-2 rounded-lg bg-gray-800">3d</button>
                    </div>
                    </div>

                <div class="grid grid-cols-3 gap-4 bg-black/30 p-3 rounded-xl">
                    <div class="text-center">
                        <span class="text-[10px] uppercase text-gray-500">Rotation X</span>
                        <input id="x-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                    </div>
                    <div class="text-center">
                        <span class="text-[10px] uppercase text-gray-500">Rotation Y</span>
                        <input id="y-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                    </div>
                    <div class="text-center">
                        <span class="text-[10px] uppercase text-gray-500">Rotation Z</span>
                        <input id="z-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                    </div>
                </div>
            </div>
        </div>

        <div id="info-panel" class="p-6">
            <h2 class="text-lg font-bold text-white mb-2">Spektrum & Energi</h2>
            <div id="spectrum-info-box" class="text-sm text-gray-400 mb-6 h-16">
                Tryk eller hold over en linje for detaljer.
            </div>

            <div class="relative h-48 w-full bg-gray-900/50 rounded-lg p-4 border border-gray-800">
                 <div class="absolute left-10 right-4 h-full">
                    <div class="absolute w-full border-t border-gray-700" style="bottom: 90%"><span class="absolute -left-8 text-[10px]">n=4</span></div>
                    <div class="absolute w-full border-t border-gray-700" style="bottom: 65%"><span class="absolute -left-8 text-[10px]">n=3</span></div>
                    <div class="absolute w-full border-t-2 border-blue-500" style="bottom: 35%"><span class="absolute -left-8 text-[10px] text-blue-400">n=2</span></div>
                    <div class="absolute w-full border-t border-gray-700" style="bottom: 10%"><span class="absolute -left-8 text-[10px]">n=1</span></div>
                 </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, points;
        const container = document.getElementById('canvas-container');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 2000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            setupEventListeners();
            animate();
            generateOrbital('1s');
        }

        // --- Bølgefunktioner (Forenklet for overblik, men bevaret din logik) ---
        const waveFunctions = {
            '1s': (x,y,z) => Math.exp(-2 * Math.sqrt(x*x+y*y+z*z)),
            '2s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(2-r,2)*Math.exp(-r); },
            '2p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.exp(-r); },
            '3s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(27-18*r+2*r*r,2)*Math.exp(-2*r/3); },
            // ... (Du kan indsætte alle dine øvrige funktioner her)
        };

        function generateOrbital(name) {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const count = window.innerWidth < 768 ? 30000 : 70000;
            const pos = [];
            const cols = [];
            const func = waveFunctions[name] || waveFunctions['1s'];
            const box = name.startsWith('3') ? 60 : 30;

            let i = 0;
            while (i < count) {
                const x = (Math.random()-0.5)*box;
                const y = (Math.random()-0.5)*box;
                const z = (Math.random()-0.5)*box;
                if (func(x,y,z) > Math.random() * 0.5) {
                    pos.push(x,y,z);
                    const c = new THREE.Color().setHSL(0.6, 0.8, 0.5);
                    cols.push(c.r, c.g, c.b);
                    i++;
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.15, vertexColors: true, transparent: true, opacity: 0.7}));
            scene.add(points);
        }

        function setupEventListeners() {
            const nSelect = document.getElementById('n-select');
            nSelect.addEventListener('change', () => {
                const val = nSelect.value;
                document.querySelectorAll('[data-n-level]').forEach(el => {
                    el.classList.toggle('hidden', el.dataset.nLevel !== val);
                });
            });

            document.querySelectorAll('.orbital-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.orbital-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    generateOrbital(btn.dataset.orbital);
                });
            });

            const updateRot = () => {
                const x = document.getElementById('x-slider').value;
                const y = document.getElementById('y-slider').value;
                const z = document.getElementById('z-slider').value;
                if (points) points.rotation.set(x, y, z);
                controls.autoRotate = false;
            };

            ['x-slider', 'y-slider', 'z-slider'].forEach(id => {
                document.getElementById(id).addEventListener('input', updateRot);
            });

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
