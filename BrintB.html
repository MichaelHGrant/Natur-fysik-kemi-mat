<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom Orbital Visning - Komplet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; overflow-x: hidden; }
        #canvas-container { height: 45vh; width: 100%; position: relative; background: #000; }
        @media (min-width: 768px) {
            #canvas-container { height: 100vh; width: calc(100% - 380px); position: fixed; left: 0; }
            #ui-panel { width: 380px; margin-left: auto; min-height: 100vh; }
        }
        .ui-section { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; }
        input[type=range] { width: 100%; height: 40px; touch-action: none; cursor: pointer; }
        .orb-btn { background: #334155; border: 1px solid #475569; padding: 10px; border-radius: 8px; color: white; font-size: 14px; flex: 1; min-width: 60px; }
        .orb-btn.active { background: #3b82f6; border-color: #60a5fa; font-weight: bold; }
        select { background: #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; border: 1px solid #475569; font-size: 16px; }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10">
            <a href="index.html" class="text-blue-400 text-sm">← Tilbage</a>
            <h1 class="text-xl font-bold">Orbital Visning (n=1-6)</h1>
        </div>
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/50 z-20">
            <div class="text-blue-400 animate-pulse">Beregner...</div>
        </div>
    </div>

    <div id="ui-panel" class="ui-section">
        <div class="space-y-6">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Hovedkvantetal (n)</label>
                <select id="n-select" class="mt-2">
                    <option value="1">n = 1</option>
                    <option value="2">n = 2</option>
                    <option value="3">n = 3</option>
                    <option value="4">n = 4</option>
                    <option value="5">n = 5</option>
                    <option value="6">n = 6</option>
                </select>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Underskal (l)</label>
                <div id="l-container" class="flex flex-wrap gap-2 mt-2">
                    </div>
            </div>

            <div class="bg-black/20 p-4 rounded-xl">
                <label class="text-xs font-bold text-gray-400 uppercase">Rotation (X, Y, Z)</label>
                <input id="rot-x" type="range" min="0" max="6.28" step="0.01" value="0">
                <input id="rot-y" type="range" min="0" max="6.28" step="0.01" value="0">
                <input id="rot-z" type="range" min="0" max="6.28" step="0.01" value="0">
            </div>

            <div class="border-t border-gray-700 pt-4">
                <h3 class="text-sm font-bold text-blue-400 mb-2">Balmer-serien (n → 2)</h3>
                <div class="flex h-4 bg-gradient-to-r from-violet-500 via-cyan-400 to-red-500 rounded-full overflow-hidden">
                    <div class="flex-1 border-r border-black/20"></div>
                    <div class="flex-1 border-r border-black/20"></div>
                    <div class="flex-1"></div>
                </div>
                <p class="text-[10px] text-gray-500 mt-2">Overgange til n=2 skaber synligt lys.</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.164.1/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.164.1/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, points;
        const container = document.getElementById('canvas-container');
        const loader = document.getElementById('loader');

        // Matematiske modeller (Sandsynlighedstæthed)
        const waveFunctions = {
            '1s': (r,z,x,y) => Math.exp(-2*r),
            '2s': (r,z,x,y) => Math.pow(2-r,2)*Math.exp(-r),
            '2p': (r,z,x,y) => z*z*Math.exp(-r),
            '3s': (r,z,x,y) => Math.pow(27-18*r+2*r*r,2)*Math.exp(-2*r/3),
            '3p': (r,z,x,y) => z*z*Math.pow(6-r,2)*Math.exp(-2*r/3),
            '3d': (r,z,x,y) => (x*y*x*y)*Math.exp(-2*r/3),
            '4s': (r,z,x,y) => Math.exp(-r/2),
            '4p': (r,z,x,y) => z*z*Math.exp(-r/2),
            '4d': (r,z,x,y) => (x*y*x*y)*Math.exp(-r/2),
            '4f': (r,z,x,y) => (x*y*z*x*y*z)*Math.exp(-r/2),
            '5s': (r,z,x,y) => Math.exp(-0.4*r),
            '5p': (r,z,x,y) => z*z*Math.exp(-0.4*r),
            '5d': (r,z,x,y) => (x*y*x*y)*Math.exp(-0.4*r),
            '6s': (r,z,x,y) => Math.exp(-0.33*r),
            '6p': (r,z,x,y) => z*z*Math.exp(-0.33*r)
        };

        const config = {
            '1': { box: 15, maxP: 1.0, sub: ['1s'] },
            '2': { box: 30, maxP: 0.5, sub: ['2s', '2p'] },
            '3': { box: 60, maxP: 0.2, sub: ['3s', '3p', '3d'] },
            '4': { box: 100, maxP: 0.1, sub: ['4s', '4p', '4d', '4f'] },
            '5': { box: 150, maxP: 0.05, sub: ['5s', '5p', '5d'] },
            '6': { box: 210, maxP: 0.02, sub: ['6s', '6p'] }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 3000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
            container.appendChild(renderer.domElement);

            // OrbitControls er lidt anderledes uden modules
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            setupUI();
            updateButtons('1');
            generate('1s');
            animate();
        }

        function generate(name) {
            loader.classList.remove('hidden');
            setTimeout(() => {
                if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
                
                const n = name[0];
                const conf = config[n];
                const func = waveFunctions[name] || waveFunctions[n+'s'];
                
                const count = window.innerWidth < 768 ? 25000 : 60000;
                const pos = [];
                const cols = [];
                const color = new THREE.Color();

                for (let i = 0; i < count; i++) {
                    const x = (Math.random()-0.5)*conf.box;
                    const y = (Math.random()-0.5)*conf.box;
                    const z = (Math.random()-0.5)*conf.box;
                    const r = Math.sqrt(x*x+y*y+z*z);
                    
                    if (func(r,z,x,y) > Math.random() * conf.maxP) {
                        pos.push(x,y,z);
                        color.setHSL(0.55 + (z/conf.box)*0.1, 0.8, 0.5);
                        cols.push(color.r, color.g, color.b);
                    }
                }

                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
                geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
                
                points = new THREE.Points(geo, new THREE.PointsMaterial({
                    size: n > 3 ? 0.3 : 0.15, vertexColors: true, transparent: true, opacity: 0.7
                }));
                scene.add(points);
                camera.position.z = conf.box * 1.5;
                loader.classList.add('hidden');
            }, 50);
        }

        function updateButtons(n) {
            const lContainer = document.getElementById('l-container');
            lContainer.innerHTML = '';
            config[n].sub.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = 'orb-btn' + (sub === n+'s' ? ' active' : '');
                btn.innerText = sub;
                btn.onclick = () => {
                    document.querySelectorAll('.orb-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    generate(sub);
                };
                lContainer.appendChild(btn);
            });
        }

        function setupUI() {
            const nSel = document.getElementById('n-select');
            nSel.onchange = () => { updateButtons(nSel.value); generate(nSel.value+'s'); };

            const rx = document.getElementById('rot-x');
            const ry = document.getElementById('rot-y');
            const rz = document.getElementById('rot-z');
            const updateRot = () => { if(points) points.rotation.set(rx.value, ry.value, rz.value); };
            [rx, ry, rz].forEach(s => s.oninput = updateRot);

            window.onresize = () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
