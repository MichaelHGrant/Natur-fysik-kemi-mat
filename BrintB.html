<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom Orbital Visning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #E5E7EB;
            margin: 0;
        }

        #canvas-container {
            height: 45vh; /* Fylder knap halvdelen af skærmen på mobil */
            width: 100%;
            position: relative;
            background: radial-gradient(circle, #1f2937 0%, #111827 100%);
        }

        @media (min-width: 768px) {
            #canvas-container {
                height: 100vh;
                position: fixed;
                left: 0;
                top: 0;
                width: calc(100% - 350px);
            }
            body { overflow: hidden; }
        }

        .ui-panel {
            background-color: #111827;
            z-index: 20;
            border-top: 1px solid #374151;
        }

        @media (min-width: 768px) {
            .ui-panel {
                width: 350px;
                height: 100vh;
                position: fixed;
                right: 0;
                top: 0;
                border-top: none;
                border-left: 1px solid #374151;
                overflow-y: auto;
            }
        }

        /* Slider & Knapper */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 35px; /* Stor touch-flade */
            background: transparent;
            touch-action: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: #374151;
            height: 6px;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: #60A5FA;
            margin-top: -8px;
            border: 2px solid #111827;
        }

        .orbital-button {
            transition: all 0.2s;
            border: 1px solid #374151;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 8px;
            background: #1f2937;
            touch-action: manipulation;
        }

        .orbital-button.active {
            background-color: #3B82F6;
            color: white;
            border-color: #60A5FA;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-30 pointer-events-none">
            <a href="index.html" class="inline-block mb-1 text-blue-400 pointer-events-auto text-sm">← Forside</a>
            <h1 class="text-xl font-bold text-white drop-shadow-md">Brintatom Orbitaler</h1>
        </div>
    </div>

    <div class="ui-panel flex flex-col p-4 md:p-6">
        <div class="mb-6">
            <label for="n-select" class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-2">Hovedkvantetal (n)</label>
            <select id="n-select" class="w-full bg-gray-800 border border-gray-600 text-white rounded-xl p-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="1">n = 1</option>
                <option value="2">n = 2</option>
                <option value="3">n = 3</option>
                <option value="4">n = 4</option>
                <option value="5">n = 5</option>
                <option value="6">n = 6</option>
            </select>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Underskaller</label>
            <div id="orbital-controls" class="flex flex-wrap gap-2">
                <div data-n-level="1" class="flex flex-wrap gap-2 w-full">
                    <button data-orbital="1s" class="orbital-button active">1s</button>
                </div>
                <div data-n-level="2" class="hidden flex-wrap gap-2 w-full">
                    <button data-orbital="2s" class="orbital-button">2s</button>
                    <button data-orbital="2p" class="orbital-button">2p</button>
                </div>
                <div data-n-level="3" class="hidden flex-wrap gap-2 w-full">
                    <button data-orbital="3s" class="orbital-button">3s</button>
                    <button data-orbital="3p" class="orbital-button">3p</button>
                    <button data-orbital="3d" class="orbital-button">3d</button>
                </div>
                <div data-n-level="4" class="hidden flex-wrap gap-2 w-full">
                    <button data-orbital="4s" class="orbital-button">4s</button>
                    <button data-orbital="4p" class="orbital-button">4p</button>
                    <button data-orbital="4d" class="orbital-button">4d</button>
                    <button data-orbital="4f" class="orbital-button">4f</button>
                </div>
                <div data-n-level="5" class="hidden flex-wrap gap-2 w-full">
                    <button data-orbital="5s" class="orbital-button">5s</button>
                    <button data-orbital="5p" class="orbital-button">5p</button>
                    <button data-orbital="5d" class="orbital-button">5d</button>
                    <button data-orbital="5f" class="orbital-button">5f</button>
                    <button data-orbital="5g" class="orbital-button">5g</button>
                </div>
                <div data-n-level="6" class="hidden flex-wrap gap-2 w-full">
                    <button data-orbital="6s" class="orbital-button">6s</button>
                    <button data-orbital="6p" class="orbital-button">6p</button>
                    <button data-orbital="6d" class="orbital-button">6d</button>
                    <button data-orbital="6f" class="orbital-button">6f</button>
                    <button data-orbital="6g" class="orbital-button">6g</button>
                    <button data-orbital="6h" class="orbital-button">6h</button>
                </div>
            </div>
        </div>

        <div class="bg-gray-900/50 p-4 rounded-2xl mb-6">
            <span class="block text-xs font-bold text-gray-500 mb-4 uppercase">Manuel Rotation (X, Y, Z)</span>
            <div class="space-y-2">
                <input id="x-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                <input id="y-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                <input id="z-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
            </div>
        </div>

        <div class="mt-auto border-t border-gray-800 pt-6">
            <h3 class="font-bold text-white mb-2">Spektrum Info</h3>
            <p id="spectrum-info-box" class="text-sm text-gray-400 leading-relaxed">
                Vælg en orbital for at se dens bølgefunktion. Overgange mellem disse niveauer skaber brintatomets karakteristiske spektrallinjer.
            </p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, points;
        const container = document.getElementById('canvas-container');

        const a0 = 1; 
        const waveFunctions = {
            '1s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.exp(-2*r/a0); },
            '2s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(2-r/a0,2)*Math.exp(-r/a0); },
            '2p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.exp(-r/a0); },
            '3s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(27-18*r/a0+2*Math.pow(r/a0,2),2)*Math.exp(-2*r/(3*a0)); },
            '3p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.pow(6-r/a0,2)*Math.exp(-2*r/(3*a0)); },
            '3d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y,2)*Math.exp(-2*r/(3*a0)); },
            '4s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(1-0.75*r+0.125*r*r-0.005*r*r*r,2)*Math.exp(-r/2); },
            '4p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(z*(1-r/4+r*r/80),2)*Math.exp(-r/2); },
            '4d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y*(1-r/12),2)*Math.exp(-r/2); },
            '4f': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(z*(5*z*z-3*r*r),2)*Math.exp(-r/2); },
            '5s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(1-r+0.2*r*r-0.06*r*r*r+0.002*r*r*r*r,2)*Math.exp(-0.4*r); },
            '5p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(z*(1-0.37*r+0.025*r*r),2)*Math.exp(-0.4*r); },
            '5d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y*(1-r/6+r*r/168),2)*Math.exp(-0.4*r); },
            '5f': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(z*(5*z*z-3*r*r)*(1-r/20),2)*Math.exp(-0.4*r); },
            '5g': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y*(x*x-y*y),2)*Math.exp(-0.4*r); },
            '6s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(1-0.8*r+0.25*r*r-0.03*r*r*r,2)*Math.exp(-r/3); },
            '6p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(z*(1-0.5*r+0.1*r*r),2)*Math.exp(-r/3); },
            '6d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y*(1-0.1*r+0.003*r*r),2)*Math.exp(-r/3); },
            '6f': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(z*(5*z*z-3*r*r)*(1-0.03*r),2)*Math.exp(-r/3); },
            '6g': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y*(x*x-y*y)*(1-r/42),2)*Math.exp(-r/3); },
            '6h': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(z*(33*z*z*z*z-30*z*z*r*r+5*r*r*r*r),2)*Math.exp(-r/3); }
        };

        const orbitalParams = {
            '1': { box: 15, maxP: 1.0 }, '2': { box: 30, maxP: 0.5 }, '3': { box: 60, maxP: 0.2 },
            '4': { box: 100, maxP: 0.1 }, '5': { box: 150, maxP: 0.05 }, '6': { box: 210, maxP: 0.02 }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 2000);
            camera.position.z = 80;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.8;

            setupUI();
            animate();
            generateOrbital('1s');
        }

        function generateOrbital(name) {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const count = window.innerWidth < 768 ? 40000 : 70000;
            const pos = [];
            const cols = [];
            const n = name[0];
            const p = orbitalParams[n];
            const func = waveFunctions[name];

            let i = 0;
            while (i < count) {
                const x = (Math.random()-0.5)*p.box;
                const y = (Math.random()-0.5)*p.box;
                const z = (Math.random()-0.5)*p.box;
                if (func(x,y,z) > Math.random() * p.maxP) {
                    pos.push(x,y,z);
                    const c = new THREE.Color().setHSL(0.55 + (z/p.box)*0.2, 0.8, 0.5);
                    cols.push(c.r, c.g, c.b);
                    i++;
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            
            points = new THREE.Points(geo, new THREE.PointsMaterial({
                size: n > 3 ? 0.3 : 0.15, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.7, 
                blending: THREE.AdditiveBlending
            }));
            scene.add(points);
            camera.position.z = p.box * 1.5;
        }

        function setupUI() {
            const nSelect = document.getElementById('n-select');
            const xSl = document.getElementById('x-slider');
            const ySl = document.getElementById('y-slider');
            const zSl = document.getElementById('z-slider');

            nSelect.addEventListener('change', () => {
                const n = nSelect.value;
                document.querySelectorAll('[data-n-level]').forEach(el => {
                    el.classList.toggle('hidden', el.dataset.nLevel !== n);
                });
                // Auto-klik på s-orbitalen for det nye niveau
                const firstBtn = document.querySelector(`[data-n-level="${n}"] button`);
                if (firstBtn) firstBtn.click();
            });

            document.querySelectorAll('.orbital-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.orbital-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    generateOrbital(btn.dataset.orbital);
                    controls.autoRotate = false;
                });
            });

            const updateRot = () => {
                if (points) points.rotation.set(xSl.value, ySl.value, zSl.
