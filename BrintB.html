<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom Orbital Visning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        @media (min-width: 768px) {
            body { flex-direction: row; overflow: hidden; }
        }

        /* 3D Område */
        #canvas-container {
            flex: 1;
            height: 50vh;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        @media (min-width: 768px) {
            #canvas-container { height: 100vh; }
        }

        /* Kontrolpanel */
        #ui-panel {
            width: 100%;
            background: #1e293b;
            padding: 1.5rem;
            border-top: 1px solid #334155;
            z-index: 50;
            overflow-y: auto;
        }
        @media (min-width: 768px) {
            #ui-panel { width: 380px; height: 100vh; border-top: none; border-left: 1px solid #334155; }
        }

        /* Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 40px;
            background: transparent;
            touch-action: none; /* KRITISK FOR MOBIL */
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: #334155;
            height: 6px;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #3b82f6;
            margin-top: -9px;
            border: 2px solid #0f172a;
        }

        .orbital-button {
            transition: all 0.2s;
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid transparent;
            flex: 1 1 60px;
            text-align: center;
        }
        .orbital-button.active {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10">
            <h1 class="text-xl font-bold">Orbital Visning</h1>
            <p class="text-xs text-slate-400">Brintatomets elektronsky</p>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-6">
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Hovedkvantetal (n)</label>
                <select id="n-select" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="1">n = 1</option>
                    <option value="2">n = 2</option>
                    <option value="3">n = 3</option>
                    <option value="4">n = 4</option>
                    <option value="5">n = 5</option>
                    <option value="6">n = 6</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Underskal (l)</label>
                <div id="orbital-button-container" class="flex flex-wrap gap-2">
                    </div>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-xl">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-4">Manuel Rotation (X, Y, Z)</label>
                <div class="space-y-2">
                    <input id="x-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                    <input id="y-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                    <input id="z-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                </div>
            </div>

            <div class="text-xs text-slate-500 pt-4 border-t border-slate-700">
                <p>Brug én finger til at rotere orbitalen og to fingre til at zoome på mobilen.</p>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, points;
        const container = document.getElementById('canvas-container');

        // Matematiske modeller for orbitaler (Sandsynlighedstæthed)
        const a0 = 1;
        const waveFunctions = {
            '1s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.exp(-2*r/a0); },
            '2s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(2-r/a0,2)*Math.exp(-r/a0); },
            '2p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.exp(-r/a0); },
            '3s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(27-18*r/a0+2*Math.pow(r/a0,2),2)*Math.exp(-2*r/(3*a0)); },
            '3p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.pow(6-r/a0,2)*Math.exp(-2*r/(3*a0)); },
            '3d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y,2)*Math.exp(-2*r/(3*a0)); },
            '4s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(1-0.7*r+0.1*r*r,2)*Math.exp(-r/2); },
            '4p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.exp(-r/2); },
            '4d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y,2)*Math.exp(-r/2); },
            '4f': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(x*y*z,2)*Math.exp(-r/2); },
            '5s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.exp(-0.4*r); },
            '6s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.exp(-r/3); }
        };

        // Parametre for visning pr. n-niveau
        const nParams = {
            '1': { box: 15, maxP: 1.0, orbitals: ['1s'] },
            '2': { box: 30, maxP: 0.5, orbitals: ['2s', '2p'] },
            '3': { box: 60, maxP: 0.2, orbitals: ['3s', '3p', '3d'] },
            '4': { box: 100, maxP: 0.1, orbitals: ['4s', '4p', '4d', '4f'] },
            '5': { box: 150, maxP: 0.05, orbitals: ['5s'] },
            '6': { box: 210, maxP: 0.02, orbitals: ['6s'] }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 2000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            setupUI();
            updateOrbitalButtons('1');
            generateOrbital('1s');
            animate();
        }

        function generateOrbital(name) {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const n = name[0];
            const p = nParams[n];
            const count = window.innerWidth < 768 ? 30000 : 70000;
            const pos = [];
            const cols = [];
            const func = waveFunctions[name] || waveFunctions['1s'];

            let i = 0;
            while (i < count) {
                const x = (Math.random()-0.5)*p.box;
                const y = (Math.random()-0.5)*p.box;
                const z = (Math.random()-0.5)*p.box;
                if (func(x,y,z) > Math.random() * p.maxP) {
                    pos.push(x,y,z);
                    const color = new THREE.Color().setHSL(0.6, 0.8, 0.4 + (z/p.box));
                    cols.push(color.r, color.g, color.b);
                    i++;
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            
            points = new THREE.Points(geo, new THREE.PointsMaterial({
                size: n > 3 ? 0.4 : 0.15, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.7, 
                blending: THREE.AdditiveBlending
            }));
            scene.add(points
