<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom Orbital Visning - Mobil Optimeret</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        @media (min-width: 768px) {
            body { flex-direction: row; overflow: hidden; }
        }
        #canvas-container {
            flex: 1;
            height: 45vh;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        @media (min-width: 768px) {
            #canvas-container { height: 100vh; }
        }
        #ui-panel {
            width: 100%;
            background: #1e293b;
            padding: 1.5rem;
            border-top: 1px solid #334155;
            z-index: 50;
            overflow-y: auto;
        }
        @media (min-width: 768px) {
            #ui-panel { width: 380px; height: 100vh; border-top: none; border-left: 1px solid #334155; }
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 40px;
            background: transparent;
            touch-action: none; /* Stopper scroll ved berøring */
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: #334155;
            height: 8px;
            border-radius: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 26px;
            width: 26px;
            border-radius: 50%;
            background: #3b82f6;
            margin-top: -9px;
            border: 2px solid #0f172a;
        }
        .orbital-button {
            transition: all 0.2s;
            background: #334155;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid #475569;
            flex: 1 1 70px;
            text-align: center;
        }
        .orbital-button.active {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10 pointer-events-none">
            <h1 class="text-xl font-bold text-white drop-shadow-md">Orbital Visning</h1>
            <p class="text-xs text-blue-300">Bohrs atommodel i 3D</p>
        </div>
        <div id="loading-indicator" class="hidden absolute inset-0 flex items-center justify-center bg-black/20 z-20">
            <span class="bg-blue-600 px-4 py-2 rounded-full text-xs animate-pulse">Beregner elektronsky...</span>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Hovedkvantetal (n)</label>
                <select id="n-select" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                    <option value="1">n = 1 (K-skal)</option>
                    <option value="2">n = 2 (L-skal)</option>
                    <option value="3">n = 3 (M-skal)</option>
                    <option value="4">n = 4 (N-skal)</option>
                    <option value="5">n = 5 (O-skal)</option>
                    <option value="6">n = 6 (P-skal)</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Underskaller (l)</label>
                <div id="orbital-button-container" class="flex flex-wrap gap-2">
                    </div>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-2xl border border-slate-800">
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Manuel Rotation</label>
                <div class="space-y-2">
                    <input id="x-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                    <input id="y-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                    <input id="z-slider" type="range" min="-3.14" max="3.14" value="0" step="0.01">
                </div>
            </div>

            <div class="text-[11px] text-slate-500 text-center">
                <p>Brug fingre til at rotere/zoome.<br>Højere n-værdier er større og kræver zoom-ud.</p>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, points;
        const container = document.getElementById('canvas-container');
        const loader = document.getElementById('loading-indicator');

        // Matematiske modeller
        const a0 = 1;
        const waveFunctions = {
            '1s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.exp(-2*r/a0); },
            '2s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(2-r/a0,2)*Math.exp(-r/a0); },
            '2p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.exp(-r/a0); },
            '3s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.pow(27-18*r+2*r*r,2)*Math.exp(-2*r/3); },
            '3p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.pow(6-r,2)*Math.exp(-2*r/3); },
            '3d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return x*x*y*y*Math.exp(-2*r/3); },
            '4s': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return Math.exp(-r/2); },
            '4p': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return z*z*Math.exp(-r/2); },
            '4d': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return x*x*y*y*Math.exp(-r/2); },
            '4f': (x,y,z) => { const r = Math.sqrt(x*x+y*y+z*z); return x*y*z*x*y*z*Math.exp(-r/2); },
            '5s': (x,y,z) => Math.exp(-0.4*Math.sqrt(x*x+y*y+z*z)),
            '6s': (x,y,z) => Math.exp(-0.33*Math.sqrt(x*x+y*y+z*z))
        };

        const nParams = {
            '1': { box: 12, maxP: 1.0, sub: ['1s'] },
            '2': { box: 25, maxP: 0.5, sub: ['2s', '2p'] },
            '3': { box: 55, maxP: 0.2, sub: ['3s', '3p', '3d'] },
            '4': { box: 90, maxP: 0.1, sub: ['4s', '4p', '4d', '4f'] },
            '5': { box: 140, maxP: 0.05, sub: ['5s', '5p', '5d'] },
            '6': { box: 200, maxP: 0.02, sub: ['6s', '6p', '6d'] }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 3000);
            camera.position.z = 40;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            setupUI();
            updateOrbitalButtons('1');
            generateOrbital('1s');
            animate();
        }

        function generateOrbital(name) {
            loader.classList.remove('hidden');
            
            // Brug timeout så UI ikke fryser mens vi regner
            setTimeout(() => {
                if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
                
                const n = name[0];
                const p = nParams[n] || nParams['1'];
                const count = window.innerWidth < 768 ? 35000 : 75000;
                const pos = [];
                const cols = [];
                const func = waveFunctions[name] || waveFunctions[n + 's'] || waveFunctions['1s'];

                let i = 0;
                while (i < count) {
                    const x = (Math.random()-0.5)*p.box;
                    const y = (Math.random()-0.5)*p.box;
                    const z = (Math.random()-0.5)*p.box;
                    if (func(x,y,z) > Math.random() * p.maxP) {
                        pos.push(x,y,z);
                        const color = new THREE.Color().setHSL(0.55 + (z/p.box)*0.1, 0.8, 0.5);
                        cols.push(color.r, color.g, color.b);
                        i++;
                    }
                }

                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
                geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
                
                points = new THREE.Points(geo, new THREE.PointsMaterial({
                    size: n > 3 ? 0.35 : 0.18, 
                    vertexColors: true, 
                    transparent: true, 
                    opacity: 0.6, 
                    blending: THREE.AdditiveBlending
                }));
                scene.add(points);
                
                // Tilpas zoom
                camera.position.z = p.box * 1.4;
                loader.classList.add('hidden');
            }, 10);
        }

        function updateOrbitalButtons(n) {
            const btnContainer = document.getElementById('orbital-button-container');
            btnContainer.innerHTML = '';
            
            nParams[n].sub.forEach(orbName => {
                const btn = document.createElement('button');
                btn.className = 'orbital-button';
                if (orbName === n + 's') btn.classList.add('active');
                btn.innerText = orbName;
                btn.onclick = () => {
                    document.querySelectorAll('.orbital-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    generateOrbital(orbName);
                    controls.autoRotate = false;
                };
                btnContainer.appendChild(btn);
            });
        }

        function setupUI() {
            const nSelect = document.getElementById('n-select');
            nSelect.onchange = () => {
                updateOrbitalButtons(nSelect.value);
                generateOrbital(nSelect.value + 's');
            };

            const xSl = document.getElementById('x-slider');
            const ySl = document.getElementById('y-slider');
            const zSl = document.getElementById('z-slider');

            const updateRot = () => {
                if (points) points.rotation.set(xSl.value, ySl.value, zSl.value);
                controls.autoRotate = false;
            };
            [xSl, ySl, zSl].forEach(s => s.oninput = updateRot);

            window.onresize = () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
