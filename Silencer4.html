<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>DTU Lyddæmper Simulator - 100% HP BASIC Port</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #e9ecef; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .btn-group { grid-column: span 2; display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; min-width: 200px; color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        .btn-calc { background: #27ae60; }
        .btn-calc:hover { background: #2ecc71; }
        .btn-toggle { background: #8e44ad; display: none; }
        .btn-toggle:hover { background: #9b59b6; }
        
        .chart-container { position: relative; height: 500px; width: 100%; margin-top: 20px; }
        pre { background: #1e1e1e; color: #4af626; padding: 15px; border-radius: 5px; overflow-y: auto; height: 150px; font-family: 'Courier New', Courier, monospace; font-size: 12px; margin-top: 20px; }
        .warning { font-size: 12px; color: #e74c3c; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">Fig. 3.10b - 1989 HP BASIC Algoritme</h1>
    
    <div class="control-panel">
        <div class="input-group">
            <label>Flow resistivity (Sigma) [N·s/m4]:</label>
            <input type="text" id="inpFlow" value="8500">
            <span class="warning">Brug IKKE punktum til tusinder!</span>
        </div>
        <div class="input-group">
            <label>Lydens hastighed, c [m/s]:</label>
            <input type="text" id="inpC" value="344,246">
        </div>
        <div class="input-group">
            <label>Beklædningstykkelse, d [m]:</label>
            <input type="text" id="inpLining" value="0,05">
        </div>
        <div class="input-group">
            <label>Rørets halve bredde, l [m]:</label>
            <input type="text" id="inpDuct" value="0,25">
        </div>
        
        <div class="btn-group">
            <button class="btn-calc" onclick="startSimulation()">1. Kør HP BASIC Port</button>
            <button id="btnToggle" class="btn-toggle" onclick="toggleGraphView()">2. Vis Fig. 3.10a (Envelope)</button>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="resultChart"></canvas>
    </div>

    <pre id="output">SYSTEM READY. FORTEGN RETTET. VENTER PÅ RUN...</pre>
</div>

<script>
// Pålidelig udlæsning af danske kommatal
function parseDanishNumber(id) {
    let str = document.getElementById(id).value.trim();
    str = str.replace(',', '.');
    return parseFloat(str);
}

// --- KOMPLEKS MATEMATIK ---
class Complex {
    constructor(r, i) { this.r = r; this.i = i; }
    add(c) { return new Complex(this.r + c.r, this.i + c.i); }
    sub(c) { return new Complex(this.r - c.r, this.i - c.i); }
    mult(c) { return new Complex(this.r * c.r - this.i * c.i, this.r * c.i + this.i * c.r); }
    div(c) {
        let den = c.r * c.r + c.i * c.i;
        if (den === 0) return new Complex(0,0);
        return new Complex((this.r * c.r + this.i * c.i) / den, (this.i * c.r - this.r * c.i) / den);
    }
    scale(s) { return new Complex(this.r * s, this.i * s); }
    sqrt() {
        let mag = Math.sqrt(this.r * this.r + this.i * this.i);
        let angle = Math.atan2(this.i, this.r);
        return new Complex(Math.sqrt(mag) * Math.cos(angle / 2), Math.sqrt(mag) * Math.sin(angle / 2));
    }
    tan() {
        if (this.i > 25) return new Complex(0, 1);
        if (this.i < -25) return new Complex(0, -1);
        let den = Math.cos(2 * this.r) + Math.cosh(2 * this.i);
        if (den === 0) return new Complex(0, 0);
        return new Complex(Math.sin(2 * this.r) / den, Math.sinh(2 * this.i) / den);
    }
    log() {
        let mag = Math.sqrt(this.r * this.r + this.i * this.i);
        let angle = Math.atan2(this.i, this.r);
        return new Complex(Math.log(mag), angle);
    }
    atan() {
        let iz = new Complex(-this.i, this.r); 
        let one = new Complex(1, 0);
        let num = one.sub(iz);
        let den = one.add(iz);
        let log_val = num.div(den).log(); 
        return new Complex(-log_val.i / 2, log_val.r / 2);
    }
}

let globalPlot00 = [];
let globalPlot02 = [];
let globalPlotTotal = [];
let isShowingMeasured = false; 
let chartInstance = null;
const RHO = 1.205; 

function print(text) {
    let out = document.getElementById("output");
    out.innerText += "\n" + text;
    out.scrollTop = out.scrollHeight; 
}

function startSimulation() {
    print("------------------------------------------");
    print("INITIATING HP BASIC ALGORITHM...");
    isShowingMeasured = false;
    document.getElementById("btnToggle").style.display = "inline-block";
    document.getElementById("btnToggle").innerText = "2. Vis Fig. 3.10a (Envelope)";
    document.getElementById("mainTitle").innerText = "Fig. 3.10b - 1989 HP BASIC Algoritme";
    setTimeout(runMath, 50);
}

function toggleGraphView() {
    if (globalPlot00.length === 0) return; 
    isShowingMeasured = !isShowingMeasured;
    let btn = document.getElementById("btnToggle");
    let title = document.getElementById("mainTitle");

    if (isShowingMeasured) {
        btn.innerText = "2. Vis Fig. 3.10b (Modes)";
        title.innerText = "Fig. 3.10a (Fysisk Måling)";
    } else {
        btn.innerText = "2. Vis Fig. 3.10a (Envelope)";
        title.innerText = "Fig. 3.10b - 1989 HP BASIC Algoritme";
    }
    renderCurrentChart();
}

function runMath() {
    try {
        let flowRes = parseDanishNumber("inpFlow");
        let C_val = parseDanishNumber("inpC"); 
        let thick = parseDanishNumber("inpLining");
        let L1 = parseDanishNumber("inpDuct"); 
        
        let fullDuctWidth = 2 * L1; 
        let b = thick / L1; 

        globalPlot00 = [];
        globalPlot02 = [];
        globalPlotTotal = [];

        let freqs = [];
        for (let f = 62.5; f <= 4000; f += 2.5) freqs.push(f);

        let calcAttenuation = function(w_complex, f) {
            let K = 2 * Math.PI * f / C_val;
            let w_sq = w_complex.mult(w_complex);
            let kl_sq = new Complex(K * L1, 0).mult(new Complex(K * L1, 0));
            let gam_l = w_sq.sub(kl_sq).sqrt();
            let Gamma = new Complex(gam_l.r / L1, gam_l.i / L1);
            if (Gamma.r < 0) Gamma = new Complex(-Gamma.r, -Gamma.i);
            return (8.686 * Gamma.r) * fullDuctWidth;
        };

        let getParams = function(f) {
            let Af = flowRes / RHO / f;
            let K = 2 * Math.PI * f / C_val;
            let Zr, Zi, Gamr, Gami;
            
            // Ligninger fra HP BASIC Line 8110-8160 
            if (Af < 60) {
                let logA = Math.log(Af);
                Zr = 1 + 0.04885 * Math.exp(0.754 * logA);
                Zi = -0.087 * Math.exp(0.7307 * logA);
                Gamr = K * 0.189 * Math.exp(0.6185 * logA);
                Gami = K * (1 + 0.0978 * Math.exp(-0.6929 * logA)); // Negativ eksponent!
            } else {
                let term = new Complex(-1.4664, 0.2115 * Af);
                let sqrtTerm = term.sqrt();
                Gamr = K * sqrtTerm.r;
                Gami = K * sqrtTerm.i;
                let numerator = new Complex(Af / (2 * Math.PI), 1.4035);
                let Z_val = numerator.div(sqrtTerm);
                Zr = Z_val.r;
                Zi = Z_val.i;
            }

            let Z_c = new Complex(Zr, Zi);
            let Gam_c = new Complex(Gamr, Gami);
            
            // --- DET KRITISKE PUNKT! ---
            // Fra din Line 9300: CALL Cdiv(0, -Rho*C*K, E1, E2, M1, M2)
            // Her skal leddet være NEGATIVT! 
            let num = new Complex(0, -K * RHO * C_val); 
            let den = Z_c.mult(Gam_c);
            let M = num.div(den); 
            
            let hl_complex = Gam_c.scale(L1); 
            let kl_complex = new Complex(K * L1, 0);
            let p2 = hl_complex.mult(hl_complex).sub(kl_complex.mult(kl_complex));
            return { p2: p2, M: M };
        };

        // --- 1. SPORING AF (0,0) MED REN NEWTON-RAPHSON ---
        print("Solving (0,0) Mode (Pure Newton-Raphson)...");
        let w_00 = new Complex(0.1, 0.1); 
        let lastLastW_00 = new Complex(0.1, 0.1);
        
        for (let J = 0; J < freqs.length; J++) {
            let f = freqs[J];
            let params = getParams(f);
            
            // Linear ekstrapolering af gæt (som i linje 10700-10710)
            let guess = (J === 0) ? new Complex(0.1, 0.1) : 
                        (J === 1 ? w_00 : w_00.add(w_00.sub(lastLastW_00)));
                        
            let w = new Complex(guess.r, guess.i);
            let conv = false;

            for (let iter = 0; iter < 100; iter++) {
                let w2 = w.mult(w);
                let sq = w2.add(params.p2).sqrt();
                let f_val = w.mult(w.tan()).add(params.M.mult(sq).mult(sq.scale(b).tan()));

                let dw = new Complex(1e-5, 1e-5);
                let wd = w.add(dw);
                let sqd = wd.mult(wd).add(params.p2).sqrt();
                let f_val_d = wd.mult(wd.tan()).add(params.M.mult(sqd).mult(sqd.scale(b).tan()));

                let deriv = f_val_d.sub(f_val).div(dw);
                let step = f_val.div(deriv);
                
                if (isNaN(step.r) || isNaN(step.i)) break;

                // Ingen kunstig limiter = renest mulige fysik
                w = w.sub(step);
                
                if (Math.abs(step.r) < 1e-6 && Math.abs(step.i) < 1e-6) {
                    conv = true; break;
                }
            }

            lastLastW_00 = w_00;
            w_00 = w; // Accepter roden
            globalPlot00.push({x: f, y: calcAttenuation(w_00, f)});
        }

        // --- 2. SPORING AF (0,2) MED FIXED-POINT ITERATION (Baglæns for stabilitet) ---
        print("Solving (0,2) Mode (Fixed-Point Complex Arctan)...");
        let w_02 = new Complex(Math.PI, 0.5); 
        let tempPlot02 = [];
        
        for (let J = freqs.length - 1; J >= 0; J--) {
            let f = freqs[J];
            let params = getParams(f);
            let w = new Complex(w_02.r, w_02.i);
            let conv = false;

            for (let iter = 0; iter < 150; iter++) {
                let sq = w.mult(w).add(params.p2).sqrt();
                let M_term = params.M.mult(sq).mult(sq.scale(b).tan());
                
                // Y = - (M * sq * tan) / w
                let Y = (new Complex(0,0).sub(M_term)).div(w); 
                
                // w_new = arctan(Y) + PI  (HP Basic logik for anden dal)
                let w_new = Y.atan().add(new Complex(Math.PI, 0));

                let diff_r = Math.abs(w_new.r - w.r);
                let diff_i = Math.abs(w_new.i - w.i);
                
                w = w_new;

                if (diff_r < 1e-6 && diff_i < 1e-6) {
                    conv = true; break;
                }
            }

            w_02 = w; // Accepter roden
            let atten = calcAttenuation(w_02, f);
            if (atten < 15) { // Skjul de lodrette asymptoter visuelt
                tempPlot02.push({x: f, y: atten});
            }
        }
        globalPlot02 = tempPlot02.reverse();

        // Målingens Envelope (Knækket)
        let dict02 = {};
        globalPlot02.forEach(p => dict02[p.x] = p.y);
        
        globalPlot00.forEach(p00 => {
            let f = p00.x;
            let y00 = p00.y;
            let y02 = dict02[f];
            if (y02 !== undefined) {
                globalPlotTotal.push({x: f, y: Math.min(y00, y02)});
            } else {
                globalPlotTotal.push({x: f, y: y00});
            }
        });

        print("SUCCESS! Det negative M-fortegn genskabte den rigtige matematik.");
        renderCurrentChart();

    } catch (e) {
        print(`[FATAL ERROR]: ${e.message}`);
    }
}

function renderCurrentChart() {
    let ctx = document.getElementById('resultChart').getContext('2d');
    if (chartInstance) { chartInstance.destroy(); }
    
    let datasets = [];
    if (isShowingMeasured) {
        datasets.push({
            label: 'Total Attenuation (Målt Envelope)',
            data: globalPlotTotal,
            borderColor: '#2c3e50', 
            borderWidth: 3,
            pointRadius: 0, 
            fill: true,
            backgroundColor: 'rgba(52, 73, 94, 0.1)',
            tension: 0.1
        });
    } else {
        datasets.push({
            label: '(0,0) Mode',
            data: globalPlot00,
            borderColor: '#2980b9', 
            borderWidth: 2,
            pointRadius: 0, 
            fill: false,
            tension: 0.1
        });
        datasets.push({
            label: '(0,2) Mode',
            data: globalPlot02,
            borderColor: '#e74c3c', 
            borderWidth: 2,
            pointRadius: 0, 
            fill: false,
            tension: 0.1
        });
    }

    chartInstance = new Chart(ctx, {
        type: 'line', 
        data: { datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { 
                    type: 'logarithmic', 
                    title: { display: true, text: 'Frequency [Hz]', font: {weight: 'bold'} },
                    min: 62.5,
                    max: 4000
                },
                y: { 
                    title: { display: true, text: 'Attenuation per duct width [dB]', font: {weight: 'bold'} }, 
                    min: 0,
                    max: 10 
                }
            },
            plugins: {
                zoom: { pan: { enabled: true, mode: 'xy' }, zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' } },
                annotation: {
                    annotations: {
                        label00: isShowingMeasured ? null : {
                            type: 'label', xValue: 2000, yValue: 1.5,
                            backgroundColor: 'rgba(255,255,255,0.8)', content: '(0,0)',
                            font: { size: 14, weight: 'bold' }, color: '#2980b9'
                        },
                        label02: isShowingMeasured ? null : {
                            type: 'label', xValue: 1500, yValue: 5,
                            backgroundColor: 'rgba(255,255,255,0.8)', content: '(0,2)',
                            font: { size: 14, weight: 'bold' }, color: '#e74c3c'
                        }
                    }
                }
            }
        }
    });
}
</script>

</body>
</html>
