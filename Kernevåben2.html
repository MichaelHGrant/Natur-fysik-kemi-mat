<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvantitativ Simulering af Nukleare Eksplosionstyper</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0c10; overflow: hidden; font-family: sans-serif; color: #c5c6c7; }
        canvas { display: block; }
        
        #hud-container { position: absolute; top: 25px; left: 25px; background: rgba(31, 40, 51, 0.9); padding: 25px; border-radius: 6px; border: 1px solid #45a29e; box-shadow: 0px 8px 16px rgba(0,0,0,0.6); z-index: 100; width: 340px; }
        h2 { margin-top: 0; font-size: 1.3rem; border-bottom: 2px solid #66fcf1; padding-bottom: 12px; color: #66fcf1; }
        
       .btn-panel { display: flex; flex-direction: column; gap: 12px; }
       .btn-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        
        button { background-color: #1f2833; color: #c5c6c7; border: 1px solid #45a29e; padding: 12px; cursor: pointer; border-radius: 4px; transition: all 0.25s ease-in-out; font-size: 0.95rem; text-align: left; font-weight: bold; flex-grow: 1; }
        button:hover { background-color: #45a29e; color: #0b0c10; }
       .active-mode { background-color: #66fcf1; border-color: #ffffff; color: #0b0c10; }
        
       .info-btn { flex-grow: 0; width: 40px; text-align: center; padding: 12px 0; border-radius: 4px; background-color: #0b0c10; color: #66fcf1; border: 1px solid #66fcf1; }
       .info-btn:hover { background-color: #66fcf1; color: #0b0c10; }
        
       .trigger-btn { background-color: #d11a2a; color: white; text-align: center; border: 2px solid #8b0000; margin-top: 15px; width: 100%; }
       .trigger-btn:hover { background-color: #ff2a2a; color: white; box-shadow: 0 0 10px #ff2a2a; }
        
        #telemetry { margin-top: 20px; font-size: 0.85rem; color: #c5c6c7; line-height: 1.6; background: rgba(11, 12, 16, 0.6); padding: 10px; border-radius: 4px; }

        /* Pop-up (Modal) Styling */
       .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; }
       .modal-content { background: #1f2833; padding: 30px; border-radius: 8px; border: 2px solid #45a29e; max-width: 550px; color: #c5c6c7; position: relative; font-size: 1.05rem; line-height: 1.6; box-shadow: 0px 0px 30px rgba(102, 252, 241, 0.2); }
       .modal-content h3 { color: #66fcf1; margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #45a29e; padding-bottom: 10px; }
       .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #66fcf1; font-size: 1.8rem; font-weight: bold; transition: color 0.2s; }
       .close-btn:hover { color: #ffffff; }
    </style>
</head>
<body>

<div id="hud-container">
    <h2>Kinematisk Eksplosionsmodel</h2>
    <div class="btn-panel">
        <div class="btn-row">
            <button id="btnAir" class="active-mode">Air Burst</button>
            <button class="info-btn" onclick="openModal('air')">ℹ️</button>
        </div>
        <div class="btn-row">
            <button id="btnSurface">Surface Burst</button>
            <button class="info-btn" onclick="openModal('surface')">ℹ️</button>
        </div>
        <div class="btn-row">
            <button id="btnWater">Underwater Burst</button>
            <button class="info-btn" onclick="openModal('water')">ℹ️</button>
        </div>
        <button id="btnTrigger" class="trigger-btn">INITIER DETONATION</button>
    </div>
    <div id="telemetry">
        <b>Visuel Status:</b><br>
        Vælg en eksplosionstype ovenfor, og tryk på ℹ️ for at læse om de underliggende fysiske fænomener, før du initierer detonationen.
    </div>
</div>

<div id="physicsModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Fysik Info</h3>
        <p id="modalText">Tekst her...</p>
    </div>
</div>

<canvas id="physicsCanvas"></canvas>

<script>
    const canvas = document.getElementById('physicsCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiBtnAir = document.getElementById('btnAir');
    const uiBtnSurface = document.getElementById('btnSurface');
    const uiBtnWater = document.getElementById('btnWater');
    const uiBtnTrigger = document.getElementById('btnTrigger');
    const uiTelemetry = document.getElementById('telemetry');
    
    // Modal Elementer
    const modal = document.getElementById('physicsModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');

    let activeEnvironment = 'AIR'; 
    let sysWidth, sysHeight, epicenterX, epicenterY, horizonY;
    let particleArray = new Array();
    
    let simState = {
        backgroundGradient: null,
        terrainColor: '#111',
        bubbleAmplitude: 0,
        bubblePhase: 0,
        cavitationActive: false,
        timeSinceDetonation: -1
    };

    // Fysik Database til Pop-up
    const physicsData = {
        air: {
            title: "Atmosfærisk Detonation (Air Burst)",
            text: "Ved en atmosfærisk sprængning skabes et enormt termisk glimt. Et unikt fænomen er det <b>dobbelte lysglimt</b>: Den lynhurtige chokfront komprimerer luften så voldsomt (over Mach 100), at den omdannes til et opak (uigennemsigtigt) plasma, som kortvarigt skjuler den indre ildkugle. Når fronten køler, bliver den gennemsigtig igen, og det andet glimt ses.<br><br>Selve trykbølgen danner en <b>Mach-stamme</b>, når den primære bølge sammensmeltes med refleksionen fra jorden, hvilket skaber en altudslettende, vertikal trykmur langs overfladen. Ildkuglen stiger derefter op som en varmluftsballon og danner en <b>toroidal (doughnut) cirkulation</b> – hatten på paddehatteskyen."
        },
        surface: {
            title: "Overfladedetonation (Surface Burst)",
            text: "Når bomben rører jorden, kanaliseres over halvdelen af energien direkte ned i undergrunden. Dette udløser et massivt seismisk stød og udgraver et gigantisk <b>subsidence- eller udkastningskrater</b>.<br><br>Den største fare ved denne type er <b>scavenging-effekten</b>. I stedet for at skyde radioaktiviteten op i stratosfæren, opsuger ildkuglens vakuum millioner af tons pulveriseret jord og klippe. Fissionsprodukterne fastklæber sig til disse tunge stenpartikler, som tyngdekraften hurtigt trækker ned igen. Dette skaber dødeligt og ekstremt koncentreret lokalt radioaktivt nedfald (fallout) lige omkring eksplosionszonen."
        },
        water: {
            title: "Undervandsdetonation (Underwater Burst)",
            text: "Vand adskiller sig fra luft ved at have utrolig stor mekanisk inerti og være inkompressibelt. Den termiske varme kvæles næsten øjeblikkeligt (der ses intet lysglimt). I stedet tvinger røntgenstrålingen vandet til at fordampe til en enorm <b>oscillerende dampplasma-boble</b> (inertiel kavitation).<br><br>Boblen udvider og trækker sig sammen mod det hydrostatiske tryk. Når opdriften tvinger boblen op og bryder overfladen (et blow-out), skydes en hul vandsøjle op. Når søjlen kollapser, skabes <b>basisskyen (base surge)</b>. Dette er en dødbringende, ringformet tæthedsstrøm af radioaktiv tåge, der spreder sig horisontalt med over 100 km/t og forgifter alt på sin vej."
        }
    };

    function openModal(type) {
        modalTitle.innerHTML = physicsData[type].title;
        modalText.innerHTML = physicsData[type].text;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    function adaptResolution() {
        sysWidth = canvas.width = window.innerWidth;
        sysHeight = canvas.height = window.innerHeight;
        epicenterX = sysWidth / 2;
        horizonY = sysHeight * 0.78;
        updateBackground();
    }
    window.addEventListener('resize', adaptResolution);
    
    function updateBackground() {
        if (activeEnvironment === 'WATER') {
            simState.backgroundGradient = ctx.createLinearGradient(0, 0, 0, sysHeight);
            simState.backgroundGradient.addColorStop(0, '#001a33');
            simState.backgroundGradient.addColorStop(1, '#000511');
            simState.terrainColor = '#00030a';
        } else {
            simState.backgroundGradient = '#0b0c10';
            simState.terrainColor = '#1a1c20';
        }
    }

    class Particle {
        constructor(x, y, category, colorStr, radius, velX, velY, lifetime, dragCoef, gForce) {
            this.x = x;
            this.y = y;
            this.category = category; 
            this.color = colorStr;
            this.radius = radius;
            this.originalRadius = radius;
            this.vx = velX;
            this.vy = velY;
            this.lifetime = lifetime;
            this.age = 0;
            this.opacity = 1;
            this.drag = dragCoef;
            this.gravity = gForce; 
        }

        update() {
            this.age++;
            this.vx *= this.drag;
            this.vy *= this.drag;
            this.vy += this.gravity;
            
            let isUpdraft = false;
            if (this.category === 'smoke') { isUpdraft = true; }
            if (this.category === 'fireball') { isUpdraft = true; }

            if (isUpdraft && activeEnvironment!== 'WATER') {
                let dx = this.x - epicenterX;
                if (this.y < epicenterY - 80) {
                    this.vx += dx * 0.0003; 
                    this.gravity = -0.015;  
                }
            }

            if (this.category === 'stem' && activeEnvironment!== 'WATER') {
                let dx = epicenterX - this.x;
                this.vx += dx * 0.005; 
                this.gravity = -0.025; 
            }

            this.x += this.vx;
            this.y += this.vy;

            let lifeRatio = this.age / this.lifetime;
            this.opacity = 1 - lifeRatio;
            
            let isExp = false;
            if (this.category === 'smoke') { isExp = true; }
            if (this.category === 'baseSurge') { isExp = true; }
            if (this.category === 'stem') { isExp = true; }

            if (isExp) {
                this.radius = this.originalRadius * (1 + lifeRatio * 2.5);
            } else {
                this.radius = this.originalRadius * Math.max(0.1, (1 - lifeRatio));
            }
        }

        render() {
            if (this.opacity <= 0) return;
            if (this.radius <= 0.1) return;
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }
    }

    function executeDetonation() {
        particleArray = new Array();
        simState.bubbleAmplitude = 0;
        simState.bubblePhase = 0;
        simState.timeSinceDetonation = 0;
        
        if (activeEnvironment === 'AIR') {
            epicenterY = sysHeight * 0.35;
            simState.cavitationActive = false;
        } else if (activeEnvironment === 'SURFACE') {
            epicenterY = horizonY;
            simState.cavitationActive = false;
        } else if (activeEnvironment === 'WATER') {
            epicenterY = horizonY - 150;
            simState.cavitationActive = true;
        }

        const flashPalette = new Array('#ffffff', '#ffedcc', '#ffcc00', '#ff6600', '#cc3300');
        
        let blastCount = 0;
        if (activeEnvironment === 'WATER') {
            blastCount = 1800; 
        } else {
            blastCount = 2800; 
        }
        
        for (let i = 0; i < blastCount; i++) {
            let theta = Math.random() * Math.PI * 2;
            
            let magnitude = 0;
            if (activeEnvironment === 'AIR') {
                magnitude = Math.random() * 11; 
            } else {
                magnitude = Math.random() * 7;
            }

            let vx = Math.cos(theta) * magnitude;
            let vy = Math.sin(theta) * magnitude;
            
            if (activeEnvironment === 'SURFACE' && vy > 1) {
                vy *= 0.15; 
            }
            
            let pIndex = Math.floor(Math.random() * flashPalette.length);
            let color = flashPalette[pIndex];
            
            let cat = 'smoke';
            if (Math.random() > 0.5) {
                cat = 'fireball';
            }

            if (cat === 'smoke') {
                if (activeEnvironment === 'WATER') {
                    color = '#aaccff';
                } else {
                    color = '#444444';
                }
            }
            
            let pSize = Math.random() * (activeEnvironment === 'WATER'? 8 : 16) + 3;
            let friction = activeEnvironment === 'WATER'? 0.88 : 0.96; 
            let lift = activeEnvironment === 'WATER'? -0.05 : 0.005; 
            
            let lifespan = Math.random() * 300 + 150; 
            
            particleArray.push(new Particle(epicenterX, epicenterY, cat, color, pSize, vx, vy, lifespan, friction, lift));
        }

        if (activeEnvironment!== 'WATER') {
            for (let i = 0; i < 800; i++) { 
                let vx = (Math.random() - 0.5) * 5; 
                let vy = (Math.random() * -2);      
                let pSize = Math.random() * 18 + 5;
                let lifespan = Math.random() * 400 + 150; 
                let stemColor = '#333333';
                if (Math.random() > 0.5) { stemColor = '#1f1f1f'; }
                if (Math.random() > 0.8) { stemColor = '#555555'; }
                
                particleArray.push(new Particle(epicenterX, horizonY, 'stem', stemColor, pSize, vx, vy, lifespan, 0.96, -0.015));
            }
        }

        if (activeEnvironment!== 'AIR') {
            for (let i = 0; i < 1200; i++) { 
                let side = 1;
                if (Math.random() > 0.5) { side = -1; }
                
                let vx = (Math.random() * 5 + 1) * side; 
                
                let vy = 0;
                if (activeEnvironment === 'WATER') {
                    vy = (Math.random() * 1 - 0.5);
                } else {
                    vy = -(Math.random() * 1.5);
                }

                let surgeColor = activeEnvironment === 'WATER'? 'rgba(170, 210, 230, 0.4)' : 'rgba(90, 75, 65, 0.6)';
                let yStart = activeEnvironment === 'WATER'? horizonY - 30 : horizonY;
                
                particleArray.push(new Particle(epicenterX, yStart, 'baseSurge', surgeColor, Math.random() * 30 + 15, vx, vy, 350, 0.98, 0.002));
            }
        }
    }

    function frameUpdate() {
        ctx.fillStyle = simState.backgroundGradient;
        ctx.fillRect(0, 0, sysWidth, sysHeight);
        
        if (activeEnvironment!== 'AIR') {
            ctx.fillStyle = simState.terrainColor;
            ctx.fillRect(0, horizonY, sysWidth, sysHeight - horizonY);
        }

        if (simState.timeSinceDetonation >= 0 && activeEnvironment!== 'WATER') {
            let fbTime = simState.timeSinceDetonation;
            if (fbTime < 350) { 
                let fbRadius = fbTime * 1.5; 
                if (fbRadius > 250) { fbRadius = 250; } 
                let fbOpacity = 1.0 - (fbTime / 350);
                
                ctx.save();
                ctx.globalAlpha = fbOpacity;
                ctx.beginPath();
                ctx.arc(epicenterX, epicenterY, fbRadius, 0, Math.PI * 2);
                let gradient = ctx.createRadialGradient(epicenterX, epicenterY, 0, epicenterX, epicenterY, fbRadius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.2, '#ffcc00'); 
                gradient.addColorStop(0.7, '#cc3300'); 
                gradient.addColorStop(1, 'rgba(150, 0, 0, 0)'); 
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.restore();
            }
        }

        if (activeEnvironment === 'WATER' && simState.cavitationActive && particleArray.length > 0) {
            simState.bubblePhase += 0.02; 
            let currentDepth = epicenterY - (simState.bubblePhase * 20); 
            simState.bubbleAmplitude = Math.sin(simState.bubblePhase * 0.8) * 90 + 110; 
            
            if (simState.bubbleAmplitude > 5 && currentDepth > horizonY - 300) {
                ctx.beginPath();
                ctx.arc(epicenterX, currentDepth, simState.bubbleAmplitude, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(210, 245, 255, 0.15)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(120, 200, 255, 0.6)';
                ctx.lineWidth = 3;
                ctx.stroke();
            } else if (currentDepth <= horizonY - 300) {
                simState.cavitationActive = false; 
            }
        }

        for (let i = particleArray.length - 1; i >= 0; i--) {
            let p = particleArray[i];
            p.update();
            p.render();
            if (p.age > p.lifetime) {
                particleArray.splice(i, 1);
            }
        }

        if (simState.timeSinceDetonation >= 0 && activeEnvironment!== 'WATER') {
            simState.timeSinceDetonation++;
            let t = simState.timeSinceDetonation;
            let flashOpacity = 0;
            
            if (t < 12) {
                flashOpacity = 1.0; 
            } else if (t >= 12 && t < 25) {
                flashOpacity = 0.15; 
            } else if (t >= 25 && t < 120) {
                flashOpacity = 1.0 - ((t - 25) / 95); 
            }
            
            if (flashOpacity > 0) {
                ctx.save();
                ctx.fillStyle = 'rgba(255, 250, 245, ' + flashOpacity + ')';
                ctx.fillRect(0, 0, sysWidth, sysHeight);
                ctx.restore();
            }
        } else if (activeEnvironment === 'WATER' && simState.timeSinceDetonation >= 0) {
             simState.timeSinceDetonation++; 
        }

        requestAnimationFrame(frameUpdate);
    }

    function switchMode(buttonId, envParam, telemetryText) {
        let btns = document.querySelectorAll('.btn-panel button');
        for(let i=0; i<btns.length; i++) {
            if (btns[i].classList.contains('trigger-btn') === false && btns[i].classList.contains('info-btn') === false) {
                btns[i].classList.remove('active-mode');
            }
        }
        document.getElementById(buttonId).classList.add('active-mode');
        activeEnvironment = envParam;
        uiTelemetry.innerHTML = '<b>Visuel Status:</b><br>' + telemetryText;
        updateBackground();
    }

    uiBtnAir.onclick = function() { switchMode('btnAir', 'AIR', 'En sfærisk chokfront udbredes. Først ses det dobbelte lysglimt og ildkuglen. Derefter trækker ildkuglen vakuum og danner en intens toroidal (doughnut-formet) cirkulation i toppen, mens en stamme af støv suges op for at danne den ikoniske champignonsky.'); };
    uiBtnSurface.onclick = function() { switchMode('btnSurface', 'SURFACE', 'Halvkugle-eksplosion med ildkugle og dobbelt lysglimt. Varmen overføres direkte til jorden, og der graves et krater. Det resulterende støv trækkes op gennem en tyk stamme, hvilket producerer massivt lokalt radioaktivt nedfald.'); };
    uiBtnWater.onclick = function() { switchMode('btnWater', 'WATER', 'Nedsænket eksplosion under massivt tryk. Ildkuglen kvæles øjeblikkeligt af det inkompressible vand (intet lysglimt). Udvikler pulserende kavitationsbobler og producerer en horisontal basissky (base surge).'); };
    uiBtnTrigger.onclick = executeDetonation;

    adaptResolution();
    frameUpdate();
</script>
</body>
</html>
