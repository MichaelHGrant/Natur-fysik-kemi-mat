<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv Periodisk Tabel: Kvantemekanik & Spektroskopi</title>
    <style>
        :root {
            --bg-color: #0d1117; 
            --text-color: #c9d1d9;
            --cell-bg: #161b22;
            --border-color: #30363d;
            
            --diatomic-nonmetal: #a1ffc3;
            --noble-gas: #c0ffff;
            --alkali-metal: #ff6666;
            --alkaline-earth-metal: #ffdead;
            --metalloid: #cccc99;
            --polyatomic-nonmetal: #e7ff8f;
            --post-transition-metal: #cccccc;
            --transition-metal: #f0a0a0;
            --lanthanide: #ffbfff;
            --actinide: #ff99cc;
            --unknown: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 2rem; max-width: 800px; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #ffffff; }

     .periodic-table {
            all: unset;
            display: grid;
            grid-template-columns: repeat(18, minmax(45px, 1fr));
            grid-template-rows: repeat(10, minmax(50px, auto));
            gap: 5px;
            max-width: 1400px;
            width: 100%;
        }

     .element {
            background-color: var(--cell-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            grid-column: var(--xpos);
            grid-row: var(--ypos);
            filter: brightness(0.85);
        }

     .element:hover,.element:focus {
            transform: scale(1.15) translateY(-5px);
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.9);
            filter: brightness(1.1);
        }

     .el-number { font-size: 0.75rem; align-self: flex-start; font-weight: 600; }
     .el-symbol { font-size: 1.6rem; font-weight: 800; align-self: center; margin: 2px 0; }
     .el-name { font-size: 0.65rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

     .diatomic-nonmetal { border-top: 4px solid var(--diatomic-nonmetal); }
     .noble-gas { border-top: 4px solid var(--noble-gas); }
     .alkali-metal { border-top: 4px solid var(--alkali-metal); }
     .alkaline-earth-metal { border-top: 4px solid var(--alkaline-earth-metal); }
     .metalloid { border-top: 4px solid var(--metalloid); }
     .polyatomic-nonmetal { border-top: 4px solid var(--polyatomic-nonmetal); }
     .post-transition-metal { border-top: 4px solid var(--post-transition-metal); }
     .transition-metal { border-top: 4px solid var(--transition-metal); }
     .lanthanide { border-top: 4px solid var(--lanthanide); }
     .actinide { border-top: 4px solid var(--actinide); }
     .unknown { border-top: 4px solid var(--unknown); }

        dialog {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--cell-bg);
            color: var(--text-color);
            max-width: 900px;
            width: 95%;
            padding: 0;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
