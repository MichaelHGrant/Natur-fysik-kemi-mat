<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Newtons Kanon Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #d3d3d3;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
       .container {
            background-color: #f0f0f0;
            border: 2px solid #999;
            padding: 20px;
            display: flex;
            gap: 20px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        canvas {
            background-color: white;
            border: 1px solid #ccc;
        }
       .panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 250px;
        }
       .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }
       .slider-group {
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }
       .slider-group span {
            font-weight: bold;
            color: #0055aa;
        }
        input[type=range] {
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="simCanvas" width="500" height="500"></canvas>

    <div class="panel">
        <div class="button-group">
            <button id="btnStart">Start</button>
            <button id="btnStop">Stop</button>
            <button id="btnReset">Reset</button>
        </div>

        <div class="slider-group">
            <label>Hastighed [m/s]: <span id="valSpeed">7200</span></label>
            <input type="range" id="inpSpeed" min="0" max="12000" step="10" value="7200">
        </div>

        <div class="slider-group">
            <label>Højde [km]: <span id="valHeight">1000</span></label>
            <input type="range" id="inpHeight" min="0" max="30000" step="100" value="1000">
        </div>

        <div class="slider-group">
            <label>Jordens Radius [km]: <span id="valRadius">6371</span></label>
            <input type="range" id="inpRadius" min="1000" max="10000" step="1" value="6371">
        </div>

        <div class="slider-group">
            <label>Vinkel [deg]: <span id="valAngle">0</span></label>
            <input type="range" id="inpAngle" min="-90" max="90" step="1" value="0">
        </div>

        <div class="slider-group">
            <label>Gravity Power: <span id="valPower">2.00</span></label>
            <input type="range" id="inpPower" min="1.0" max="3.0" step="0.01" value="2.0">
        </div>
    </div>
</div>

<script>
    // Fysiske konstanter fra billedet
    const G = 6.6738e-11;
    const M = 5.97219e24;
    const GM = G * M;

    // Hent HTML-elementerne
    const canvas = document.getElementById("simCanvas");
    const ctx = canvas.getContext("2d");

    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const btnReset = document.getElementById("btnReset");

    const inpSpeed = document.getElementById("inpSpeed");
    const inpHeight = document.getElementById("inpHeight");
    const inpRadius = document.getElementById("inpRadius");
    const inpAngle = document.getElementById("inpAngle");
    const inpPower = document.getElementById("inpPower");

    const valSpeed = document.getElementById("valSpeed");
    const valHeight = document.getElementById("valHeight");
    const valRadius = document.getElementById("valRadius");
    const valAngle = document.getElementById("valAngle");
    const valPower = document.getElementById("valPower");

    // Simuleringstilstand (State)
    let isRunning = false;
    let x = 0;
    let y = 0;
    let vx = 0;
    let vy = 0;
    let trail =;

    // Skaleringsfaktor for grafikken (1 pixel svarer til ca. 80 km, så høje kredsløb kan ses)
    const scale = 250 / 40000000; 

    // Funktion til at genstarte kredsløbet
    function resetSimulation() {
        isRunning = false;
        trail =;

        // Hent værdier fra sliderne og omregn til meter og radianer
        let speed = parseFloat(inpSpeed.value);
        let height = parseFloat(inpHeight.value) * 1000; 
        let radius = parseFloat(inpRadius.value) * 1000; 
        let angle_rad = parseFloat(inpAngle.value) * Math.PI / 180;

        // Kanonen placeres på toppen af Jorden + bjerg-højden
        x = 0;
        y = radius + height;

        // Udregn starthastighed for x og y
        vx = speed * Math.cos(angle_rad);
        vy = speed * Math.sin(angle_rad);

        drawGraphics();
    }

    // Funktion til at tegne Jorden og kanonkuglen
    function drawGraphics() {
        // Ryd lærredet hver frame
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gem standardtilstanden og flyt centrum til midten af lærredet
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(1, -1); // Vend y-aksen, så opad er positivt (matematisk standard)

        let radius_m = parseFloat(inpRadius.value) * 1000;

        // 1. Tegn den grønne Jordklode
        ctx.beginPath();
        ctx.arc(0, 0, radius_m * scale, 0, 2 * Math.PI);
        ctx.fillStyle = "#00cc00"; // Grøn
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = "black";
        ctx.stroke();

        // 2. Tegn kanonkuglens spor (banen)
        if (trail.length > 0) {
            ctx.beginPath();
            ctx.moveTo(trail.x * scale, trail.y * scale);
            for (let i = 1; i < trail.length; i++) {
                ctx.lineTo(trail[i].x * scale, trail[i].y * scale);
            }
            ctx.strokeStyle = "#333333";
            ctx.stroke();
        }

        // 3. Tegn selve kanonkuglen/satellitten
        ctx.beginPath();
        ctx.arc(x * scale, y * scale, 4, 0, 2 * Math.PI);
        ctx.fillStyle = "red"; // Rød
        ctx.fill();

        ctx.restore();
    }

    // Matematikken (Newtons love)
    function physicsLoop() {
        if (!isRunning) return;

        let radius_m = parseFloat(inpRadius.value) * 1000;
        let power = parseFloat(inpPower.value);
        
        let dt = 1;         // Tids-skridt per beregning
        let subSteps = 100; // Antal gange fysikken beregnes per billede (for høj fart)

        for (let i = 0; i < subSteps; i++) {
            let r = Math.sqrt(x*x + y*y);

            // Stop simulationen hvis satellitten rammer Jorden
            if (r <= radius_m) {
                isRunning = false;
                break;
            }

            // Beregn tyngdeaccelerationen: a = -GM / r^power
            let a_mag = -GM / Math.pow(r, power);
            let ax = a_mag * (x / r);
            let ay = a_mag * (y / r);

            // Opdater hastighed og position
            vx += ax * dt;
            vy += ay * dt;
            x += vx * dt;
            y += vy * dt;
        }

        // Tilføj den nye position til sporet (hvis den kører)
        if (isRunning) {
            trail.push({x: x, y: y});
        }
    }

    // Selve animations-motoren i browseren
    function animate() {
        physicsLoop();
        drawGraphics();
        requestAnimationFrame(animate); // Bed browseren om at tegne næste billede
    }

    // Forbind knapperne
    btnStart.onclick = function() { isRunning = true; };
    btnStop.onclick = function() { isRunning = false; };
    btnReset.onclick = resetSimulation;

    // Forbind sliderne så tallene opdateres live
    inpSpeed.oninput = function() { valSpeed.innerText = this.value; resetSimulation(); };
    inpHeight.oninput = function() { valHeight.innerText = this.value; resetSimulation(); };
    inpRadius.oninput = function() { valRadius.innerText = this.value; resetSimulation(); };
    inpAngle.oninput = function() { valAngle.innerText = this.value; resetSimulation(); };
    inpPower.oninput = function() { valPower.innerText = parseFloat(this.value).toFixed(2); resetSimulation(); };

    // Klargør og start programmet
    resetSimulation();
    animate();

</script>
</body>
</html>
