<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Newton's Cannon - Interactive</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0e5ec; padding: 20px; display: flex; justify-content: center; }
       .app-container { background: #f0f0f0; border: 2px solid #a0a0a0; padding: 10px; width: 1000px; display: grid; grid-template-columns: 200px 500px 250px; gap: 15px; box-shadow: 4px 4px 15px rgba(0,0,0,0.2); }
       .toolbar { grid-column: 1 / -1; display: flex; gap: 10px; background: #fff; padding: 10px; border: 1px solid #ccc; align-items: center; }
        button { padding: 5px 15px; font-size: 14px; cursor: pointer; background: #e1e1e1; border: 1px solid #999; border-radius: 3px; }
        button:hover { background: #d1d1d1; }
       .input-group { display: flex; flex-direction: column; font-size: 12px; }
       .input-group input { width: 80px; }
       .stats-panel { grid-column: 1 / -1; display: flex; justify-content: space-between; font-size: 12px; padding: 5px 10px; background: #fff; border: 1px solid #ccc; }
       .stat-box { display: flex; flex-direction: column; align-items: flex-start; }
       .stat-value { font-weight: bold; margin-top: 3px; }
       .canvas-container { position: relative; width: 500px; height: 500px; background: #f5f5f5; border: 1px inset #888; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
       .controls-panel { display: flex; flex-direction: column; gap: 20px; padding: 10px; background: #fff; border: 1px solid #ccc; }
       .slider-group-horizontal { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
       .vertical-sliders { display: flex; justify-content: space-between; height: 200px; margin-top: 20px; }
       .v-slider { display: flex; flex-direction: column; align-items: center; font-size: 11px; }
        input[type=range][orient=vertical] { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 20px; height: 150px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="toolbar">
        <button id="btnStart">Start</button>
        <button id="btnStop">Stop</button>
        <div class="input-group">
            <label>Delay</label>
            <input type="text" value="10000" disabled>
        </div>
        <div style="flex-grow: 1;"></div>
        <div class="stat-box" style="margin-right: 20px;">
            <span>Mass of Earth [10^24 kg]</span>
            <span class="stat-value">5.97219</span>
        </div>
        <button id="btnReset">Reset</button>
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <span>Gravitational konstant [10^11]</span>
            <span class="stat-value">6.6738</span>
        </div>
        <div class="stat-box">
            <span>Time Increment [0.01 s]</span>
            <input type="number" id="inpTimeInc" value="100" style="width: 50px;">
        </div>
        <div class="stat-box">
            <span>Time [s]</span>
            <span class="stat-value" id="valTime">0.00</span>
        </div>
        <div class="stat-box">
            <span>Apogee [km]</span>
            <span class="stat-value" id="valApogee">7371.0</span>
        </div>
        <div class="stat-box">
            <span>Perigee [km]</span>
            <span class="stat-value" id="valPerigee">7371.0</span>
        </div>
        <div class="stat-box">
            <span>Height [km]</span>
            <span class="stat-value" id="valHeightTop">1000</span>
        </div>
    </div>

    <div></div>

    <div class="canvas-container">
        <canvas id="trailCanvas" width="500" height="500"></canvas>
        <canvas id="spriteCanvas" width="500" height="500"></canvas>
    </div>

    <div class="controls-panel">
        <div>
            <button id="btnCollision" style="width: 100%; margin-bottom: 10px;">Collision with Earth: ON</button>
            <button id="btnPath" style="width: 100%;">Don't show path</button>
        </div>

        <div class="slider-group-horizontal">
            <span>Power</span>
            <span id="valPower">2.0</span>
            <input type="range" id="sldPower" min="1.0" max="3.0" step="0.01" value="2.0" style="width: 100px;">
        </div>

        <div class="vertical-sliders">
            <div class="v-slider">
                <span>Height [km]</span>
                <span id="valHeightBtn" style="margin-bottom: 5px;">1000</span>
                <input type="range" id="sldHeight" orient="vertical" min="0" max="30000" step="10" value="1000">
            </div>
            <div class="v-slider">
                <span>Radius [km]</span>
                <span id="valRadius" style="margin-bottom: 5px;">6371</span>
                <input type="range" id="sldRadius" orient="vertical" min="1000" max="10000" step="1" value="6371">
            </div>
            <div class="v-slider">
                <span>Angle [deg]</span>
                <span id="valAngle" style="margin-bottom: 5px;">0</span>
                <input type="range" id="sldAngle" orient="vertical" min="-90" max="90" step="1" value="0">
            </div>
            <div class="v-slider">
                <span>Speed [m/s]</span>
                <span id="valSpeed" style="margin-bottom: 5px;">7200</span>
                <input type="range" id="sldSpeed" orient="vertical" min="0" max="12000" step="10" value="7200">
            </div>
        </div>
    </div>
</div>

<script>
    // Fysiske konstanter
    const G_BASE = 6.6738e-11;          
    const M_BASE = 5.97219e24;          
    const MU = G_BASE * M_BASE;         

    // DOM Elementer
    const trailCtx = document.getElementById('trailCanvas').getContext('2d');
    const spriteCtx = document.getElementById('spriteCanvas').getContext('2d');

    // Fysik State variabler
    let isRunning = false;
    let collisionEnabled = true;
    let showPath = true;
    let elapsedSimTime = 0;
    let state = { x: 0, y: 0, vx: 0, vy: 0 };

    // Skalering af koordinater til de 500 pixels bredde/højde lærred
    const CANVAS_DIM = 500;
    const PIXELS_PER_KM = (CANVAS_DIM / 2) / 35000;

    function initializeState() {
        const height_m = parseFloat(document.getElementById('sldHeight').value) * 1000;
        const radius_m = parseFloat(document.getElementById('sldRadius').value) * 1000;
        const speed = parseFloat(document.getElementById('sldSpeed').value);
        const angle_deg = parseFloat(document.getElementById('sldAngle').value);
        
        const initial_r = radius_m + height_m;
        state.x = 0;
        state.y = initial_r;

        const angle_rad = angle_deg * (Math.PI / 180);
        state.vx = speed * Math.cos(angle_rad);
        state.vy = speed * Math.sin(angle_rad);

        elapsedSimTime = 0;
        document.getElementById('valTime').innerText = "0.00";
        
        updateAnalyticalOrbits();
        clearAndDrawEarth();
        drawSprite();
    }

    function updateAnalyticalOrbits() {
        const r_mag = Math.sqrt(state.x * state.x + state.y * state.y);
        const v_mag_sq = state.vx * state.vx + state.vy * state.vy;
        
        const energy = (v_mag_sq / 2) - (MU / r_mag);
        const h = state.x * state.vy - state.y * state.vx;
        
        if (energy >= 0) {
            document.getElementById('valApogee').innerText = "Escape (\u221E)";
            document.getElementById('valPerigee').innerText = (r_mag / 1000).toFixed(1); 
            return;
        }

        const a = -MU / (2 * energy);
        const eccSq = 1 + (2 * energy * h * h) / (MU * MU);
        const ecc = Math.sqrt(Math.max(0, eccSq));
        
        const apogee_km = (a * (1 + ecc)) / 1000;
        const perigee_km = (a * (1 - ecc)) / 1000;

        document.getElementById('valApogee').innerText = apogee_km.toFixed(1);
        document.getElementById('valPerigee').innerText = perigee_km.toFixed(1);
    }

    function clearAndDrawEarth() {
        trailCtx.fillStyle = '#f5f5f5';
        trailCtx.fillRect(0, 0, CANVAS_DIM, CANVAS_DIM);

        const radius_km = parseFloat(document.getElementById('sldRadius').value);
        const earthRadiusPx = radius_km * PIXELS_PER_KM;

        trailCtx.beginPath();
        trailCtx.arc(250, 250, earthRadiusPx, 0, 2 * Math.PI);
        trailCtx.fillStyle = '#00cc00'; 
        trailCtx.fill();
        trailCtx.lineWidth = 1;
        trailCtx.strokeStyle = '#000';
        trailCtx.stroke();
    }

    function drawSprite() {
        spriteCtx.clearRect(0, 0, CANVAS_DIM, CANVAS_DIM);

        const px_x = 250 + (state.x / 1000) * PIXELS_PER_KM;
        const px_y = 250 - (state.y / 1000) * PIXELS_PER_KM;

        spriteCtx.beginPath();
        spriteCtx.arc(px_x, px_y, 3, 0, 2 * Math.PI);
        spriteCtx.fillStyle = '#ff0000'; 
        spriteCtx.fill();
    }

    function physicsStep(dt) {
        const radius_m = parseFloat(document.getElementById('sldRadius').value) * 1000;
        const power = parseFloat(document.getElementById('sldPower').value);
        const r_mag = Math.sqrt(state.x * state.x + state.y * state.y);

        if (collisionEnabled && r_mag <= radius_m) {
            isRunning = false;
            return;
        }

        const a_mag = -MU / Math.pow(r_mag, power);
        const ax = a_mag * (state.x / r_mag);
        const ay = a_mag * (state.y / r_mag);

        state.vx += ax * dt;
        state.vy += ay * dt;
        state.x += state.vx * dt;
        state.y += state.vy * dt;

        elapsedSimTime += dt;

        if (showPath) {
            const px_x = 250 + (state.x / 1000) * PIXELS_PER_KM;
            const px_y = 250 - (state.y / 1000) * PIXELS_PER_KM;
            trailCtx.fillStyle = '#000'; 
            trailCtx.fillRect(px_x, px_y, 1, 1);
        }
    }

    function animate() {
        if (isRunning) {
            const dt = parseFloat(document.getElementById('inpTimeInc').value);
            const subSteps = 10;
            const sub_dt = dt / subSteps;

            for (let i = 0; i < subSteps; i++) {
                if(!isRunning) break;
                physicsStep(sub_dt);
            }

            document.getElementById('valTime').innerText = elapsedSimTime.toFixed(1);
            updateAnalyticalOrbits();
            drawSprite();
        }
        requestAnimationFrame(animate);
    }

    // Faste og sikre Event Listeners
    document.getElementById('btnStart').addEventListener('click', function() { isRunning = true; });
    document.getElementById('btnStop').addEventListener('click', function() { isRunning = false; });
    document.getElementById('btnReset').addEventListener('click', function() {
        isRunning = false;
        initializeState();
    });

    document.getElementById('btnCollision').addEventListener('click', function() {
        collisionEnabled =!collisionEnabled;
        this.innerText = collisionEnabled? "Collision with Earth: ON" : "Collision with Earth: OFF";
    });

    document.getElementById('btnPath').addEventListener('click', function() {
        showPath =!showPath;
        this.innerText = showPath? "Don't show path" : "Show path";
        if (!showPath) {
            clearAndDrawEarth();
        }
    });

    // Sliders
    document.getElementById('sldHeight').addEventListener('input', function() {
        document.getElementById('valHeightTop').innerText = this.value;
        document.getElementById('valHeightBtn').innerText = this.value;
        if (!isRunning) initializeState();
    });

    document.getElementById('sldRadius').addEventListener('input', function() {
        document.getElementById('valRadius').innerText = this.value;
        if (!isRunning) initializeState();
    });

    document.getElementById('sldAngle').addEventListener('input', function() {
        document.getElementById('valAngle').innerText = this.value;
        if (!isRunning) initializeState();
    });

    document.getElementById('sldSpeed').addEventListener('input', function() {
        document.getElementById('valSpeed').innerText = this.value;
        if (!isRunning) initializeState();
    });

    document.getElementById('sldPower').addEventListener('input', function() {
        document.getElementById('valPower').innerText = this.value;
        if (!isRunning) initializeState();
    });

    document.getElementById('inpTimeInc').addEventListener('input', function() {
        // Opdaterer bare værdien internt ved ændring
    });

    // Opstart af simulation
    initializeState();
    requestAnimationFrame(animate);

</script>
</body>
</html>
