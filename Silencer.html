<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>DTU Lyddæmper Simulator (1989/2024)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #e9ecef; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { grid-column: span 2; background: #3498db; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 20px; }
        pre { background: #1e1e1e; color: #4af626; padding: 15px; border-radius: 5px; overflow-y: auto; height: 150px; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lydudbredelse i Absorptionsbeklædt Rør</h1>
    
    <div class="control-panel">
        <div class="input-group">
            <label>Strømningsmodstand (Flow resistivity) [N·s/m4]:</label>
            <input type="number" id="inpFlow" value="32000">
        </div>
        <div class="input-group">
            <label>Beklædningstykkelse (Lining thickness) [m]:</label>
            <input type="number" step="0.01" id="inpLining" value="0.15">
        </div>
        <div class="input-group">
            <label>Rørets halve bredde (Duct half-width) [m]:</label>
            <input type="number" step="0.01" id="inpDuct" value="0.15">
        </div>
        <div class="input-group">
            <label>Antal frekvenstrin (Max intervals):</label>
            <input type="number" id="inpSteps" value="40">
        </div>
        <button id="runBtn">Tegn Graf & Kør Beregning</button>
    </div>

    <div class="chart-container">
        <canvas id="resultChart"></canvas>
    </div>

    <h3>Beregning-log:</h3>
    <pre id="output">Venter på input...</pre>
</div>

<script>
window.onerror = function(msg, url, line) {
    document.getElementById("output").innerText += `\n[FEJL]: ${msg} (Linje ${line})`;
    return true;
};

function print(text) {
    let out = document.getElementById("output");
    out.innerText += text + "\n";
    out.scrollTop = out.scrollHeight; // Auto-scroll til bunden
}

class Complex {
    constructor(r, i) { this.r = r; this.i = i; }
    add(c) { return new Complex(this.r + c.r, this.i + c.i); }
    sub(c) { return new Complex(this.r - c.r, this.i - c.i); }
    mult(c) { return new Complex(this.r * c.r - this.i * c.i, this.r * c.i + this.i * c.r); }
    div(c) {
        let den = c.r * c.r + c.i * c.i;
        return new Complex((this.r * c.r + this.i * c.i) / den, (this.i * c.r - this.r * c.i) / den);
    }
    scale(s) { return new Complex(this.r * s, this.i * s); }
    sqrt() {
        let mag = Math.sqrt(this.r * this.r + this.i * this.i);
        let angle = Math.atan2(this.i, this.r);
        return new Complex(Math.sqrt(mag) * Math.cos(angle / 2), Math.sqrt(mag) * Math.sin(angle / 2));
    }
    tan() {
        let den = Math.cos(2 * this.r) + Math.cosh(2 * this.i);
        if (den === 0) return new Complex(0, 0);
        return new Complex(Math.sin(2 * this.r) / den, Math.sinh(2 * this.i) / den);
    }
}

const C = 344.246; 
const RHO = 1.205; 
let chartInstance = null; // Til at gemme grafen

document.getElementById("runBtn").addEventListener("click", function() {
    document.getElementById("output").innerText = "Starter simulation...\n";
    
    // Hent værdier fra brugerfladen
    let flowRes = parseFloat(document.getElementById("inpFlow").value);
    let thick = parseFloat(document.getElementById("inpLining").value);
    let width = parseFloat(document.getElementById("inpDuct").value);
    let steps = parseInt(document.getElementById("inpSteps").value);
    let freqRes = 32; 

    let Af = flowRes / RHO / freqRes;
    let Kf = 2 * Math.PI * freqRes / C;
    
    let Zr = [], Zi = [], Gamr = [], Gami = [];
    let freqs = [], attenuations = [];

    print("Trin 1: Beregner materialets egenskaber...");
    for (let J = 1; J <= steps; J++) {
        let currentA = Af / J;
        let K = J * Kf;

        if (currentA < 60) {
            let logA = Math.log(currentA);
            Zr[J] = 1 + 0.04885 * Math.exp(0.754 * logA);
            Zi[J] = -0.087 * Math.exp(0.7307 * logA);
            Gamr[J] = K * 0.189 * Math.exp(0.6185 * logA);
            Gami[J] = K * (1 + 0.0978 * Math.exp(-0.6929 * logA));
        } else {
            let term = new Complex(-1.4664, 0.2115 * currentA);
            let sqrtTerm = term.sqrt();
            Gamr[J] = K * sqrtTerm.r;
            Gami[J] = K * sqrtTerm.i;
            let numerator = new Complex(currentA / (2 * Math.PI), 1.4035);
            let Z_val = numerator.div(sqrtTerm);
            Zr[J] = Z_val.r;
            Zi[J] = Z_val.i;
        }
    }

    print("Trin 2: Newton-Raphson iteration for Extended Reaction...");
    let b = thick / width; 
    let L1 = width;
    let currentW = new Complex(0.1, 0.1); 

    for (let J = 1; J <= steps; J++) {
        let K = Kf * J;
        let Z_c = new Complex(Zr[J], Zi[J]);
        let Gam_c = new Complex(Gamr[J], Gami[J]);
        
        let M = (new Complex(0, -RHO * C * K)).div(Z_c.mult(Gam_c));
        let p2 = (Gam_c.scale(L1)).mult(Gam_c.scale(L1)).sub(new Complex(K * L1 * K * L1, 0));

        let iterations = 0;
        let converged = false;

        while (iterations < 100 && !converged) {
            iterations++;
            let w2 = currentW.mult(currentW);
            let sqrt_w2_p2 = (w2.add(p2)).sqrt();
            let fw = currentW.mult(currentW.tan()).add(M.mult(sqrt_w2_p2).mult((sqrt_w2_p2.scale(b)).tan()));

            let delta = new Complex(1e-6, 1e-6);
            let w_d = currentW.add(delta);
            let sqrt_w2_p2_d = (w_d.mult(w_d).add(p2)).sqrt();
            let fw_d = w_d.mult(w_d.tan()).add(M.mult(sqrt_w2_p2_d).mult((sqrt_w2_p2_d.scale(b)).tan()));

            let f_prime = fw_d.sub(fw).div(delta);
            let w_step = fw.div(f_prime);
            currentW = currentW.sub(w_step);

            if (Math.abs(w_step.r) <= 1e-8 && Math.abs(w_step.i) <= 1e-8) converged = true;
        }

        let freqHz = Math.round(K * C / (2 * Math.PI));
        freqs.push(freqHz);
        attenuations.push(currentW.r); // Vi plotter den reelle del af w, som er relateret til dæmpningen
        
        print(`Frekvens: ${freqHz} Hz | Re(w) = ${currentW.r.toFixed(4)} | Iterationer: ${iterations}`);
    }

    print("Tegner graf...");
    drawChart(freqs, attenuations);
});

function drawChart(labels, data) {
    let ctx = document.getElementById('resultChart').getContext('2d');
    
    // Slet gammel graf hvis den findes
    if (chartInstance) { chartInstance.destroy(); }

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Dæmpningsfaktor ( Real(w) ) over frekvens',
                data: data,
                borderColor: '#e74c3c',
                backgroundColor: 'rgba(231, 76, 60, 0.2)',
                borderWidth: 2,
                pointRadius: 3,
                fill: true,
                tension: 0.3 // Gør kurven blød
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { title: { display: true, text: 'Frekvens (Hz)', font: {weight: 'bold'} } },
                y: { title: { display: true, text: 'Real(w)', font: {weight: 'bold'} }, beginAtZero: true }
            }
        }
    });
}
</script>

</body>
</html>
