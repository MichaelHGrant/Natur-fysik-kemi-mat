<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dynamisk 3D Heliumkerne (Canvas)</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #0a0a0d; color: #eee; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        /* --- 3D Visualization Area --- */
        #simulation-container { flex: 2; position: relative; background: radial-gradient(circle, #202028 0%, #0a0a0d 100%); cursor: grab; }
        #simulation-container:active { cursor: grabbing; }
        
        /* Selve lærredet, som fylder hele containeren */
        #canvas3d { width: 100%; height: 100%; display: block; }
        
        /* --- Info Panel --- */
        #info-panel { flex: 1; background-color: #14141a; padding: 40px; box-shadow: -5px 0 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; z-index: 100; border-left: 1px solid #222; }
        h1 { color: #f39c12; margin-top: 0; font-size: 1.8em; }
        h3 { color: #888; font-weight: normal; margin-top: -10px; margin-bottom: 30px; }
        .data-row { margin: 10px 0; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 4px solid transparent; }
        .label { font-weight: bold; color: #888; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.1em; margin-top: 5px; color: #eee; }
        .instructions { margin-top: auto; padding: 15px; background-color: rgba(243, 156, 18, 0.05); border: 1px solid rgba(243, 156, 18, 0.2); border-radius: 8px; color: #d68910; font-size: 0.9em; line-height: 1.5em; }
    </style>
</head>
<body>

    <div id="simulation-container">
        <canvas id="canvas3d"></canvas>
    </div>

    <div id="info-panel">
        <h1>Helium-4 Kerne</h1>
        <h3>Dynamisk Canvas-model</h3>
        <p>Nukleonerne er ikke fastfrosne. De interagerer konstant via den <strong>stærke kernekraft</strong> i en dynamisk, kaotisk tilstand.</p>
        
        <div id="dynamic-data" style="display: none; margin-top: 20px; margin-bottom: 20px;">
            <h2 id="particle-name" style="margin-bottom: 5px; padding-bottom: 10px; border-bottom: 1px solid #333;">-</h2>
            <div class="data-row" id="row-charge">
                <div class="label">Elektrisk Ladning</div>
                <div class="value"></div>
            </div>
            <div class="data-row" id="row-quarks">
                <div class="label">Konstituent-kvarker</div>
                <div class="value"></div>
            </div>
        </div>

        <div class="instructions">
            <strong>Interaktion:</strong><br>
            • 🖱️ <strong>Roter i 3D:</strong> Klik og træk i det tomme rum.<br>
            • 👈 <strong>Info:</strong> Klik på en bevægelig partikel.
        </div>
    </div>

    <script>
        // --- OPSÆTNING AF CANVAS ---
        const canvas = document.getElementById('canvas3d');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('simulation-container');

        let width, height, centerX, centerY;

        function resizeCanvas() {
            width = canvas.width = container.offsetWidth;
            height = canvas.height = container.offsetHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- PARTIKEL & FYSIK DATA ---
        const particleInfo = {
            'Proton': { charge: '+1 e', quarks: '2 Up, 1 Down', colorLight: '#ff4d4d', colorDark: '#800000' },
            'Neutron': { charge: '0 e', quarks: '1 Up, 2 Down', colorLight: '#4d94ff', colorDark: '#002266' }
        };

        const radius = 40; // Base afstand fra centrum
        const particleSize = 35; // Størrelsen på de tegnede kugler

        // Definition af partiklernes base positioner (et tetraeder)
        let particles = [
            { id: 'p1', type: 'Proton', baseX: -radius, baseY: -radius, baseZ: radius },
            { id: 'n1', type: 'Neutron', baseX: radius, baseY: -radius, baseZ: -radius },
            { id: 'p2', type: 'Proton', baseX: -radius, baseY: radius, baseZ: -radius },
            { id: 'n2', type: 'Neutron', baseX: radius, baseY: radius, baseZ: radius }
        ];

        // Kamera vinkler
        let phi = Math.PI / 4; // Vandret rotation
        let theta = -Math.PI / 8; // Lodret rotation

        // --- INTERAKTION (ROTATION & KLIK) ---
        let isDragging = false;
        let previousMouseX, previousMouseY;

        // Rotation events
        container.addEventListener('mousedown', e => { isDragging = true; previousMouseX = e.pageX; previousMouseY = e.pageY; });
        window.addEventListener('mouseup', () => isDragging = false);
        container.addEventListener('mousemove', e => {
            if (!isDragging) return;
            phi += (e.pageX - previousMouseX) * 0.01;
            theta -= (e.pageY - previousMouseY) * 0.01;
            previousMouseX = e.pageX;
            previousMouseY = e.pageY;
        });

        // Touch support
        container.addEventListener('touchstart', e => { isDragging = true; previousMouseX = e.touches[0].pageX; previousMouseY = e.touches[0].pageY; }, {passive: false});
        window.addEventListener('touchend', () => isDragging = false);
        container.addEventListener('touchmove', e => {
            if (!isDragging) return;
            e.preventDefault();
            phi += (e.touches[0].pageX - previousMouseX) * 0.01;
            theta -= (e.touches[0].pageY - previousMouseY) * 0.01;
            previousMouseX = e.touches[0].pageX;
            previousMouseY = e.touches[0].pageY;
        }, {passive: false});

        // Klik på partikel
        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // Find den forreste partikel vi klikkede på
            let closestParticle = null;
            let minDistance = Infinity;

            particles.forEach(p => {
                if (p.projectedZ < 0) return; // Kun partikler foran kameraet

                const dx = clickX - p.projectedX;
                const dy = clickY - p.projectedY;
                const dist = Math.sqrt(dx*dx + dy*dy);

                // Tjek om klikket er indenfor partiklens størrelse
                if (dist < p.renderSize && dist < minDistance) {
                    minDistance = dist;
                    closestParticle = p;
                }
            });

            if (closestParticle) {
                showData(closestParticle.type);
            }
        });

        // --- INFO PANEL LOGIK ---
        function showData(type) {
            const data = particleInfo[type];
            document.getElementById('dynamic-data').style.display = 'block';
            
            const nameEl = document.getElementById('particle-name');
            nameEl.innerText = type;
            nameEl.style.color = data.colorLight;

            document.getElementById('row-charge').querySelector('.value').innerText = data.charge;
            document.getElementById('row-charge').style.borderLeftColor = data.colorLight;

            document.getElementById('row-quarks').querySelector('.value').innerText = data.quarks;
            document.getElementById('row-quarks').style.borderLeftColor = data.colorLight;
        }

        // --- ANIMATIONS-LØKKE (The Magic) ---
        function animate() {
            // Ryd lærredet hver frame
            ctx.clearRect(0, 0, width, height);

            // Tid til at styre vibrationerne
            const time = performance.now() / 200; // Hastighed på "kogningen"

            // Opdater og projicer hver partikel
            particles.forEach((p, index) => {
                // 1. Skab kaotisk kvante-jitter baseret på tid og index
                const jitterX = p.baseX + Math.sin(time + index * 2.1) * 6;
                const jitterY = p.baseY + Math.cos(time * 1.3 + index * 3.5) * 6;
                const jitterZ = p.baseZ + Math.sin(time * 0.8 + index * 1.1) * 6;

                // 2. Anvend 3D rotation (phi og theta) på jitter positionerne
                let y1 = jitterY * Math.cos(theta) - jitterZ * Math.sin(theta);
                let z1 = jitterY * Math.sin(theta) + jitterZ * Math.cos(theta);
                
                let x2 = jitterX * Math.cos(phi) - z1 * Math.sin(phi);
                let z2 = jitterX * Math.sin(phi) + z1 * Math.cos(phi);

                // 3. Simpel perspektiv projektion (få dem til at blive mindre med dybden)
                const fov = 400; // Felt-of-view/perspektiv styrke
                const perspective = fov / (fov + z2);
                
                // Gem de projicerede koordinater til klik-detection
                p.projectedX = centerX + x2 * perspective;
                p.projectedY = centerY + y1 * perspective;
                p.projectedZ = z2; // Bruges til dybdesortering
                p.renderSize = particleSize * perspective; // Størrelse baseret på perspektiv
            });

            // 4. Sorter partikler efter dybde (z2), så dem bagved tegnes først!
            particles.sort((a, b) => b.projectedZ - a.projectedZ);

            // 5. Tegn hver partikel som en perfekt 2D cirkel med gradient
            particles.forEach(p => {
                const info = particleInfo[p.type];
                
                ctx.beginPath();
                // Tegn cirklen
                ctx.arc(p.projectedX, p.projectedY, Math.max(0, p.renderSize), 0, Math.PI * 2);
                
                // Skab en radial gradient for at simulere en 3D kugle med lys
                const gradient = ctx.createRadialGradient(
                    p.projectedX - p.renderSize * 0.3, // Lys highlight offset
                    p.projectedY - p.renderSize * 0.3,
                    p.renderSize * 0.1,
                    p.projectedX,
                    p.projectedY,
                    p.renderSize
                );
                
                gradient.addColorStop(0, info.colorLight);
                gradient.addColorStop(1, info.colorDark);
                
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.closePath();
            });

            // Fortsæt løkken
            requestAnimationFrame(animate);
        }

        // Start motoren
        animate();

    </script>
</body>
</html>
