<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solsystem i 3D (Skudsikker version)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; z-index: 100; pointer-events: none;}
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <h3 style="margin-top: 0;">Solsystemet i 3D</h3>
        <p style="margin-bottom: 0;">Venstreklik: Rotér kamera<br>Scroll: Zoom ind/ud<br>Højreklik: Flyt (Panorér)</p>
    </div>

    <script>
        // Opsætning af scene, kamera og renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50000);
        camera.position.set(0, 1500, 3000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Kamerakontrol
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 200;
        controls.maxDistance = 20000;

        // Lys
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 15000);
        scene.add(sunLight);

        const SCALE = 20;

        // 1. SOLEN (Gul, udsender lys)
        const sunGeometry = new THREE.SphereGeometry(SCALE * 5, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700 }); 
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sunMesh);

        // System til at opbevare planeter, så de kan animeres
        const planets =;

        // Hjælpefunktion til at bygge farvede planeter
        function createPlanet(name, radius, distance, rotationSpeed, orbitSpeed, planetColor) {
            const pivot = new THREE.Object3D();
            scene.add(pivot);

            const geometry = new THREE.SphereGeometry(radius * SCALE, 32, 32);
            // Vi bruger StandardMaterial, så lyset fra solen kaster skygger på overfladen
            const material = new THREE.MeshStandardMaterial({ 
                color: planetColor,
                roughness: 0.7 
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(distance * SCALE, 0, 0);
            
            pivot.add(mesh);
            pivot.rotation.y = Math.random() * Math.PI * 2; 

            planets.push({ mesh: mesh, pivot: pivot, rotationSpeed: rotationSpeed, orbitSpeed: orbitSpeed });

            return { mesh: mesh, pivot: pivot };
        }

        // 2. SKAB PLANETER MED FARVER
        createPlanet('Merkur', 0.38, 8, 0.004, 0.015, 0x888888); // Grå
        createPlanet('Venus', 0.95, 14, -0.002, 0.012, 0xe3bb76); // Beige/Orange
        createPlanet('Jorden', 1.0, 22, 0.01, 0.008, 0x2244ff); // Blå
        createPlanet('Mars', 0.53, 30, 0.009, 0.006, 0xaf3f00); // Rød
        createPlanet('Jupiter', 2.5, 45, 0.02, 0.002, 0xd39c7e); // Lysebrun
        
        const saturnObj = createPlanet('Saturn', 2.0, 65, 0.018, 0.0015, 0xead6b8); // Gylden
        
        // Saturns Ringe
        const ringGeo = new THREE.RingGeometry(2.5 * SCALE, 4.5 * SCALE, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xcccccc, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringMesh.rotation.x = -Math.PI / 2;
        saturnObj.mesh.add(ringMesh);

        createPlanet('Uranus', 1.5, 85, -0.01, 0.001, 0x4b70dd); // Lyseblå
        createPlanet('Neptun', 1.4, 105, 0.012, 0.0008, 0x415491); // Mørkeblå

        // 3. STJERNEBAGGRUND
        const starGeometry = new THREE.BufferGeometry();
        const starPosArray = new Float32Array(6000 * 3); 
        for(let i = 0; i < 6000 * 3; i++) {
            starPosArray[i] = (Math.random() - 0.5) * 50000;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPosArray, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 8, transparent: true, opacity: 0.8 });
        const starMesh = new THREE.Points(starGeometry, starMaterial);
        scene.add(starMesh);

        // 4. HÅNDTER ÆNDRING AF SKÆRMSTØRRELSE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 5. ANIMATIONSLØKKEN
        function animate() {
            requestAnimationFrame(animate);

            // Rotér solen og stjernerne
            sunMesh.rotation.y += 0.002;
            starMesh.rotation.y -= 0.0002;

            // Opdatér planeternes bevægelse
            for(let i = 0; i < planets.length; i++) {
                planets[i].mesh.rotation.y += planets[i].rotationSpeed;
                planets[i].pivot.rotation.y += planets[i].orbitSpeed;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Start det hele
        animate();
    </script>
</body>
</html>
