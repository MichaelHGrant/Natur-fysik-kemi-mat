<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>DTU Lyddæmper Simulator - Fig 5.1 Reproduktion</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #e9ecef; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { grid-column: span 2; background: #e74c3c; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #c0392b; }
        .chart-container { position: relative; height: 500px; width: 100%; margin-top: 20px; }
        pre { background: #1e1e1e; color: #4af626; padding: 15px; border-radius: 5px; overflow-y: auto; height: 120px; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Reproduktion af Fig. 5.1 (Local vs. Extended)</h1>
    
    <div class="control-panel">
        <div class="input-group">
            <label>Strømningsmodstand (Flow resistivity) [N·s/m4]:</label>
            <input type="number" id="inpFlow" value="20000">
        </div>
        <div class="input-group">
            <label>Beklædningstykkelse, d [m]:</label>
            <input type="number" step="0.01" id="inpLining" value="0.15">
        </div>
        <div class="input-group">
            <label>Rørets halve bredde, l [m]:</label>
            <input type="number" step="0.01" id="inpDuct" value="0.15">
        </div>
        <div class="input-group">
            <label>Antal beregningspunkter (Logaritmisk skala):</label>
            <input type="number" id="inpSteps" value="150">
        </div>
        <button id="runBtn">Beregn og Tegn Fig. 5.1</button>
    </div>

    <div class="chart-container">
        <canvas id="resultChart"></canvas>
    </div>

    <h3>Status:</h3>
    <pre id="output">Klar til at regne logaritmisk sweep...</pre>
</div>

<script>
window.onerror = function(msg, url, line) {
    document.getElementById("output").innerText += `\n[FEJL]: ${msg} (Linje ${line})`;
    return true;
};

function print(text) {
    let out = document.getElementById("output");
    out.innerText += text + "\n";
    out.scrollTop = out.scrollHeight; 
}

class Complex {
    constructor(r, i) { this.r = r; this.i = i; }
    add(c) { return new Complex(this.r + c.r, this.i + c.i); }
    sub(c) { return new Complex(this.r - c.r, this.i - c.i); }
    mult(c) { return new Complex(this.r * c.r - this.i * c.i, this.r * c.i + this.i * c.r); }
    div(c) {
        let den = c.r * c.r + c.i * c.i;
        if (den === 0) return new Complex(0,0);
        return new Complex((this.r * c.r + this.i * c.i) / den, (this.i * c.r - this.r * c.i) / den);
    }
    scale(s) { return new Complex(this.r * s, this.i * s); }
    sqrt() {
        let mag = Math.sqrt(this.r * this.r + this.i * this.i);
        let angle = Math.atan2(this.i, this.r);
        return new Complex(Math.sqrt(mag) * Math.cos(angle / 2), Math.sqrt(mag) * Math.sin(angle / 2));
    }
    tan() {
        if (this.i > 20) return new Complex(0, 1);
        if (this.i < -20) return new Complex(0, -1);
        let den = Math.cos(2 * this.r) + Math.cosh(2 * this.i);
        if (den === 0) return new Complex(0, 0);
        return new Complex(Math.sin(2 * this.r) / den, Math.sinh(2 * this.i) / den);
    }
}
