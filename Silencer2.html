<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>DTU Lyddæmper Simulator - 'Extended'</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #e9ecef; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { grid-column: span 2; background: #27ae60; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2ecc71; }
        .chart-container { position: relative; height: 500px; width: 100%; margin-top: 20px; }
        pre { background: #1e1e1e; color: #4af626; padding: 15px; border-radius: 5px; overflow-y: auto; height: 120px; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lyddæmper Simulator (Extended Reaction)</h1>
    <p>Indtast parametrene for Fig. 5.1 herunder:</p>
    
    <div class="control-panel">
        <div class="input-group">
            <label>Strømningsmodstand (Flow resistivity) [N·s/m4]:</label>
            <input type="number" id="inpFlow" value="8500">
        </div>
        <div class="input-group">
            <label>Beklædningstykkelse, d [m]:</label>
            <input type="number" step="0.01" id="inpLining" value="0.05">
        </div>
        <div class="input-group">
            <label>Rørets halve bredde, l [m]:</label>
            <input type="number" step="0.01" id="inpDuct" value="0.25">
        </div>
        <button onclick="startSimulation()">Beregn Extended Dæmpning</button>
    </div>

    <div class="chart-container">
        <canvas id="resultChart"></canvas>
    </div>

    <h3>Status Log:</h3>
    <pre id="output">Klar til at regne...</pre>
</div>

<script>
function print(text) {
    let out = document.getElementById("output");
    out.innerText += "\n" + text;
    out.scrollTop = out.scrollHeight; 
}

class Complex {
    constructor(r, i) { this.r = r; this.i = i; }
    add(c) { return new Complex(this.r + c.r, this.i + c.i); }
    sub(c) { return new Complex(this.r - c.r, this.i - c.i); }
    mult(c) { return new Complex(this.r * c.r - this.i * c.i, this.r * c.i + this.i * c.r); }
    div(c) {
        let den = c.r * c.r + c.i * c.i;
        if (den === 0) return new Complex(0,0);
        return new Complex((this.r * c.r + this.i * c.i) / den, (this.i * c.r - this.r * c.i) / den);
    }
    scale(s) { return new Complex(this.r * s, this.i * s); }
    sqrt() {
        let mag = Math.sqrt(this.r * this.r + this.i * this.i);
        let angle = Math.atan2(this.i, this.r);
        return new Complex(Math.sqrt(mag) * Math.cos(angle / 2), Math.sqrt(mag) * Math.sin(angle / 2));
    }
    tan() {
        if (this.i > 25) return new Complex(0, 1);
        if (this.i < -25) return new Complex(0, -1);
        let den = Math.cos(2 * this.r) + Math.cosh(2 * this.i);
        if (den === 0) return new Complex(0, 0);
        return new Complex(Math.sin(2 * this.r) / den, Math.sinh(2 * this.i) / den);
    }
}

const C = 344.246; 
const RHO = 1.205; 
let chartInstance = null; 

function startSimulation() {
    let out = document.getElementById("output");
    out.innerText = "Beregner Extended Reaction for (0,0) moden...";
    setTimeout(runMath, 50);
}

function runMath() {
    try {
        let flowRes = parseFloat(document.getElementById("inpFlow").value);
        let thick = parseFloat(document.getElementById("inpLining").value);
        let L1 = parseFloat(document.getElementById("inpDuct").value); 
        let fullDuctWidth = 2 * L1; 
        let b = thick / L1; 

        let dataExtended = [];
        let lastW_ext = new Complex(0.1, 0.1); 

        // Regner fra 10 Hz til 10.000 Hz for at fange hele spektret
        let f_start = 10;
        let f_end = 10000;
        let f_step = 5; 

        for (let f = f_start; f <= f_end; f += f_step) {
            let Af = flowRes / RHO / f;
            let K = 2 * Math.PI * f / C;
            
            let Zr, Zi, Gamr, Gami;
            
            if (Af < 60) {
                let logA = Math.log(Af);
                Zr = 1 + 0.04885 * Math.exp(0.754 * logA);
                Zi = -0.087 * Math.exp(0.7307 * logA);
                Gamr = K * 0.189 * Math.exp(0.6185 * logA);
                Gami = K * (1 + 0.0978 * Math.exp(-0.6929 * logA)); 
            } else {
                let term = new Complex(-1.4664, 0.2115 * Af);
                let sqrtTerm = term.sqrt();
                Gamr = K * sqrtTerm.r;
                Gami = K * sqrtTerm.i;
                let numerator = new Complex(Af / (2 * Math.PI), 1.4035);
                let Z_val = numerator.div(sqrtTerm);
                Zr = Z_val.r;
                Zi = Z_val.i;
            }

            let Z_c = new Complex(Zr, Zi);
            let Gam_c = new Complex(Gamr, Gami);
            
            let M = (new Complex(0, -RHO * C * K)).div(Z_c.mult(Gam_c));
            
            let h_c = new Complex(Gami, -Gamr); 
            let hl_complex = h_c.scale(L1); 
            let kl_complex = new Complex(K * L1, 0);
            
            let p2 = hl_complex.mult(hl_complex).sub(kl_complex.mult(kl_complex));

            // --- EXTENDED REACTION ---
            let currentW_ext = new Complex(lastW_ext.r, lastW_ext.i);
            let iter_ext = 0, conv_ext = false;
            while (iter_ext < 50 && !conv_ext) {
                iter_ext++;
                let w2 = currentW_ext.mult(currentW_ext);
                let sqrt_w2_p2 = (w2.add(p2)).sqrt();
                let fw = currentW_ext.mult(currentW_ext.tan()).add(M.mult(sqrt_w2_p2).mult((sqrt_w2_p2.scale(b)).tan()));

                let delta = new Complex(1e-6, 1e-6);
                let w_d = currentW_ext.add(delta);
                let sqrt_w2_p2_d = (w_d.mult(w_d).add(p2)).sqrt();
                let fw_d = w_d.mult(w_d.tan()).add(M.mult(sqrt_w2_p2_d).mult((sqrt_w2_p2_d.scale(b)).tan()));

                let f_prime = fw_d.sub(fw).div(delta);
                let w_step = fw.div(f_prime);
                
                if (isNaN(w_step.r) || isNaN(w_step.i)) break;
                currentW_ext = currentW_ext.sub(w_step);
                if (Math.abs(w_step.r) <= 1e-6 && Math.abs(w_step.i) <= 1e-6) conv_ext = true;
            }
            if (conv_ext) lastW_ext = currentW_ext; else lastW_ext = new Complex(0.1, 0.1);

            let calcAttenuation = function(w_complex) {
                let w_sq = w_complex.mult(w_complex);
                let kl_sq = kl_complex.mult(kl_complex);
                let gam_l = w_sq.sub(kl_sq).sqrt();
                let Gamma = new Complex(gam_l.r / L1, gam_l.i / L1);
                if (Gamma.r < 0) Gamma = new Complex(-Gamma.r, -Gamma.i);
                return (8.686 * Gamma.r) * fullDuctWidth;
            };

            if (conv_ext) dataExtended.push({x: f, y: calcAttenuation(currentW_ext)});
        }

        print("Tegner grafen...");
        drawChart(dataExtended);

    } catch (e) {
        print(`[MATEMATISK FEJL]: ${e.message}`);
    }
}

function drawChart(dataExt) {
    let ctx = document.getElementById('resultChart').getContext('2d');
    if (chartInstance) { chartInstance.destroy(); }
    
    chartInstance = new Chart(ctx, {
        type: 'line', 
        data: {
            datasets: [
                {
                    label: 'Extended Reaction (Dit program)',
                    data: dataExt,
                    borderColor: '#2980b9',
                    borderWidth: 3,
                    pointRadius: 0, 
                    fill: false,
                    tension: 0.1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { 
                    type: 'logarithmic', 
                    title: { display: true, text: 'Frequency [Hz]', font: {weight: 'bold'} },
                    min: 10,
                    max: 10000
                },
                y: { 
                    title: { display: true, text: 'Attenuation per duct width [dB]', font: {weight: 'bold'} }, 
                    min: 0
                }
            },
            plugins: {
                zoom: { pan: { enabled: true, mode: 'xy' }, zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' } }
            }
        }
    });
}
</script>

</body>
</html>
