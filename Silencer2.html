<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>DTU Lyddæmper Simulator - Fig 3.10 Perfekt</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #e9ecef; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { grid-column: span 2; background: #27ae60; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2ecc71; }
        .chart-container { position: relative; height: 500px; width: 100%; margin-top: 20px; }
        pre { background: #1e1e1e; color: #4af626; padding: 15px; border-radius: 5px; overflow-y: auto; height: 150px; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Reproduktion af Fig. 3.10b (1:1 Kopi)</h1>
    
    <div class="control-panel">
        <div class="input-group">
            <label>Strømningsmodstand (Flow resistivity) [N·s/m4]:</label>
            <input type="number" id="inpFlow" value="8500">
        </div>
        <div class="input-group">
            <label>Beklædningstykkelse, d [m]:</label>
            <input type="number" step="0.01" id="inpLining" value="0.05">
        </div>
        <div class="input-group">
            <label>Parameter l (Rørets halve bredde i formlen) [m]:</label>
            <input type="number" step="0.01" id="inpDuct" value="0.5">
        </div>
        <button onclick="startSimulation()">Beregn Forlæns & Baglæns Modes</button>
    </div>

    <div class="chart-container">
        <canvas id="resultChart"></canvas>
    </div>

    <h3>Status Log:</h3>
    <pre id="output">Venter på start...</pre>
</div>

<script>
function print(text) {
    let out = document.getElementById("output");
    out.innerText += "\n" + text;
    out.scrollTop = out.scrollHeight; 
}

class Complex {
    constructor(r, i) { this.r = r; this.i = i; }
    add(c) { return new Complex(this.r + c.r, this.i + c.i); }
    sub(c) { return new Complex(this.r - c.r, this.i - c.i); }
    mult(c) { return new Complex(this.r * c.r - this.i * c.i, this.r * c.i + this.i * c.r); }
    div(c) {
        let den = c.r * c.r + c.i * c.i;
        if (den === 0) return new Complex(0,0);
        return new Complex((this.r * c.r + this.i * c.i) / den, (this.i * c.r - this.r * c.i) / den);
    }
    scale(s) { return new Complex(this.r * s, this.i * s); }
    sqrt() {
        let mag = Math.sqrt(this.r * this.r + this.i * this.i);
        let angle = Math.atan2(this.i, this.r);
        return new Complex(Math.sqrt(mag) * Math.cos(angle / 2), Math.sqrt(mag) * Math.sin(angle / 2));
    }
    tan() {
        if (this.i > 25) return new Complex(0, 1);
        if (this.i < -25) return new Complex(0, -1);
        let den = Math.cos(2 * this.r) + Math.cosh(2 * this.i);
        if (den === 0) return new Complex(0, 0);
        return new Complex(Math.sin(2 * this.r) / den, Math.sinh(2 * this.i) / den);
    }
}

function solveNR(guess, p2, M, b) {
    let currentW = new Complex(guess.r, guess.i);
    let iter = 0, conv = false;

    while (iter < 150 && !conv) {
        iter++;
        let w2 = currentW.mult(currentW);
        let sqrt_w2_p2 = (w2.add(p2)).sqrt();
        let fw = currentW.mult(currentW.tan()).add(M.mult(sqrt_w2_p2).mult((sqrt_w2_p2.scale(b)).tan()));

        let delta = new Complex(1e-6, 1e-6);
        let w_d = currentW.add(delta);
        let sqrt_w2_p2_d = (w_d.mult(w_d).add(p2)).sqrt();
        let fw_d = w_d.mult(w_d.tan()).add(M.mult(sqrt_w2_p2_d).mult((sqrt_w2_p2_d.scale(b)).tan()));

        let f_prime = fw_d.sub(fw).div(delta);
        let w_step = fw.div(f_prime);
        
        if (isNaN(w_step.r) || isNaN(w_step.i)) break;
        
        currentW = currentW.sub(w_step);
        
        if (Math.abs(w_step.r) <= 1e-8 && Math.abs(w_step.i) <= 1e-8) conv = true;
    }
    return { w: currentW, converged: conv };
}

const C = 344.246; 
const RHO = 1.205; 
let chartInstance = null; 

function startSimulation() {
    let out = document.getElementById("output");
    out.innerText = "Kører simulation...";
    setTimeout(runMath, 50);
}

function runMath() {
    try {
        let flowRes = parseFloat(document.getElementById("inpFlow").value);
        let thick = parseFloat(document.getElementById("inpLining").value);
        let L1 = parseFloat(document.getElementById("inpDuct").value); 
        
        // Når L1=0.5 var bredden i plottet regnet som 2*L1 = 1.0
        let fullDuctWidth = 2 * L1; 
        let b = thick / L1; 

        let freqs = [];
        for (let f = 62.5; f <= 4000; f += 2.5) {
            freqs.push(f);
        }

        let calcAttenuation = function(w_complex, f) {
            let K = 2 * Math.PI * f / C;
            let w_sq = w_complex.mult(w_complex);
            let kl_sq = new Complex(K * L1, 0).mult(new Complex(K * L1, 0));
            let gam_l = w_sq.sub(kl_sq).sqrt();
            let Gamma = new Complex(gam_l.r / L1, gam_l.i / L1);
            if (Gamma.r < 0) Gamma = new Complex(-Gamma.r, -Gamma.i);
            return (8.686 * Gamma.r) * fullDuctWidth;
        };

        // Fælles funktion til at hente p2 og M for en given frekvens
        let getParams = function(f) {
            let Af = flowRes / RHO / f;
            let K = 2 * Math.PI * f / C;
            let Zr, Zi, Gamr, Gami;
            
            if (Af < 60) {
                let logA = Math.log(Af);
                Zr = 1 + 0.04885 * Math.exp(0.754 * logA);
                Zi = -0.087 * Math.exp(0.7307 * logA);
                Gamr = K * 0.189 * Math.exp(0.6185 * logA);
                Gami = K * (1 + 0.0978 * Math.exp(-0.6929 * logA)); 
            } else {
                let term = new Complex(-1.4664, 0.2115 * Af);
                let sqrtTerm = term.sqrt();
                Gamr = K * sqrtTerm.r;
                Gami = K * sqrtTerm.i;
                let numerator = new Complex(Af / (2 * Math.PI), 1.4035);
                let Z_val = numerator.div(sqrtTerm);
                Zr = Z_val.r;
                Zi = Z_val.i;
            }

            let Z_c = new Complex(Zr, Zi);
            let Gam_c = new Complex(Gamr, Gami);
            let M = (new Complex(0, -K)).div(Z_c.mult(Gam_c));
            let h_c = new Complex(Gami, -Gamr); 
            let hl_complex = h_c.scale(L1); 
            let kl_complex = new Complex(K * L1, 0);
            let p2 = hl_complex.mult(hl_complex).sub(kl_complex.mult(kl_complex));
            
            return { p2: p2, M: M };
        };

        // ==========================================
        // 1. FORLÆNS SWEEP: MODE (0,0)
        // ==========================================
        print("Regner (0,0)-moden forlæns (fra 62.5 Hz)...");
        let data00 = [];
        let lastW_00 = new Complex(0.1, 0.1); 
        let lastLastW_00 = new Complex(0.1, 0.1); 

        for (let i = 0; i < freqs.length; i++) {
            let f = freqs[i];
            let params = getParams(f);

            let guess00;
            if (i === 0) guess00 = new Complex(0.1, 0.1);
            else if (i === 1) guess00 = new Complex(lastW_00.r, lastW_00.i);
            else guess00 = lastW_00.add(lastW_00.sub(lastLastW_00)); 

            let res00 = solveNR(guess00, params.p2, params.M, b);
            
            if (res00.converged) {
                lastLastW_00 = lastW_00;
                lastW_00 = res00.w;
                data00.push({x: f, y: calcAttenuation(res00.w, f)});
            } else {
                lastLastW_00 = lastW_00;
            }
        }

        // ==========================================
        // 2. BAGLÆNS SWEEP: MODE (0,2)
        // ==========================================
        print("Regner (0,2)-moden baglæns (fra 4000 Hz) for at undgå hak...");
        let temp02 = [];
        // Ved høje frekvenser er w ~ Pi for (0,2) moden, hvilket er et perfekt startgæt
        let lastW_02 = new Complex(Math.PI, 0.1); 
        let lastLastW_02 = new Complex(Math.PI, 0.1); 

        for (let i = freqs.length - 1; i >= 0; i--) {
            let f = freqs[i];
            let params = getParams(f);

            let guess02;
            if (i === freqs.length - 1) guess02 = new Complex(Math.PI, 0.1);
            else if (i === freqs.length - 2) guess02 = new Complex(lastW_02.r, lastW_02.i);
            else guess02 = lastW_02.add(lastW_02.sub(lastLastW_02)); 

            let res02 = solveNR(guess02, params.p2, params.M, b);
            
            if (res02.converged) {
                lastLastW_02 = lastW_02;
                lastW_02 = res02.w;
                let atten02 = calcAttenuation(res02.w, f);
                
                // Vi tilføjer den kun til plottet, hvis dæmpningen er under et fornuftigt loft, så grafen ikke klemmes i bunden
                if (atten02 < 15) {
                    temp02.push({x: f, y: atten02});
                }
            } else {
                lastLastW_02 = lastW_02;
            }
        }
        
        // Vend (0,2) data om, så de passer til grafens X-akse
        let data02 = temp02.reverse();

        print("Tegner fuldendt graf!");
        
        // Find de bedste steder at sætte labels (0,0) og (0,2) baseret på det udregnede data
        let labelY00 = data00.find(p => p.x >= 250)?.y || 0;
        let labelY02 = data02.find(p => p.x >= 1200)?.y || 0;

        drawChart(data00, data02, 250, labelY00, 1200, labelY02);

    } catch (e) {
        print(`[MATEMATISK FEJL]: ${e.message}`);
    }
}

function drawChart(data00, data02, lblX00, lblY00, lblX02, lblY02) {
    let ctx = document.getElementById('resultChart').getContext('2d');
    if (chartInstance) { chartInstance.destroy(); }
    
    chartInstance = new Chart(ctx, {
        type: 'line', 
        data: {
            datasets: [
                {
                    label: '(0,0) Mode',
                    data: data00,
                    borderColor: '#2980b9', 
                    borderWidth: 2,
                    pointRadius: 0, 
                    fill: false,
                    tension: 0.1
                },
                {
                    label: '(0,2) Mode',
                    data: data02,
                    borderColor: '#e74c3c', 
                    borderWidth: 2,
                    pointRadius: 0, 
                    fill: false,
                    tension: 0.1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { 
                    type: 'logarithmic', 
                    title: { display: true, text: 'Frequency [Hz]', font: {weight: 'bold'} },
                    min: 62.5,
                    max: 4000
                },
                y: { 
                    title: { display: true, text: 'Attenuation per duct width [dB]', font: {weight: 'bold'} }, 
                    min: 0,
                    max: 10 
                }
            },
            plugins: {
                zoom: { pan: { enabled: true, mode: 'xy' }, zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' } },
                annotation: {
                    annotations: {
                        label00: {
                            type: 'label',
                            xValue: lblX00,
                            yValue: lblY00 + 0.6,
                            backgroundColor: 'rgba(255, 255, 255, 0.8)',
                            content: '(0,0)',
                            font: { size: 14, weight: 'bold', family: 'sans-serif' },
                            color: '#2980b9'
                        },
                        label02: {
                            type: 'label',
                            xValue: lblX02,
                            yValue: (lblY02 > 10 ? 9.5 : lblY02 + 0.6),
                            backgroundColor: 'rgba(255, 255, 255, 0.8)',
                            content: '(0,2)',
                            font: { size: 14, weight: 'bold', family: 'sans-serif' },
                            color: '#e74c3c'
                        }
                    }
                }
            }
        }
    });
}
</script>

</body>
</html>
