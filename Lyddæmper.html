<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4POLE - Akustisk Transmissionstab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .controls {
            flex: 1;
            min-width: 320px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chart-container {
            flex: 2;
            min-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .slider-group {
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .pipe-title {
            color: #2980b9;
            margin-top: 15px;
            margin-bottom: 8px;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 4px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h1>Q4POLE: Akustisk Transmissionstab (3 Elementer)</h1>
    
    <div class="container">
        <div class="controls">
            <h3 class="pipe-title">Rør 1 (Indgang)</h3>
            <div class="slider-group">
                <label>Længde: <span id="l1-val">0.3 m</span></label>
                <input type="range" id="l1" min="0.1" max="2.0" step="0.05" value="0.3">
            </div>
            <div class="slider-group">
                <label>Radius: <span id="r1-val">0.05 m</span></label>
                <input type="range" id="r1" min="0.01" max="0.2" step="0.01" value="0.05">
            </div>

            <h3 class="pipe-title">Rør 2 (Ekspansionskammer)</h3>
            <div class="slider-group">
                <label>Længde: <span id="l2-val">0.5 m</span></label>
                <input type="range" id="l2" min="0.1" max="3.0" step="0.05" value="0.5">
            </div>
            <div class="slider-group">
                <label>Radius: <span id="r2-val">0.20 m</span></label>
                <input type="range" id="r2" min="0.05" max="0.5" step="0.01" value="0.20">
            </div>

            <h3 class="pipe-title">Rør 3 (Udgang)</h3>
            <div class="slider-group">
                <label>Længde: <span id="l3-val">0.3 m</span></label>
                <input type="range" id="l3" min="0.1" max="2.0" step="0.05" value="0.3">
            </div>
            <div class="slider-group">
                <label>Radius: <span id="r3-val">0.05 m</span></label>
                <input type="range" id="r3" min="0.01" max="0.2" step="0.01" value="0.05">
            </div>
        </div>

        <div class="chart-container">
            <canvas id="tlChart"></canvas>
        </div>
    </div>

    <script>
        // Atmosfæriske konstanter
        const TE = 20; 
        const PS = 101300; 
        const GAM = 1.41; 
        const CS = Math.sqrt(GAM * 286.7 * (TE + 273.15)); 
        const RHO = GAM * PS / (CS * CS); 
        const IMPE = CS * RHO; 

        // Hjælpefunktioner til kompleks multiplikation
        function fnRcm(a, b, c, d) { return a * c - b * d; }
        function fnIcm(a, b, c, d) { return a * d + b * c; }

        // Multiplicer to 4-pols matricer
        function multMatrix(M1, M2) {
            return {
                ar: fnRcm(M1.ar, M1.ai, M2.ar, M2.ai) + fnRcm(M1.br, M1.bi, M2.cr, M2.ci),
                ai: fnIcm(M1.ar, M1.ai, M2.ar, M2.ai) + fnIcm(M1.br, M1.bi, M2.cr, M2.ci),
                br: fnRcm(M1.ar, M1.ai, M2.br, M2.bi) + fnRcm(M1.br, M1.bi, M2.dr, M2.di),
                bi: fnIcm(M1.ar, M1.ai, M2.br, M2.bi) + fnIcm(M1.br, M1.bi, M2.dr, M2.di),
                cr: fnRcm(M1.cr, M1.ci, M2.ar, M2.ai) + fnRcm(M1.dr, M1.di, M2.cr, M2.ci),
                ci: fnIcm(M1.cr, M1.ci, M2.ar, M2.ai) + fnIcm(M1.dr, M1.di, M2.cr, M2.ci),
                dr: fnRcm(M1.cr, M1.ci, M2.br, M2.bi) + fnRcm(M1.dr, M1.di, M2.dr, M2.di),
                di: fnIcm(M1.cr, M1.ci, M2.br, M2.bi) + fnIcm(M1.dr, M1.di, M2.dr, M2.di)
            };
        }

        // Generer matrix for et enkelt rør-element
        function getPipeMatrix(k, L, Z) {
            return {
                ar: Math.cos(k * L), ai: 0,
                br: 0, bi: Z * Math.sin(k * L),
                cr: 0, ci: (1 / Z) * Math.sin(k * L),
                dr: Math.cos(k * L), di: 0
            };
        }

        let tlChart;

        function calculateTransmissionLoss() {
            // Hent værdier
            const l1 = parseFloat(document.getElementById('l1').value);
            const r1 = parseFloat(document.getElementById('r1').value);
            const l2 = parseFloat(document.getElementById('l2').value);
            const r2 = parseFloat(document.getElementById('r2').value);
            const l3 = parseFloat(document.getElementById('l3').value);
            const r3 = parseFloat(document.getElementById('r3').value);

            // Udregn akustisk impedans for hvert rør
            const z1 = IMPE / (Math.PI * r1 * r1);
            const z2 = IMPE / (Math.PI * r2 * r2);
            const z3 = IMPE / (Math.PI * r3 * r3);

            const fMax = 1000; 
            const nsc = 200; // Øget opløsning for pænere kurver
            const fRes = fMax / nsc; 

            let frequencies = [];
            let tlValues = [];

            for (let j = 1; j <= nsc; j++) {
                const f = j * fRes;
                frequencies.push(f.toFixed(1));
                const k = (2 * Math.PI * f) / CS;

                // Udregn matricer for alle 3 rør
                let M1 = getPipeMatrix(k, l1, z1);
                let M2 = getPipeMatrix(k, l2, z2);
                let M3 = getPipeMatrix(k, l3, z3);

                // Kombiner systemet (M_total = M1 * M2 * M3)
                let M_12 = multMatrix(M1, M2);
                let M_tot = multMatrix(M_12, M3);

                // Transmissionstab udregning på tværs af systemet (Rør 1 til Rør 3)
                let rat = r1 / r3;
                let bie = Math.sqrt(z1 * z3);

                let x1 = M_tot.ar * rat + M_tot.br / bie + M_tot.cr * bie + M_tot.dr / rat;
                let x2 = M_tot.ai * rat + M_tot.bi / bie + M_tot.ci * bie + M_tot.di / rat;

                let damp = Math.sqrt(x1 * x1 + x2 * x2) / 2;
                
                // Konverter til Decibel (dB)
                let tl = 20 * Math.log10(Math.max(damp, 1)); 
                tlValues.push(tl);
            }

            updateChart(frequencies, tlValues);
        }

        function updateChart(labels, data) {
            if (tlChart) {
                tlChart.data.labels = labels;
                tlChart.data.datasets[0].data = data;
                tlChart.update();
            } else {
                const ctx = document.getElementById('tlChart').getContext('2d');
                tlChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Transmissionstab (dB)',
                            data: data,
                            borderColor: '#e74c3c',
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                title: { display: true, text: 'Frekvens (Hz)' },
                                ticks: { maxTicksLimit: 10 }
                            },
                            y: {
                                title: { display: true, text: 'Dæmpning (dB)' },
                                min: 0
                            }
                        },
                        animation: {
                            duration: 100 // Endnu hurtigere animation til smooth sliders
                        }
                    }
                });
            }
        }

        // Lyt på alle sliders og opdater værdier + graf
        const inputs = ['l1', 'r1', 'l2', 'r2', 'l3', 'r3'];
        inputs.forEach(id => {
            const element = document.getElementById(id);
            element.addEventListener('input', (e) => {
                document.getElementById(`${id}-val`).innerText = e.target.value + ' m';
                calculateTransmissionLoss();
            });
        });

        // Kør første beregning
        calculateTransmissionLoss();
    </script>
</body>
</html>
