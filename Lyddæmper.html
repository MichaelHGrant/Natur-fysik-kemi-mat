<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4POLE - Akustisk Transmissionstab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .controls {
            flex: 1;
            min-width: 300px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chart-container {
            flex: 2;
            min-width: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .slider-group {
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .pipe-title {
            color: #2980b9;
            margin-bottom: 10px;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>Q4POLE: Akustisk Transmissionstab</h1>
    
    <div class="container">
        <div class="controls">
            <h3 class="pipe-title">Rør 1 (Indgang)</h3>
            <div class="slider-group">
                <label>Længde: <span id="l1-val">0.5 m</span></label>
                <input type="range" id="l1" min="0.1" max="5.0" step="0.1" value="0.5">
            </div>
            <div class="slider-group">
                <label>Radius: <span id="r1-val">0.05 m</span></label>
                <input type="range" id="r1" min="0.01" max="0.5" step="0.01" value="0.05">
            </div>

            <h3 class="pipe-title">Rør 2 (Ekspansion/Kanal)</h3>
            <div class="slider-group">
                <label>Længde: <span id="l2-val">1.0 m</span></label>
                <input type="range" id="l2" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
            <div class="slider-group">
                <label>Radius: <span id="r2-val">0.15 m</span></label>
                <input type="range" id="r2" min="0.01" max="0.5" step="0.01" value="0.15">
            </div>
        </div>

        <div class="chart-container">
            <canvas id="tlChart"></canvas>
        </div>
    </div>

    <script>
        // Fysiske konstanter fra QBasic koden
        const TE = 20; // Temperatur [cite: 12]
        const PS = 101300; // Atmosfærisk tryk [cite: 12]
        const GAM = 1.41; // Ratio of specific heats 
        const CS = Math.sqrt(GAM * 286.7 * (TE + 273.15)); // Lydens hastighed 
        const RHO = GAM * PS / (CS * CS); // Densitet 
        const IMPE = CS * RHO; // Karakteristisk impedans af luft 

        // Kompleks multiplikation [cite: 45]
        function fnRcm(a, b, c, d) { return a * c - b * d; }
        function fnIcm(a, b, c, d) { return a * d + b * c; }

        let tlChart;

        function calculateTransmissionLoss() {
            const l1 = parseFloat(document.getElementById('l1').value);
            const r1 = parseFloat(document.getElementById('r1').value);
            const l2 = parseFloat(document.getElementById('l2').value);
            const r2 = parseFloat(document.getElementById('r2').value);

            const z1 = IMPE / (Math.PI * r1 * r1); // Akustisk impedans for rør 1 [cite: 34]
            const z2 = IMPE / (Math.PI * r2 * r2); // Akustisk impedans for rør 2 [cite: 34]

            const fMax = 1000; // Max frekvens [cite: 22]
            const nsc = 100;   // Antal spektrale komponenter [cite: 21]
            const fRes = fMax / nsc; // Frekvensopløsning [cite: 23]

            let frequencies = [];
            let tlValues = [];

            for (let j = 1; j <= nsc; j++) {
                const f = j * fRes;
                frequencies.push(f.toFixed(1));
                const k = (2 * Math.PI * f) / CS;

                // Fire-pols parametre for rør 1 [cite: 43, 44]
                let ar1 = Math.cos(k * l1), ai1 = 0;
                let br1 = 0, bi1 = z1 * Math.sin(k * l1);
                let cr1 = 0, ci1 = (1 / z1) * Math.sin(k * l1);
                let dr1 = ar1, di1 = 0;

                // Fire-pols parametre for rør 2 [cite: 43, 44]
                let ar2 = Math.cos(k * l2), ai2 = 0;
                let br2 = 0, bi2 = z2 * Math.sin(k * l2);
                let cr2 = 0, ci2 = (1 / z2) * Math.sin(k * l2);
                let dr2 = ar2, di2 = 0;

                // Kombineret system via kompleks matrix multiplikation [cite: 49, 50, 51, 52]
                let ar_tot = fnRcm(ar1, ai1, ar2, ai2) + fnRcm(br1, bi1, cr2, ci2);
                let ai_tot = fnIcm(ar1, ai1, ar2, ai2) + fnIcm(br1, bi1, cr2, ci2);

                let br_tot = fnRcm(ar1, ai1, br2, bi2) + fnRcm(br1, bi1, dr2, di2);
                let bi_tot = fnIcm(ar1, ai1, br2, bi2) + fnIcm(br1, bi1, dr2, di2);

                let cr_tot = fnRcm(cr1, ci1, ar2, ai2) + fnRcm(dr1, di1, cr2, ci2);
                let ci_tot = fnIcm(cr1, ci1, ar2, ai2) + fnIcm(dr1, di1, cr2, ci2);

                let dr_tot = fnRcm(cr1, ci1, br2, bi2) + fnRcm(dr1, di1, dr2, di2);
                let di_tot = fnIcm(cr1, ci1, br2, bi2) + fnIcm(dr1, di1, dr2, di2);

                // Transmissionstab udregning [cite: 56, 57]
                let rat = r1 / r2;
                let bie = Math.sqrt(z1 * z2);

                let x1 = ar_tot * rat + br_tot / bie + cr_tot * bie + dr_tot / rat;
                let x2 = ai_tot * rat + bi_tot / bie + ci_tot * bie + di_tot / rat;

                let damp = Math.sqrt(x1 * x1 + x2 * x2) / 2;
                
                // Omregn til dB: 20 * log10(damp) svarer til 8.685889 * log(e) i QBasic 
                let tl = 20 * Math.log10(Math.max(damp, 1)); 
                tlValues.push(tl);
            }

            updateChart(frequencies, tlValues);
        }

        function updateChart(labels, data) {
            if (tlChart) {
                tlChart.data.labels = labels;
                tlChart.data.datasets[0].data = data;
                tlChart.update();
            } else {
                const ctx = document.getElementById('tlChart').getContext('2d');
                tlChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Transmissionstab (dB)',
                            data: data,
                            borderColor: '#2980b9',
                            backgroundColor: 'rgba(41, 128, 185, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: {
                                title: { display: true, text: 'Frekvens (Hz)' },
                                ticks: { maxTicksLimit: 10 }
                            },
                            y: {
                                title: { display: true, text: 'Dæmpning (dB)' },
                                min: 0
                            }
                        },
                        animation: {
                            duration: 200 // Gør grafen hurtig og responsiv ved slider-brug
                        }
                    }
                });
            }
        }

        // Event listeners til sliders
        const inputs = ['l1', 'r1', 'l2', 'r2'];
        inputs.forEach(id => {
            const element = document.getElementById(id);
            element.addEventListener('input', (e) => {
                document.getElementById(`${id}-val`).innerText = e.target.value + ' m';
                calculateTransmissionLoss();
            });
        });

        // Initial beregning
        calculateTransmissionLoss();
    </script>
</body>
</html>
