<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4POLE - Akustisk Transmissionstab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .controls {
            flex: 1;
            min-width: 350px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 80vh;
            overflow-y: auto;
        }
        .chart-container {
            flex: 2;
            min-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .slider-group {
            margin-bottom: 12px;
            padding-bottom: 8px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .pipe-box {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            position: relative;
        }
        .pipe-title {
            color: #2980b9;
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 4px;
            font-size: 1.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #2980b9;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { background: #1c5980; }
        .btn-remove {
            background: #e74c3c;
            padding: 4px 8px;
            font-size: 0.8em;
            width: auto;
            margin-top: 0;
        }
        .btn-remove:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h1>Q4POLE: Dynamisk Lyddæmper Design</h1>
    
    <div class="container">
        <div class="controls">
            <div id="pipes-container"></div>
            <button class="btn" onclick="addChamber()">+ Tilføj Ekspansionskammer</button>
        </div>

        <div class="chart-container">
            <canvas id="tlChart"></canvas>
        </div>
    </div>

    <script>
        // Atmosfæriske konstanter
        const TE = 20; 
        const PS = 101300; 
        const GAM = 1.41; 
        const CS = Math.sqrt(GAM * 286.7 * (TE + 273.15)); 
        const RHO = GAM * PS / (CS * CS); 
        const IMPE = CS * RHO; 

        // Hjælpefunktioner til kompleks multiplikation
        function fnRcm(a, b, c, d) { return a * c - b * d; }
        function fnIcm(a, b, c, d) { return a * d + b * c; }

        function multMatrix(M1, M2) {
            return {
                ar: fnRcm(M1.ar, M1.ai, M2.ar, M2.ai) + fnRcm(M1.br, M1.bi, M2.cr, M2.ci),
                ai: fnIcm(M1.ar, M1.ai, M2.ar, M2.ai) + fnIcm(M1.br, M1.bi, M2.cr, M2.ci),
                br: fnRcm(M1.ar, M1.ai, M2.br, M2.bi) + fnRcm(M1.br, M1.bi, M2.dr, M2.di),
                bi: fnIcm(M1.ar, M1.ai, M2.br, M2.bi) + fnIcm(M1.br, M1.bi, M2.dr, M2.di),
                cr: fnRcm(M1.cr, M1.ci, M2.ar, M2.ai) + fnRcm(M1.dr, M1.di, M2.cr, M2.ci),
                ci: fnIcm(M1.cr, M1.ci, M2.ar, M2.ai) + fnIcm(M1.dr, M1.di, M2.cr, M2.ci),
                dr: fnRcm(M1.cr, M1.ci, M2.br, M2.bi) + fnRcm(M1.dr, M1.di, M2.dr, M2.di),
                di: fnIcm(M1.cr, M1.ci, M2.br, M2.bi) + fnIcm(M1.dr, M1.di, M2.dr, M2.di)
            };
        }

        function getPipeMatrix(k, L, Z) {
            return {
                ar: Math.cos(k * L), ai: 0,
                br: 0, bi: Z * Math.sin(k * L),
                cr: 0, ci: (1 / Z) * Math.sin(k * L),
                dr: Math.cos(k * L), di: 0
            };
        }

        let tlChart;
        let pipeCounter = 3;

        // Start-opsætning med 3 elementer
        let pipes = [
            { id: 1, l: 0.3, r: 0.05 },
            { id: 2, l: 0.5, r: 0.20 },
            { id: 3, l: 0.3, r: 0.05 }
        ];

        // Generer HTML for sliders dynamisk
        function renderUI() {
            const container = document.getElementById('pipes-container');
            container.innerHTML = '';

            pipes.forEach((pipe, index) => {
                let title = "";
                let isRemovable = false;

                if (index === 0) {
                    title = "Rør 1 (Indgang)";
                } else if (index === pipes.length - 1) {
                    title = `Rør ${index + 1} (Udgang)`;
                } else {
                    title = `Rør ${index + 1} (Ekspansionskammer)`;
                    isRemovable = true;
                }

                const pipeHTML = `
                    <div class="pipe-box">
                        <h3 class="pipe-title">
                            ${title} 
                            ${isRemovable ? `<button class="btn btn-remove" onclick="removePipe(${pipe.id})">Slet</button>` : ''}
                        </h3>
                        <div class="slider-group">
                            <label>Længde: <span id="l-val-${pipe.id}">${pipe.l.toFixed(2)} m</span></label>
                            <input type="range" id="l-${pipe.id}" min="0.05" max="3.0" step="0.05" value="${pipe.l}" oninput="updatePipe(${pipe.id}, 'l', this.value)">
                        </div>
                        <div class="slider-group">
                            <label>Radius: <span id="r-val-${pipe.id}">${pipe.r.toFixed(2)} m</span></label>
                            <input type="range" id="r-${pipe.id}" min="0.01" max="0.5" step="0.01" value="${pipe.r}" oninput="updatePipe(${pipe.id}, 'r', this.value)">
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', pipeHTML);
            });
        }

        // Opdater array når slider flyttes
        window.updatePipe = function(id, prop, value) {
            const val = parseFloat(value);
            const pipe = pipes.find(p => p.id === id);
            if (pipe) {
                pipe[prop] = val;
                document.getElementById(`${prop}-val-${id}`).innerText = val.toFixed(2) + ' m';
                calculateTransmissionLoss();
            }
        };

        // Tilføj et nyt kammer (indsættes lige før udgangsrøret)
        window.addChamber = function() {
            pipeCounter++;
            const newChamber = { id: pipeCounter, l: 0.5, r: 0.20 };
            pipes.splice(pipes.length - 1, 0, newChamber);
            renderUI();
            calculateTransmissionLoss();
        };

        // Fjern et kammer
        window.removePipe = function(id) {
            pipes = pipes.filter(p => p.id !== id);
            renderUI();
            calculateTransmissionLoss();
        };

        function calculateTransmissionLoss() {
            const fMax = 1000; 
            const nsc = 250; 
            const fRes = fMax / nsc; 

            let frequencies = [];
            let tlValues = [];

            // Find start- og slut-impedans
            const rFirst = pipes[0].r;
            const rLast = pipes[pipes.length - 1].r;
            const zFirst = IMPE / (Math.PI * rFirst * rFirst);
            const zLast = IMPE / (Math.PI * rLast * rLast);

            for (let j = 1; j <= nsc; j++) {
                const f = j * fRes;
                frequencies.push(f.toFixed(1));
                const k = (2 * Math.PI * f) / CS;

                let M_tot = null;

                // Gang alle rør-matricer sammen dynamisk
                for (let i = 0; i < pipes.length; i++) {
                    const z = IMPE / (Math.PI * pipes[i].r * pipes[i].r);
                    const M_current = getPipeMatrix(k, pipes[i].l, z);

                    if (i === 0) {
                        M_tot = M_current;
                    } else {
                        M_tot = multMatrix(M_tot, M_current);
                    }
                }

                // Udregn dæmpning
                const rat = rFirst / rLast;
                const bie = Math.sqrt(zFirst * zLast);

                const x1 = M_tot.ar * rat + M_tot.br / bie + M_tot.cr * bie + M_tot.dr / rat;
                const x2 = M_tot.ai * rat + M_tot.bi / bie + M_tot.ci * bie + M_tot.di / rat;

                const damp = Math.sqrt(x1 * x1 + x2 * x2) / 2;
                const tl = 20 * Math.log10(Math.max(damp, 1)); 
                tlValues.push(tl);
            }

            updateChart(frequencies, tlValues);
        }

        function updateChart(labels, data) {
            if (tlChart) {
                tlChart.data.labels = labels;
                tlChart.data.datasets[0].data = data;
                tlChart.update();
            } else {
                const ctx = document.getElementById('tlChart').getContext('2d');
                tlChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Transmissionstab (dB)',
                            data: data,
                            borderColor: '#2ecc71',
                            backgroundColor: 'rgba(46, 204, 113, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                title: { display: true, text: 'Frekvens (Hz)' },
                                ticks: { maxTicksLimit: 10 }
                            },
                            y: {
                                title: { display: true, text: 'Dæmpning (dB)' },
                                min: 0
                            }
                        },
                        animation: {
                            duration: 0 // Slukket animation for super flydende slider-opførsel
                        }
                    }
                });
            }
        }

        // Kør opstart
        renderUI();
        calculateTransmissionLoss();
    </script>
</body>
</html>
