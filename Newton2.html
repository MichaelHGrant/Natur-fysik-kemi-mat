<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>3D Newtons Kanon</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #050510; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(20, 20, 20, 0.85); padding: 20px; border-radius: 8px; border: 1px solid #444; box-shadow: 0px 4px 15px rgba(0,0,0,0.5); }
        button { padding: 8px 15px; margin-right: 5px; cursor: pointer; background: #333; color: white; border: 1px solid #777; border-radius: 4px; font-weight: bold; }
        button:hover { background: #555; }
       .control-group { margin-top: 15px; }
        label { font-size: 14px; display: block; margin-bottom: 5px; color: #ddd; }
        input[type=range] { width: 250px; }
       .tip { font-size: 12px; color: #88ff88; margin-top: 15px; font-style: italic; max-width: 250px; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="ui">
        <h2>3D Newtons Kanon</h2>
        <div>
            <button id="btnStart">Start</button>
            <button id="btnStop">Stop</button>
            <button id="btnReset">Reset</button>
        </div>
        <div class="control-group">
            <label>Hastighed: <span id="valSpeed">7200</span> m/s</label>
            <input type="range" id="sldSpeed" min="0" max="12000" step="50" value="7200">
        </div>
        <div class="control-group">
            <label>Højde: <span id="valHeight">1000</span> km</label>
            <input type="range" id="sldHeight" min="0" max="20000" step="100" value="1000">
        </div>
        <div class="tip">▶ Klik og træk med musen for at rotere Jorden i 3D.<br>▶ Scroll for at zoome ind og ud.</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Fysiske konstanter
        const G = 6.6738e-11;
        const M = 5.97219e24;
        const MU = G * M;
        const R_EARTH = 6371000; 

        // Skalering så browseren kan håndtere de enorme astronomiske afstande i 3D-rummet
        const SCALE = 1 / 100000;

        // 1. Opsætning af Scene, Kamera og Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, R_EARTH * SCALE * 1.5, R_EARTH * SCALE * 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. 3D Kamerakontrol (Det der gør jorden roterbar med musen)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 3. Jorden (Grøn kugle med gitter, så rotationen tydeligt kan ses)
        const earthGeo = new THREE.SphereGeometry(R_EARTH * SCALE, 32, 32);
        const earthMat = new THREE.MeshPhongMaterial({
            color: 0x00aa00,
            emissive: 0x002200,
            wireframe: true 
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        scene.add(earth);

        // 4. Satellitten (Rød kanonkugle)
        const satGeo = new THREE.SphereGeometry(3, 16, 16);
        const satMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const satellite = new THREE.Mesh(satGeo, satMat);
        scene.add(satellite);

        // 5. Tegn sporet (Halen efter satellitten)
        const maxTrailPoints = 1500;
        const trailGeo = new THREE.BufferGeometry();
        const trailPositions = new Float32Array(maxTrailPoints * 3);
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        const trailMat = new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
        const trail = new THREE.Line(trailGeo, trailMat);
        scene.add(trail);
        let trailIndex = 0;

        // Lys opsætning
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(100, 100, 100);
        scene.add(dirLight);

        // State for fysikken
        let isRunning = false;
        let state = { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0 };

        function resetSim() {
            isRunning = false;
            const speed = parseFloat(document.getElementById('sldSpeed').value);
            const heightKm = parseFloat(document.getElementById('sldHeight').value);

            // Placer satellitten over jordens overflade på Y-aksen
            state.x = 0;
            state.y = R_EARTH + (heightKm * 1000);
            state.z = 0;

            // Fyr kanonen horisontalt ud af X-aksen
            state.vx = speed;
            state.vy = 0;
            state.vz = 0;

            satellite.position.set(state.x * SCALE, state.y * SCALE, state.z * SCALE);

            // Slet tidligere tegnet spor
            trailIndex = 0;
            for(let i=0; i<maxTrailPoints*3; i++) trailPositions[i] = 0;
            trailGeo.setDrawRange(0, 0);
        }

        // Kærnen i Newtons love
        function physicsStep(dt) {
            const r = Math.sqrt(state.x**2 + state.y**2 + state.z**2);

            if (r <= R_EARTH) {
                isRunning = false; // Den ramte Jorden
                return;
            }

            const a_mag = -MU / (r * r * r);
            state.vx += a_mag * state.x * dt;
            state.vy += a_mag * state.y * dt;
            state.vz += a_mag * state.z * dt;

            state.x += state.vx * dt;
            state.y += state.vy * dt;
            state.z += state.vz * dt;
        }

        // Animations-loop, som browseren kalder hele tiden
        function animate() {
            requestAnimationFrame(animate);

            if (isRunning) {
                const subSteps = 30; // Beregn fysikken hurtigt flere gange pr. frame
                const dt = 10; 

                for (let i = 0; i < subSteps; i++) {
                    if (!isRunning) break;
                    physicsStep(dt);
                }

                satellite.position.set(state.x * SCALE, state.y * SCALE, state.z * SCALE);

                // Opdater det gule spor
                if (trailIndex < maxTrailPoints) {
                    trailPositions[trailIndex * 3] = state.x * SCALE;
                    trailPositions[trailIndex * 3 + 1] = state.y * SCALE;
                    trailPositions[trailIndex * 3 + 2] = state.z * SCALE;
                    trailGeo.attributes.position.needsUpdate = true;
                    trailGeo.setDrawRange(0, trailIndex + 1);
                    trailIndex++;
                }
            }

            controls.update(); 
            renderer.render(scene, camera);
        }

        // UI Knapper
        document.getElementById('btnStart').onclick = () => { isRunning = true; };
        document.getElementById('btnStop').onclick = () => { isRunning = false; };
        document.getElementById('btnReset').onclick = resetSim;

        document.getElementById('sldSpeed').oninput = (e) => {
            document.getElementById('valSpeed').innerText = e.target.value;
            if(!isRunning) resetSim();
        };
        document.getElementById('sldHeight').oninput = (e) => {
            document.getElementById('valHeight').innerText = e.target.value;
            if(!isRunning) resetSim();
        };

        // Tilpas skærmen hvis vinduet ændrer størrelse
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        resetSim();
        animate();
    </script>
</body>
</html>
