<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom - Komplet & Stabil Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; background: #000; touch-action: none; }
        #ui-panel { height: 50%; background: #0f172a; border-top: 2px solid #1e293b; padding: 15px; overflow-y: auto; z-index: 100; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #ui-panel { width: 400px; height: 100%; border-top: none; border-left: 2px solid #1e293b; }
        }

        select { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; width: 100%; font-size: 16px; }
        .orb-btn { background: #1e293b; border: 1px solid #334155; padding: 8px; border-radius: 6px; color: #94a3b8; font-size: 12px; cursor: pointer; text-align: center; }
        .orb-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; font-weight: bold; }
        input[type=range] { width: 100%; height: 30px; touch-action: none; }
        .spec-line { position: absolute; width: 4px; height: 100%; cursor: pointer; border-radius: 2px; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10 bg-black/40 p-2 rounded-lg pointer-events-none">
            <h1 class="text-lg font-bold text-white">Orbital Model</h1>
            <p id="label-info" class="text-blue-400 font-mono text-xs">Vælg orbital...</p>
        </div>
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/60 z-50">
            <div class="bg-blue-600 px-4 py-2 rounded-full text-xs font-bold animate-pulse">Beregner...</div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Niveau (n)</label>
                    <select id="n-val">
                        <option value="1">n = 1</option><option value="2">n = 2</option>
                        <option value="3">n = 3</option><option value="4">n = 4</option>
                        <option value="5">n = 5</option><option value="6">n = 6</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Energi (E<sub>n</sub>)</label>
                    <div class="bg-slate-900 p-2 rounded border border-slate-800 text-blue-400 font-mono text-sm mt-1" id="energy-val">-13.6 eV</div>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Vælg Underskal (l)</label>
                <div id="l-btns" class="grid grid-cols-3 gap-2"></div>
            </div>

            <div>
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Synligt Spektrum (Balmer)</h3>
                <div id="spec-box" class="h-10 bg-black rounded relative border border-slate-800 cursor-pointer"></div>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Rotation</label>
                <div class="grid grid-cols-2 gap-4">
                    <input id="rot-x" type="range" min="0" max="6.28" step="0.1">
                    <input id="rot-y" type="range" min="0" max="6.28" step="0.1">
                </div>
            </div>

            <div class="text-[9px] text-slate-600 text-center italic">
                Blå = Positiv fase (+) | Rød = Negativ fase (-)
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene, camera, renderer, controls, points;
    const container = document.getElementById('canvas-container');
    const loader = document.getElementById('loader');
    const lNames = ['s', 'p', 'd', 'f', 'g', 'h'];

    // MATEMATIK: Alle bølgefunktioner fra s til h
    const orbitalFuncs = {
        's': (r, th, ph, n) => {
            let lag = 1;
            if(n==2) lag = (1 - 0.5*r);
            if(n==3) lag = (1 - 0.66*r + 0.07*r*r);
            if(n>=4) lag = (1 - 0.2*r);
            return lag * Math.exp(-r/n);
        },
        'p': (r, th, ph, n) => (r * Math.exp(-r/n)) * Math.cos(th),
        'd': (r, th, ph, n) => (r*r * Math.exp(-r/n)) * (3*Math.cos(th)**2 - 1),
        'f': (r, th, ph, n) => (r**3 * Math.exp(-r/n)) * (5*Math.cos(th)**3 - 3*Math.cos(th)),
        'g': (r, th, ph, n) => (r**4 * Math.exp(-r/n)) * Math.sin(th)**4 * Math.cos(4*ph),
        'h': (r, th, ph, n) => (r**5 * Math.exp(-r/n)) * Math.sin(th)**5 * Math.cos(5*ph)
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 5000);
        camera.position.z = 50;

        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false;

        setupUI();
        drawSpectrum();
        updateModel('1s');
        animate();
    }

    function generatePoints(fullName) {
        loader.classList.remove('hidden');
        const n = parseInt(fullName[0]);
        const lType = fullName.slice(1);
        
        setTimeout(() => {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const count = window.innerWidth < 768 ? 80000 : 150000;
            const pos = new Float32Array(count * 3);
            const cols = new Float32Array(count * 3);
            const func = orbitalFuncs[lType] || orbitalFuncs['s'];
            
            const maxR = n * n * 7; 
            const color = new THREE.Color();
            let found = 0, attempts = 0;

            // FAIL-SAFE: Kør kun i max 100ms for at undgå frys
            const startTime = Date.now();

            while (found < count && attempts < 2000000) {
                if (attempts % 5000 === 0 && (Date.now() - startTime) > 100) break;

                let r = Math.random() * maxR;
                let th = Math.random() * Math.PI;
                let ph = Math.random() * Math.PI * 2;

                let val = func(r, th, ph, n);
                let prob = val * val * (r*r); // r^2 er volume elementet

                // Dynamisk sandsynligheds-skalering så alle n-værdier er tydelige
                const threshold = (n === 1) ? 0.4 : (0.1 / (n*0.5));

                if (prob > Math.random() * threshold) {
                    let idx = found * 3;
                    pos[idx] = r * Math.sin(th) * Math.cos(ph);
                    pos[idx+1] = r * Math.sin(th) * Math.sin(ph);
                    pos[idx+2] = r * Math.cos(th);

                    if (val > 0) color.setRGB(0.2, 0.6, 1.0); else color.setRGB(1.0, 0.3, 0.3);
                    cols[idx] = color.r; cols[idx+1] = color.g; cols[idx+2] = color.b;
                    found++;
                }
                attempts++;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos.slice(0, found * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols.slice(0, found * 3), 3));
            
            points = new THREE.Points(geo, new THREE.PointsMaterial({ 
                size: n * 0.15, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending 
            }));
            scene.add(points);
            camera.position.z = maxR * 1.3;
            loader.classList.add('hidden');
            document.getElementById('label-info').innerText = fullName + " (" + found.toLocaleString() + " punkter)";
        }, 30);
    }

    function updateButtons(n) {
        const container = document.getElementById('l-btns');
        container.innerHTML = '';
        for(let i=0; i<n; i++) {
            const name = lNames[i];
            const btn = document.createElement('button');
            btn.className = 'orb-btn' + (name === 's' ? ' active' : '');
            btn.innerHTML = n + '<b>' + name + '</b>';
            btn.onclick = (e) => {
                document.querySelectorAll('.orb-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                generatePoints(n + name);
            };
            container.appendChild(btn);
        }
    }

    function updateModel(fullName) {
        const n = fullName[0];
        document.getElementById('energy-val').innerText = (-13.6 / (n*n)).toFixed(2) + " eV";
        updateButtons(n);
        generatePoints(fullName);
    }

    function setupUI() {
        const nS = document.getElementById('n-val');
        nS.onchange = () => updateModel(nS.value + 's');
        const rx = document.getElementById('rot-x'), ry = document.getElementById('rot-y');
        const upRot = () => { if(points) points.rotation.set(rx.value, ry.value, 0); };
        rx.oninput = upRot; ry.oninput = upRot;
        window.onresize = () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    }

    function drawSpectrum() {
        const box = document.getElementById('spec-box');
        const lines = [
            {n:3, c:'#ff0000', nm:656}, {n:4, c:'#00ffff', nm:486}, 
            {n:5, c:'#4b0082', nm:434}, {n:6, c:'#8b00ff', nm:410}
        ];
        lines.forEach(l => {
            const d = document.createElement('div');
            d.className = 'spec-line'; d.style.backgroundColor = l.c; d.style.left = (l.n-2)*18 + '%';
            d.onclick = () => { document.getElementById('n-val').value = l.n; updateModel(l.n + 's'); };
            box.appendChild(d);
        });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
