<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom - Den Komplette Orbital-Samling (n=1-6)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; background: #000; cursor: move; }
        #ui-panel { height: 45%; background: #0f172a; border-top: 2px solid #1e293b; padding: 20px; overflow-y: auto; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #ui-panel { width: 420px; height: 100%; border-top: none; border-left: 2px solid #1e293b; }
        }

        .orb-btn { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: #94a3b8; font-size: 13px; transition: 0.2s; text-align: center; }
        .orb-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        input[type=range] { width: 100%; height: 35px; touch-action: none; cursor: pointer; }
        select { background: #1e293b; color: white; padding: 12px; border-radius: 8px; width: 100%; border: 1px solid #334155; font-size: 16px; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10 pointer-events-none">
            <h1 class="text-xl font-bold text-white">Brintatom Orbitaler</h1>
            <div id="status" class="text-xs text-blue-400">Vælg et niveau for at starte</div>
        </div>
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/60 z-20">
            <div class="text-center">
                <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                <div class="text-blue-400 font-bold text-sm">Beregner 150.000 positioner...</div>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Hovedkvantetal (n)</label>
                <select id="n-select" class="mt-1">
                    <option value="1">n = 1 (K-skal)</option>
                    <option value="2">n = 2 (L-skal)</option>
                    <option value="3">n = 3 (M-skal)</option>
                    <option value="4">n = 4 (N-skal)</option>
                    <option value="5">n = 5 (O-skal)</option>
                    <option value="6">n = 6 (P-skal)</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Underskaller (l)</label>
                <div id="l-btns" class="grid grid-cols-4 gap-2 mt-2">
                    </div>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Manuel Rotation (X & Y)</label>
                <div class="mt-2 space-y-1">
                    <input id="rot-x" type="range" min="0" max="6.28" step="0.01" value="0">
                    <input id="rot-y" type="range" min="0" max="6.28" step="0.01" value="0">
                </div>
            </div>

            <div class="p-4 bg-blue-900/20 rounded-xl border border-blue-500/20">
                <h3 class="text-xs font-bold text-blue-400 uppercase mb-1">Info</h3>
                <p class="text-[10px] text-slate-400 leading-relaxed">
                    Jo højere underskal (f.eks. f, g, h), jo flere "lapper" har orbitalen. Dette skyldes elektronens vinkelmoment.
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene, camera, renderer, controls, points;
    var container = document.getElementById('canvas-container');
    var loader = document.getElementById('loader');
    var status = document.getElementById('status');

    // Komplet bibliotek af bølgefunktioner (Sandsynlighedstætheder)
    var waveFuncs = {
        's': function(r, x, y, z, n) { return Math.exp(-2 * r / n); },
        'p': function(r, x, y, z, n) { return z * z * Math.exp(-r / (n/2)); },
        'd': function(r, x, y, z, n) { return (x * y * x * y) * Math.exp(-2 * r / n); },
        'f': function(r, x, y, z, n) { return (x * y * z * x * y * z) * Math.exp(-2 * r / n); },
        'g': function(r, x, y, z, n) { return Math.pow(x*x*y*y - y*y*z*z, 2) * Math.exp(-2 * r / n); },
        'h': function(r, x, y, z, n) { return Math.pow(x*y*z * (x*x - y*y), 2) * Math.exp(-2 * r / n); }
    };

    var nConfig = {
        '1': { box: 14, maxP: 1.0, sub: ['s'] },
        '2': { box: 28, maxP: 0.6, sub: ['s', 'p'] },
        '3': { box: 58, maxP: 0.3, sub: ['s', 'p', 'd'] },
        '4': { box: 95, maxP: 0.15, sub: ['s', 'p', 'd', 'f'] },
        '5': { box: 145, maxP: 0.08, sub: ['s', 'p', 'd', 'f', 'g'] },
        '6': { box: 215, maxP: 0.04, sub: ['s', 'p', 'd', 'f', 'g', 'h'] }
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 5000);
        
        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        setupUI();
        updateButtons('1');
        generate('1s');
        animate();
    }

    function generate(fullName) {
        loader.classList.remove('hidden');
        var n = fullName[0];
        var type = fullName.slice(1);
        status.innerText = "Beregner " + n + type + "...";

        setTimeout(function() {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            var conf = nConfig[n];
            var func = waveFuncs[type] || waveFuncs['s'];
            
            var targetCount = 150000; 
            var positions = new Float32Array(targetCount * 3);
            var colors = new Float32Array(targetCount * 3);
            var color = new THREE.Color();

            var found = 0;
            var attempts = 0;
            var box = conf.box;

            while (found < targetCount && attempts < 3000000) {
                var x = (Math.random()-0.5)*box;
                var y = (Math.random()-0.5)*box;
                var z = (Math.random()-0.5)*box;
                var r = Math.sqrt(x*x + y*y + z*z);
                
                // Vi sender n med ind i funktionen for korrekt skalering
                if (func(r, x, y, z, parseInt(n)) > Math.random() * conf.maxP) {
                    var idx = found * 3;
                    positions[idx] = x;
                    positions[idx+1] = y;
                    positions[idx+2] = z;

                    color.setHSL(0.58 + (r/box)*0.1, 0.9, 0.5);
                    colors[idx] = color.r;
                    colors[idx+1] = color.g;
                    colors[idx+2] = color.b;
                    found++;
                }
                attempts++;
            }

            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions.slice(0, found * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors.slice(0, found * 3), 3));
            
            points = new THREE.Points(geo, new THREE.PointsMaterial({
                size: n > 3 ? 0.4 : 0.2, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.75,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            }));
            
            scene.add(points);
            camera.position.z = box * 1.6;
            loader.classList.add('hidden');
            status.innerText = n + type + " - " + found.toLocaleString() + " positioner";
        }, 50);
    }

    function updateButtons(n) {
        var btnContainer = document.getElementById('l-btns');
        btnContainer.innerHTML = '';
        nConfig[n].sub.forEach(function(s) {
            var b = document.createElement('button');
            b.className = 'orb-btn';
            if (s === 's') b.classList.add('active');
            b.innerHTML = n + '<b>' + s + '</b>';
            b.onclick = function() {
                document.querySelectorAll('.orb-btn').forEach(function(x) { x.classList.remove('active'); });
                b.classList.add('active');
                generate(n + s);
            };
            btnContainer.appendChild(b);
        });
    }

    function setupUI() {
        var nSel = document.getElementById('n-select');
        nSel.onchange = function() { updateButtons(nSel.value); generate(nSel.value + 's'); };

        var rx = document.getElementById('rot-x');
        var ry = document.getElementById('rot-y');
        var upRot = function() { if(points) points.rotation.set(rx.value, ry.value, 0); };
        rx.oninput = upRot; ry.oninput = upRot;

        window.onresize = function() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
