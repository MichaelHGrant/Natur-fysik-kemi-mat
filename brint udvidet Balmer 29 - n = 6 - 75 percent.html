<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom - Fuld Kvantemodel (n, l, m)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; background: #000; touch-action: none; }
        #ui-panel { height: 55%; background: #0f172a; border-top: 2px solid #1e293b; padding: 15px; overflow-y: auto; z-index: 100; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #ui-panel { width: 420px; height: 100%; border-top: none; border-left: 2px solid #1e293b; }
        }

        select { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; width: 100%; font-size: 16px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .tab-btn { background: #1e293b; border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; color: #94a3b8; font-size: 12px; cursor: pointer; flex: 1; min-width: 45px; text-align: center; }
        .tab-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; font-weight: bold; }
        
        input[type=range] { width: 100%; height: 30px; touch-action: none; }
        .spec-line { position: absolute; width: 4px; height: 100%; cursor: pointer; border-radius: 2px; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10 bg-black/50 p-3 rounded-xl border border-white/10 pointer-events-none">
            <h1 class="text-lg font-bold text-white">Hydrogen Kvantetal</h1>
            <p id="label-info" class="text-blue-400 font-mono text-xs italic">Indlæser...</p>
        </div>
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/60 z-50">
            <div class="text-blue-400 font-bold animate-pulse text-sm">Beregner positioner...</div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Hovedkvantetal (n)</label>
                    <select id="n-val">
                        <option value="1">n = 1 (K)</option><option value="2">n = 2 (L)</option>
                        <option value="3">n = 3 (M)</option><option value="4">n = 4 (N)</option>
                        <option value="5">n = 5 (O)</option><option value="6">n = 6 (P)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Energi (E<sub>n</sub>)</label>
                    <div class="bg-slate-900 p-2.5 rounded-lg border border-slate-800 text-blue-400 font-mono text-sm mt-1" id="energy-val">-13.60 eV</div>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Baneimpulsmoment (l)</label>
                <div id="l-btns" class="btn-group"></div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Magnetisk kvantetal (m<sub>l</sub>)</label>
                <div id="m-btns" class="btn-group"></div>
            </div>

            <div>
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Spektrum (Klik for at skifte n)</h3>
                <div id="spec-box" class="h-10 bg-black rounded-lg relative border border-slate-800 cursor-pointer overflow-hidden"></div>
            </div>

            <div class="pt-2 border-t border-slate-800">
                <div class="grid grid-cols-2 gap-4">
                    <input id="rot-x" type="range" min="0" max="6.28" step="0.1" value="0">
                    <input id="rot-y" type="range" min="0" max="6.28" step="0.1" value="0">
                </div>
            </div>

            <div class="flex justify-between text-[9px] text-slate-500 italic uppercase tracking-tighter">
                <span>Blå: Fase (+)</span>
                <span>Rød: Fase (-)</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene, camera, renderer, controls, points;
    const container = document.getElementById('canvas-container');
    const loader = document.getElementById('loader');
    const lNames = ['s', 'p', 'd', 'f', 'g', 'h'];
    
    // Globale tilstande
    let currentN = 1, currentL = 0, currentM = 0;

    // MATEMATIK: Præcise bølgefunktioner med m-afhængighed
    const orbitalFuncs = {
        's': (r, th, ph, n) => {
            let lag = 1;
            if(n==2) lag = (1 - 0.5*r);
            if(n==3) lag = (1 - 0.66*r + 0.07*r*r);
            if(n>=4) lag = (1 - 0.15*r);
            return lag * Math.exp(-r/n);
        },
        'p': (r, th, ph, n, m) => {
            let radial = r * Math.exp(-r/n);
            if(n==3) radial *= (1 - r/6);
            let angular = 0;
            if(m == 0) angular = Math.cos(th); // pz
            if(m == 1) angular = Math.sin(th) * Math.cos(ph); // px
            if(m == -1) angular = Math.sin(th) * Math.sin(ph); // py
            return radial * angular;
        },
        'd': (r, th, ph, n, m) => {
            let radial = r*r * Math.exp(-r/n);
            let angular = 0;
            if(m == 0) angular = 3*Math.cos(th)**2 - 1; // dz2
            if(m == 1) angular = Math.sin(th)*Math.cos(th)*Math.cos(ph); // dxz
            if(m == -1) angular = Math.sin(th)*Math.cos(th)*Math.sin(ph); // dyz
            if(m == 2) angular = Math.sin(th)**2 * Math.cos(2*ph); // dx2-y2
            if(m == -2) angular = Math.sin(th)**2 * Math.sin(2*ph); // dxy
            return radial * angular;
        },
        'f': (r, th, ph, n, m) => {
            let radial = Math.pow(r, 3) * Math.exp(-r/n);
            return radial * Math.sin(th)**3 * Math.cos(3*ph); // Repræsentativ f-skal
        }
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 5000);
        camera.position.z = 60;

        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false;

        setupUI();
        drawSpectrum();
        updateFullModel();
        animate();
    }

    function generatePoints() {
        loader.classList.remove('hidden');
        const n = currentN, l = currentL, m = currentM;
        const lType = lNames[l];
        
        setTimeout(() => {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const count = window.innerWidth < 768 ? 100000 : 200000;
            const pos = new Float32Array(count * 3);
            const cols = new Float32Array(count * 3);
            const func = orbitalFuncs[lType] || orbitalFuncs['s'];
            
            const maxR = n * n * 7; 
            const color = new THREE.Color();
            let found = 0, attempts = 0;
            const startTime = Date.now();

            while (found < count && attempts < 5000000) {
                if (attempts % 10000 === 0 && (Date.now() - startTime) > 150) break;

                let r = Math.random() * maxR;
                let u = Math.random(); 
                let th = Math.acos(1 - 2 * u); 
                let ph = Math.random() * Math.PI * 2;

                let val = func(r, th, ph, n, m);
                let prob = val * val * (r*r); 

                const threshold = (n === 1) ? 0.3 : (0.04 / (n*0.4));

                if (prob > Math.random() * threshold) {
                    let idx = found * 3;
                    pos[idx] = r * Math.sin(th) * Math.cos(ph);
                    pos[idx+1] = r * Math.sin(th) * Math.sin(ph);
                    pos[idx+2] = r * Math.cos(th);

                    if (val > 0) color.setRGB(0.2, 0.6, 1.0); else color.setRGB(1.0, 0.3, 0.3);
                    cols[idx] = color.r; cols[idx+1] = color.g; cols[idx+2] = color.b;
                    found++;
                }
                attempts++;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos.slice(0, found * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols.slice(0, found * 3), 3));
            
            points = new THREE.Points(geo, new THREE.PointsMaterial({ 
                size: n * 0.16, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending 
            }));
            scene.add(points);
            camera.position.z = maxR * 1.3;
            loader.classList.add('hidden');
            document.getElementById('label-info').innerText = n + lType + " (m=" + m + ") | " + found.toLocaleString() + " punkter";
        }, 30);
    }

    function updateLButtons() {
        const container = document.getElementById('l-btns');
        container.innerHTML = '';
        for(let i=0; i<currentN; i++) {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (i === currentL ? ' active' : '');
            btn.innerHTML = lNames[i];
            btn.onclick = () => { currentL = i; currentM = 0; updateLButtons(); updateMButtons(); generatePoints(); };
            container.appendChild(btn);
        }
    }

    function updateMButtons() {
        const container = document.getElementById('m-btns');
        container.innerHTML = '';
        const l = currentL;
        for(let i = -l; i <= l; i++) {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (i === currentM ? ' active' : '');
            btn.innerHTML = i;
            btn.onclick = () => { currentM = i; updateMButtons(); generatePoints(); };
            container.appendChild(btn);
        }
    }

    function updateFullModel() {
        currentN = parseInt(document.getElementById('n-val').value);
        if (currentL >= currentN) currentL = 0;
        document.getElementById('energy-val').innerText = (-13.6 / (currentN*currentN)).toFixed(2) + " eV";
        updateLButtons();
        updateMButtons();
        generatePoints();
    }

    function setupUI() {
        document.getElementById('n-val').onchange = updateFullModel;
        const rx = document.getElementById('rot-x'), ry = document.getElementById('rot-y');
        rx.oninput = () => { if(points) points.rotation.x = rx.value; };
        ry.oninput = () => { if(points) points.rotation.y = ry.value; };
        window.onresize = () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    }

    function drawSpectrum() {
        const box = document.getElementById('spec-box');
        const lines = [{n:3, c:'#ff0000'}, {n:4, c:'#00ffff'}, {n:5, c:'#4b0082'}, {n:6, c:'#8b00ff'}];
        lines.forEach(l => {
            const d = document.createElement('div');
            d.className = 'spec-line'; d.style.backgroundColor = l.c; d.style.left = (l.n-2.5)*18 + '%';
            d.onclick = () => { document.getElementById('n-val').value = l.n; updateFullModel(); };
            box.appendChild(d);
        });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
