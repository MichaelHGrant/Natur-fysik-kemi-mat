<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom - Komplet Model (n, l, m)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; background: #000; }
        #ui-panel { height: 55%; background: #0f172a; border-top: 2px solid #1e293b; padding: 15px; overflow-y: auto; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #ui-panel { width: 450px; height: 100%; border-top: none; border-left: 2px solid #1e293b; }
        }

        select, button { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; outline: none; transition: 0.2s; }
        .active { background: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        
        input[type=range] { width: 100%; height: 30px; touch-action: none; }
        
        /* Spektrum */
        .spec-container { background: #000; height: 40px; position: relative; border: 1px solid #334155; margin-bottom: 20px; border-radius: 4px; }
        .spec-line { position: absolute; width: 2px; height: 100%; cursor: pointer; transition: 0.2s; }
        .spec-line:hover { width: 6px; z-index: 50; transform: scaleY(1.2); }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/70 z-50 text-blue-400 font-bold">Beregner positioner...</div>
    </div>

    <div id="ui-panel">
        <div class="space-y-6">
            <div class="flex justify-between items-end border-b border-slate-800 pb-2">
                <div>
                    <h2 class="text-xs font-bold text-slate-500 uppercase">Energiniveau</h2>
                    <p id="energy-val" class="text-xl font-mono text-blue-400">-13.60 eV</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500">RADIUS ~ <span id="radius-val">0.53</span> Å</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase">n (Skal)</label>
                    <select id="n-select" class="w-full text-sm">
                        <option value="1">1</option><option value="2">2</option>
                        <option value="3">3</option><option value="4">4</option>
                        <option value="5">5</option><option value="6">6</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase">l (Form)</label>
                    <select id="l-select" class="w-full text-sm"></select>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase">m (Orientering)</label>
                    <select id="m-select" class="w-full text-sm"></select>
                </div>
            </div>

            <div class="pt-4">
                <h3 class="text-[9px] font-bold text-slate-500 uppercase mb-2">Balmer Serien (Synlig n &rarr; 2)</h3>
                <div id="balmer-spec" class="spec-container"></div>
                
                <h3 class="text-[9px] font-bold text-slate-500 uppercase mb-2">Lyman (UV n &rarr; 1) & Paschen (IR n &rarr; 3)</h3>
                <div id="other-spec" class="spec-container"></div>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-xl">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Manuel Rotation</label>
                <div class="flex gap-4 mt-2">
                    <input id="rot-x" type="range" min="0" max="6.28" step="0.01" value="0">
                    <input id="rot-y" type="range" min="0" max="6.28" step="0.01" value="0">
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene, camera, renderer, controls, points;
    const container = document.getElementById('canvas-container');
    const loader = document.getElementById('loader');

    // Fysiske konstanter
    const Rh = 13.6057; 
    const lNames = ['s', 'p', 'd', 'f', 'g', 'h'];

    // Avanceret bølgefunktion med m-orientering
    const orbitalFuncs = {
        's': (r, x, y, z) => Math.exp(-r),
        'p': {
            '0': (r, x, y, z) => z * Math.exp(-r/2),      // pz
            '1': (r, x, y, z) => x * Math.exp(-r/2),      // px
            '-1': (r, x, y, z) => y * Math.exp(-r/2)      // py
        },
        'd': {
            '0': (r, x, y, z) => (2*z*z - x*x - y*y) * Math.exp(-r/3),
            '1': (r, x, y, z) => (x * z) * Math.exp(-r/3),
            '-1': (r, x, y, z) => (y * z) * Math.exp(-r/3),
            '2': (r, x, y, z) => (x*x - y*y) * Math.exp(-r/3),
            '-2': (r, x, y, z) => (x * y) * Math.exp(-r/3)
        },
        'f': (r, x, y, z) => (x * y * z) * Math.exp(-r/4),
        'g': (r, x, y, z) => Math.pow(z * (5*z*z - 3*r*r), 2) * Math.exp(-r/5),
        'h': (r, x, y, z) => Math.pow(x*y*z * (x*x - y*y), 2) * Math.exp(-r/6)
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 5000);
        camera.position.set(0, 0, 40);

        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false; // FIX: Forhindrer at atomet flyttes fra centrum
        controls.target.set(0, 0, 0); // FIX: Låser fokus på (0,0,0)

        setupUI();
        drawSpectrums();
        updateModel();
        animate();
    }

    function generatePoints(n, l, m) {
        loader.classList.remove('hidden');
        setTimeout(() => {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const box = n * n * 6; // Dynamisk boksstørrelse baseret på n
            const count = 150000;
            const pos = new Float32Array(count * 3);
            const cols = new Float32Array(count * 3);
            
            const lType = lNames[l];
            const func = (typeof orbitalFuncs[lType] === 'function') ? orbitalFuncs[lType] : (orbitalFuncs[lType][m] || orbitalFuncs[lType]['0']);

            let found = 0, attempts = 0;
            const maxP = Math.pow(n, 4) * 0.1;

            while (found < count && attempts < 4000000) {
                let x = (Math.random()-0.5)*box, y = (Math.random()-0.5)*box, z = (Math.random()-0.5)*box;
                let r = Math.sqrt(x*x + y*y + z*z);
                let val = func(r, x, y, z);
                if (val*val > Math.random() * maxP) {
                    let idx = found * 3;
                    pos[idx] = x; pos[idx+1] = y; pos[idx+2] = z;
                    if (val > 0) { cols[idx]=0.2; cols[idx+1]=0.6; cols[idx+2]=1; }
                    else { cols[idx]=1; cols[idx+1]=0.3; cols[idx+2]=0.3; }
                    found++;
                }
                attempts++;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos.slice(0, found * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols.slice(0, found * 3), 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({ size: n*0.1, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending }));
            scene.add(points);
            loader.classList.add('hidden');
        }, 50);
    }

    function updateModel() {
        const n = parseInt(document.getElementById('n-select').value);
        const l = parseInt(document.getElementById('l-select').value) || 0;
        const m = document.getElementById('m-select').value || '0';
        
        // Opdater info
        document.getElementById('energy-val').innerText = (-Rh / (n * n)).toFixed(2) + " eV";
        document.getElementById('radius-val').innerText = (0.529 * n * n).toFixed(2);
        
        generatePoints(n, l, m);
    }

    function setupUI() {
        const nSel = document.getElementById('n-select');
        const lSel = document.getElementById('l-select');
        const mSel = document.getElementById('m-select');

        const updateL = () => {
            const n = parseInt(nSel.value);
            lSel.innerHTML = '';
            for(let i=0; i<n; i++) {
                lSel.innerHTML += `<option value="${i}">${lNames[i]}</option>`;
            }
            updateM();
        };

        const updateM = () => {
            const l = parseInt(lSel.value);
            mSel.innerHTML = '';
            for(let i=-l; i<=l; i++) {
                mSel.innerHTML += `<option value="${i}">${i}</option>`;
            }
            updateModel();
        };

        nSel.onchange = updateL;
        lSel.onchange = updateM;
        mSel.onchange = updateModel;

        updateL(); // Initial kørsel

        // Rotation sliders
        const rx = document.getElementById('rot-x'), ry = document.getElementById('rot-y');
        const upRot = () => { if(points) points.rotation.set(rx.value, ry.value, 0); controls.autoRotate = false; };
        rx.oninput = upRot; ry.oninput = upRot;
    }

    function drawSpectrums() {
        const balmer = document.getElementById('balmer-spec');
        const other = document.getElementById('other-spec');
        const lines = [
            { n: 3, c: '#ff0000', nm: 656, serie: 'balmer' },
            { n: 4, c: '#00ffff', nm: 486, serie: 'balmer' },
            { n: 5, c: '#4b0082', nm: 434, serie: 'balmer' },
            { n: 6, c: '#8b00ff', nm: 410, serie: 'balmer' },
            { n: 2, c: '#475569', nm: 121, serie: 'lyman' },
            { n: 3, c: '#475569', nm: 102, serie: 'lyman' },
            { n: 4, c: '#b91c1c', nm: 1875, serie: 'paschen' }
        ];

        lines.forEach(l => {
            const el = document.createElement('div');
            el.className = 'spec-line';
            el.style.backgroundColor = l.c;
            el.style.left = (l.serie === 'balmer' ? (l.n-2)*15 : (l.n)*10) + '%';
            el.onclick = () => { document.getElementById('n-select').value = l.n; document.getElementById('n-select').dispatchEvent(new Event('change')); };
            (l.serie === 'balmer' ? balmer : other).appendChild(el);
        });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
