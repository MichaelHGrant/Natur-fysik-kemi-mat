<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom - Auto-Exposure Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; background: #000; }
        #ui-panel { height: 45%; background: #0f172a; border-top: 2px solid #1e293b; padding: 20px; overflow-y: auto; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #ui-panel { width: 420px; height: 100%; border-top: none; border-left: 2px solid #1e293b; }
        }

        select, button { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px; outline: none; }
        input[type=range] { width: 100%; height: 35px; touch-action: none; cursor: pointer; }
        .spec-line { position: absolute; width: 4px; height: 100%; cursor: pointer; border-radius: 2px; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10 pointer-events-none">
            <h1 class="text-xl font-bold">Orbital Visning</h1>
            <p id="info-text" class="text-blue-400 font-mono text-xs">Indlæser...</p>
        </div>
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/80 z-50">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">Optimerer eksponering...</p>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4 bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                <div><span class="text-[9px] text-slate-500 uppercase font-bold">Energiniveau</span><p id="energy-val" class="font-mono text-blue-400">-13.6 eV</p></div>
                <div class="text-right"><span class="text-[9px] text-slate-500 uppercase font-bold">Skal</span><p id="shell-val" class="font-mono text-white">K-skal</p></div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">n</label><select id="n-select"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select></div>
                <div><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">l</label><select id="l-select"></select></div>
                <div><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">m</label><select id="m-select"></select></div>
            </div>

            <div class="space-y-2">
                <h3 class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Interaktivt Spektrum</h3>
                <div id="balmer-spec" class="h-8 bg-black rounded relative border border-slate-800"></div>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <label class="text-[9px] font-bold text-slate-500 uppercase mb-2 block">Rotation</label>
                <div class="flex gap-4">
                    <input id="rot-x" type="range" min="0" max="6.28" step="0.01" value="0">
                    <input id="rot-y" type="range" min="0" max="6.28" step="0.01" value="0">
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene, camera, renderer, controls, points;
    const container = document.getElementById('canvas-container');
    const loader = document.getElementById('loader');
    const lNames = ['s', 'p', 'd', 'f', 'g', 'h'];
    const shells = ['-', 'K', 'L', 'M', 'N', 'O', 'P'];

    // Matematiske bølgefunktioner inkl. noder
    const waveFuncs = {
        's': (r, x, y, z, n) => {
            // Tilføjer noder for n > 1 (simplificeret Laguerre polynomium effekt)
            let node = 1;
            if (n === 2) node = (1 - r/2);
            if (n === 3) node = (1 - 2*r/3 + 2*r*r/27);
            return node * Math.exp(-r / n);
        },
        'p': (r, x, y, z, n, m) => {
            let node = (n === 3) ? (1 - r/6) : 1;
            let ang = (m === 0) ? z : (m === 1 ? x : y);
            return ang * node * Math.exp(-r / n);
        },
        'd': (r, x, y, z, n, m) => {
            let ang = (m === 0) ? (2*z*z - x*x - y*y) : (m === 1 ? x*z : (m === 2 ? x*x-y*y : x*y));
            return ang * Math.exp(-r / n);
        }
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 5000);
        camera.position.z = 50;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false;

        setupUI();
        drawSpectrum();
        updateModel();
        animate();
    }

    function generatePoints(n, l, m) {
        loader.classList.remove('hidden');
        setTimeout(() => {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const lType = lNames[l];
            const isS = lType === 's';
            
            // AUTO-SCALING LOGIK
            const box = n * n * (isS ? 8 : 12); 
            const count = 200000; // Flere punkter for tæthed
            const pos = new Float32Array(count * 3);
            const cols = new Float32Array(count * 3);
            
            // AUTO-EXPOSURE: Justerer maxP så svage orbitaler bliver synlige
            const maxP = isS ? (0.2 / n) : (0.1 * Math.pow(n, -2)); 

            let found = 0, attempts = 0;
            const func = waveFuncs[lType] || waveFuncs['s'];

            while (found < count && attempts < 6000000) {
                let x = (Math.random()-0.5)*box, y = (Math.random()-0.5)*box, z = (Math.random()-0.5)*box;
                let r = Math.sqrt(x*x + y*y + z*z);
                if (r > box/2) { attempts++; continue; }

                let val = func(r, x, y, z, n, m);
                if (val*val > Math.random() * maxP) {
                    let idx = found * 3;
                    pos[idx] = x; pos[idx+1] = y; pos[idx+2] = z;
                    if (val > 0) { cols[idx]=0.3; cols[idx+1]=0.6; cols[idx+2]=1; }
                    else { cols[idx]=1; cols[idx+1]=0.3; cols[idx+2]=0.3; }
                    found++;
                }
                attempts++;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos.slice(0, found * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols.slice(0, found * 3), 3));
            
            // DYNAMISK PUNKTSTØRRELSE: Vokser med n for at bevare synlighed
            points = new THREE.Points(geo, new THREE.PointsMaterial({ 
                size: n * 0.22, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending 
            }));
            scene.add(points);
            camera.position.z = box * 1.4;
            loader.classList.add('hidden');
        }, 30);
    }

    function updateModel() {
        const n = parseInt(document.getElementById('n-select').value);
        const l = parseInt(document.getElementById('l-select').value) || 0;
        const m = parseInt(document.getElementById('m-select').value) || 0;
        
        document.getElementById('energy-val').innerText = (-13.6 / (n*n)).toFixed(2) + " eV";
        document.getElementById('shell-val').innerText = shells[n] + "-skal";
        document.getElementById('info-text').innerText = n + lNames[l] + " orbital (m=" + m + ")";
        
        generatePoints(n, l, m);
    }

    function setupUI() {
        const nSel = document.getElementById('n-select'), lSel = document.getElementById('l-select'), mSel = document.getElementById('m-select');
        const updateL = () => {
            const n = nSel.value; lSel.innerHTML = '';
            for(let i=0; i<n; i++) lSel.innerHTML += `<option value="${i}">${lNames[i]}</option>`;
            updateM();
        };
        const updateM = () => {
            const l = lSel.value; mSel.innerHTML = '';
            for(let i=-l; i<=l; i++) mSel.innerHTML += `<option value="${i}">${i}</option>`;
            updateModel();
        };
        nSel.onchange = updateL; lSel.onchange = updateM; mSel.onchange = updateModel;
        updateL();

        const rx = document.getElementById('rot-x'), ry = document.getElementById('rot-y');
        const upRot = () => { if(points) points.rotation.set(rx.value, ry.value, 0); };
        rx.oninput = upRot; ry.oninput = upRot;
    }

    function drawSpectrum() {
        const balmer = document.getElementById('balmer-spec');
        const lines = [{n:3, c:'#ff4444'}, {n:4, c:'#44ffff'}, {n:5, c:'#4b0082'}, {n:6, c:'#8b00ff'}];
        lines.forEach(l => {
            const el = document.createElement('div');
            el.className = 'spec-line';
            el.style.backgroundColor = l.c;
            el.style.left = (l.n-2)*18 + '%';
            el.onclick = () => { document.getElementById('n-select').value = l.n; document.getElementById('n-select').dispatchEvent(new Event('change')); };
            balmer.appendChild(el);
        });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
