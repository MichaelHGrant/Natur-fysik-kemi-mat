<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom - Præcise Orbitalformer (n=1-6)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; background: #000; }
        #ui-panel { height: 45%; background: #0f172a; border-top: 2px solid #1e293b; padding: 20px; overflow-y: auto; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #ui-panel { width: 400px; height: 100%; border-top: none; border-left: 2px solid #1e293b; }
        }

        .orb-btn { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: #94a3b8; font-size: 13px; transition: 0.2s; text-align: center; }
        .orb-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        input[type=range] { width: 100%; height: 35px; touch-action: none; cursor: pointer; }
        select { background: #1e293b; color: white; padding: 12px; border-radius: 8px; width: 100%; border: 1px solid #334155; font-size: 16px; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10 pointer-events-none">
            <h1 class="text-xl font-bold text-white">Orbitalformer</h1>
            <div id="status" class="text-xs text-blue-400">Klar</div>
        </div>
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/70 z-20">
            <div class="bg-blue-600 px-6 py-3 rounded-full text-sm font-bold animate-pulse">Genererer 150.000 positioner...</div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Hovedkvantetal (n)</label>
                <select id="n-select" class="mt-1">
                    <option value="1">n = 1</option>
                    <option value="2">n = 2</option>
                    <option value="3">n = 3</option>
                    <option value="4">n = 4</option>
                    <option value="5">n = 5</option>
                    <option value="6">n = 6</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Vælg Underskal (l)</label>
                <div id="l-btns" class="grid grid-cols-4 gap-2 mt-2"></div>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Rotation (X & Y)</label>
                <input id="rot-x" type="range" min="0" max="6.28" step="0.01" value="0">
                <input id="rot-y" type="range" min="0" max="6.28" step="0.01" value="0">
            </div>

            <div class="text-[10px] text-slate-500 p-3 bg-slate-900/50 rounded-lg">
                <b>Tip:</b> p-orbitalen er manual-formet (2 lober). d-orbitalen har 4 lober. f og g har endnu flere komplekse lober.
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene, camera, renderer, controls, points;
    var container = document.getElementById('canvas-container');
    var loader = document.getElementById('loader');
    var status = document.getElementById('status');

    // SKÆRPET MATEMATIK FOR TYDELIGE LOBER
    // Her bruger vi vinkelafhængigheder (x, y, z relationer) for at skabe de præcise former
    var waveFuncs = {
        's': function(r, x, y, z, n) { return Math.exp(-r / n); },
        'p': function(r, x, y, z, n) { 
            return (z*z) * Math.exp(-r / n); // Tydelig manual-form langs Z-aksen
        },
        'd': function(r, x, y, z, n) { 
            return (x*z * x*z) * Math.exp(-r / n); // 4 lober
        },
        'f': function(r, x, y, z, n) { 
            return (x*y*z * x*y*z) * Math.exp(-r / n); // 8 lober
        },
        'g': function(r, x, y, z, n) { 
            // G-orbital (l=4) - kræver kompleks vinkelstruktur
            return Math.pow(z * (5*z*z - 3*r*r), 2) * Math.exp(-r / n);
        },
        'h': function(r, x, y, z, n) {
            return Math.pow(x*y*z * (x*x - y*y), 2) * Math.exp(-r / n);
        }
    };

    var nConfig = {
        '1': { box: 12, maxP: 1.0, sub: ['s'] },
        '2': { box: 28, maxP: 2.0, sub: ['s', 'p'] },
        '3': { box: 55, maxP: 4.0, sub: ['s', 'p', 'd'] },
        '4': { box: 90, maxP: 15.0, sub: ['s', 'p', 'd', 'f'] },
        '5': { box: 140, maxP: 40.0, sub: ['s', 'p', 'd', 'f', 'g'] },
        '6': { box: 200, maxP: 100.0, sub: ['s', 'p', 'd', 'f', 'g', 'h'] }
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 5000);
        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        container.appendChild(renderer.domElement);
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        setupUI();
        updateButtons('1');
        generate('1s');
        animate();
    }

    function generate(fullName) {
        loader.classList.remove('hidden');
        var n = parseInt(fullName[0]);
        var type = fullName.slice(1);
        
        setTimeout(function() {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            var conf = nConfig[n];
            var func = waveFuncs[type] || waveFuncs['s'];
            var targetCount = 150000; 
            var positions = new Float32Array(targetCount * 3);
            var colors = new Float32Array(targetCount * 3);
            var color = new THREE.Color();
            var found = 0, attempts = 0, box = conf.box;

            while (found < targetCount && attempts < 5000000) {
                var x = (Math.random()-0.5)*box;
                var y = (Math.random()-0.5)*box;
                var z = (Math.random()-0.5)*box;
                var r = Math.sqrt(x*x + y*y + z*z);
                
                // Vi kvadrerer sandsynligheden for at gøre loberne skarpere
                var prob = func(r, x, y, z, n);
                if (prob > Math.random() * conf.maxP) {
                    var idx = found * 3;
                    positions[idx] = x;
                    positions[idx+1] = y;
                    positions[idx+2] = z;
                    color.setHSL(0.6, 0.8, 0.4 + (r/box)*0.2);
                    colors[idx] = color.r; colors[idx+1] = color.g; colors[idx+2] = color.b;
                    found++;
                }
                attempts++;
            }

            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions.slice(0, found * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors.slice(0, found * 3), 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({
                size: n > 3 ? 0.4 : 0.2, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false
            }));
            scene.add(points);
            camera.position.z = box * 1.5;
            loader.classList.add('hidden');
            status.innerText = "Viser " + n + type + " (" + found.toLocaleString() + " punkter)";
        }, 50);
    }

    function updateButtons(n) {
        var btnContainer = document.getElementById('l-btns');
        btnContainer.innerHTML = '';
        nConfig[n].sub.forEach(function(s) {
            var b = document.createElement('button');
            b.className = 'orb-btn';
            if (s === 's') b.classList.add('active');
            b.innerHTML = n + '<b>' + s + '</b>';
            b.onclick = function() {
                document.querySelectorAll('.orb-btn').forEach(function(x) { x.classList.remove('active'); });
                b.classList.add('active');
                generate(n + s);
            };
            btnContainer.appendChild(b);
        });
    }

    function setupUI() {
        document.getElementById('n-select').onchange = function() { 
            updateButtons(this.value); generate(this.value + 's'); 
        };
        var rx = document.getElementById('rot-x'), ry = document.getElementById('rot-y');
        var upRot = function() { if(points) points.rotation.set(rx.value, ry.value, 0); };
        rx.oninput = upRot; ry.oninput = upRot;
        window.onresize = function() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
