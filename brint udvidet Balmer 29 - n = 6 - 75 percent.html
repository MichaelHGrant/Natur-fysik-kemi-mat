<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brintatom - Master Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; background: #000; }
        #ui-panel { height: 50%; background: #0f172a; border-top: 1px solid #1e293b; padding: 15px; overflow-y: auto; z-index: 100; }
        
        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #ui-panel { width: 450px; height: 100%; border-top: none; border-left: 1px solid #1e293b; }
        }

        select, button { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; outline: none; width: 100%; font-size: 14px; }
        .active { background: #3b82f6; border-color: #60a5fa; }
        input[type=range] { width: 100%; height: 30px; touch-action: none; cursor: pointer; }
        
        .spec-line { position: absolute; width: 4px; height: 100%; cursor: pointer; border-radius: 2px; transition: 0.2s; }
        .spec-line:hover { transform: scaleX(2.5); z-index: 50; }
        .spec-label { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #94a3b8; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div class="absolute top-4 left-4 z-10 pointer-events-none bg-black/40 p-2 rounded-lg backdrop-blur-sm">
            <h1 class="text-lg font-bold text-white">Brintatom Orbitaler</h1>
            <p id="label-n" class="text-blue-400 font-mono text-xs">Vælg en orbital...</p>
        </div>
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/80 z-50">
            <div class="text-center">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
                <p class="text-blue-400 text-[10px] font-bold uppercase">Beregner 200.000 positioner...</p>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="space-y-5">
            <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 flex justify-between items-center">
                <div>
                    <span class="text-[9px] text-slate-500 uppercase font-bold">Energi</span>
                    <p id="energy-display" class="font-mono text-blue-400">-13.60 eV</p>
                </div>
                <div class="text-right">
                    <span class="text-[9px] text-slate-500 uppercase font-bold">Radius</span>
                    <p id="radius-display" class="font-mono text-white">0.53 Å</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">n (Skal)</label>
                    <select id="n-val"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select>
                </div>
                <div><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">l (Form)</label><select id="l-val"></select></div>
                <div><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">m (Ori.)</label><select id="m-val"></select></div>
            </div>

            <div class="space-y-4">
                <div>
                    <h3 class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Balmer Serien (Synlig n &rarr; 2)</h3>
                    <div id="spec-balmer" class="h-8 bg-black rounded relative border border-slate-800"></div>
                </div>
                <div>
                    <h3 class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Lyman (UV) & Paschen (IR)</h3>
                    <div id="spec-other" class="h-8 bg-black rounded relative border border-slate-800"></div>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <label class="text-[9px] font-bold text-slate-500 uppercase mb-2 block text-center">Manuel Rotation</label>
                <div class="grid grid-cols-2 gap-4">
                    <input id="rot-x" type="range" min="0" max="6.28" step="0.01" value="0">
                    <input id="rot-y" type="range" min="0" max="6.28" step="0.01" value="0">
                </div>
            </div>

            <div class="text-[9px] text-slate-500 flex justify-between opacity-50 italic">
                <span>Blå = Positiv fase (+)</span>
                <span>Rød = Negativ fase (-)</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene, camera, renderer, controls, points;
    const container = document.getElementById('canvas-container');
    const loader = document.getElementById('loader');
    const lNames = ['s', 'p', 'd', 'f', 'g', 'h'];

    // MATEMATIK: Sfæriske harmoniske funktioner og radiale bølgefunktioner
    const orbitals = {
        's': (r, th, ph, n) => {
            let lag = 1;
            if(n==2) lag = (1 - r/2);
            if(n==3) lag = (1 - 2*r/3 + 2*r*r/27);
            if(n>=4) lag = (1 - r/n);
            return lag * Math.exp(-r/n);
        },
        'p': (r, th, ph, n, m) => {
            let radial = r * Math.exp(-r/n);
            if(n==3) radial *= (1 - r/6);
            let angular = (m==0) ? Math.cos(th) : Math.sin(th) * (m==1 ? Math.cos(ph) : Math.sin(ph));
            return radial * angular;
        },
        'd': (r, th, ph, n, m) => {
            let radial = r*r * Math.exp(-r/n);
            let angular = 1;
            if(m==0) angular = 3*Math.cos(th)*Math.cos(th) - 1;
            else if(Math.abs(m)==1) angular = Math.sin(th)*Math.cos(th) * (m==1 ? Math.cos(ph) : Math.sin(ph));
            else angular = Math.sin(th)*Math.sin(th) * (m==2 ? Math.cos(2*ph) : Math.sin(2*ph));
            return radial * angular;
        },
        'f': (r, th, ph, n, m) => {
            let radial = r*r*r * Math.exp(-r/n);
            return radial * Math.sin(th)*Math.sin(th)*Math.sin(th) * Math.cos(3*ph);
        }
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 5000);
        camera.position.z = 50;

        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false;
        controls.target.set(0,0,0);

        setupUI();
        updateModel();
        drawSpectrum();
        animate();
    }

    function generatePoints(n, l, m) {
        loader.classList.remove('hidden');
        setTimeout(() => {
            if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }
            
            const count = 200000;
            const pos = new Float32Array(count * 3);
            const cols = new Float32Array(count * 3);
            const lType = lNames[l] || 's';
            const func = orbitals[lType] || orbitals['s'];
            
            // NORMALISERING: Vi finder boksens størrelse ud fra n
            const maxR = n * n * 6; 
            let found = 0;
            const color = new THREE.Color();

            // Vi tvinger loopet til at finde det præcise antal punkter
            while (found < count) {
                // SFÆRISK SAMPLING (Fjerner kube-looket)
                let r = Math.random() * maxR;
                let th = Math.random() * Math.PI;
                let ph = Math.random() * Math.PI * 2;

                let val = func(r, th, ph, n, m);
                let prob = val * val * (r*r); // r^2 er volume elementet

                // Dynamisk sandsynligheds-tjek
                if (prob > Math.random() * (n * 0.5)) {
                    let idx = found * 3;
                    pos[idx] = r * Math.sin(th) * Math.cos(ph);
                    pos[idx+1] = r * Math.sin(th) * Math.sin(ph);
                    pos[idx+2] = r * Math.cos(th);

                    // FASE-FARVNING
                    if (val > 0) { color.setRGB(0.2, 0.6, 1.0); } // Blå (+)
                    else { color.setRGB(1.0, 0.3, 0.3); } // Rød (-)
                    
                    cols[idx] = color.r; cols[idx+1] = color.g; cols[idx+2] = color.b;
                    found++;
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            
            points = new THREE.Points(geo, new THREE.PointsMaterial({ 
                size: n * 0.15, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false 
            }));
            scene.add(points);
            camera.position.z = maxR * 1.2;
            loader.classList.add('hidden');
        }, 30);
    }

    function setupUI() {
        const nS = document.getElementById('n-val'), lS = document.getElementById('l-val'), mS = document.getElementById('m-val');
        
        nS.onchange = () => {
            const n = parseInt(nS.value);
            lS.innerHTML = '';
            for(let i=0; i<n; i++) lS.innerHTML += `<option value="${i}">${lNames[i]}</option>`;
            updateM();
        };
        const updateM = () => {
            const l = parseInt(lS.value);
            mS.innerHTML = '';
            for(let i=-l; i<=l; i++) mS.innerHTML += `<option value="${i}">${i}</option>`;
            updateModel();
        };
        lS.onchange = updateM;
        mS.onchange = updateModel;
        nS.dispatchEvent(new Event('change'));

        const rx = document.getElementById('rot-x'), ry = document.getElementById('rot-y');
        const upRot = () => { if(points) points.rotation.set(rx.value, ry.value, 0); };
        rx.oninput = upRot; ry.oninput = upRot;

        window.onresize = () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    }

    function updateModel() {
        const n = parseInt(document.getElementById('n-val').value);
        const l = parseInt(document.getElementById('l-val').value) || 0;
        const m = parseInt(document.getElementById('m-val').value) || 0;
        
        document.getElementById('energy-display').innerText = (-13.6057 / (n*n)).toFixed(2) + " eV";
        document.getElementById('radius-display').innerText = (0.529 * n * n).toFixed(2) + " Å";
        document.getElementById('label-n').innerText = n + lNames[l] + " orbital (m=" + m + ")";
        
        generatePoints(n, l, m);
    }

    function drawSpectrum() {
        const bal = document.getElementById('spec-balmer'), oth = document.getElementById('spec-other');
        const lines = [
            {n:3, c:'#ff4444', nm:'656', s:'b'}, {n:4, c:'#44ffff', nm:'486', s:'b'},
            {n:5, c:'#4b0082', nm:'434', s:'b'}, {n:6, c:'#8b00ff', nm:'410', s:'b'},
            {n:2, c:'#475569', nm:'121', s:'o'}, {n:4, c:'#b91c1c', nm:'1875', s:'o'}
        ];
        lines.forEach(l => {
            const d = document.createElement('div');
            d.className = 'spec-line'; d.style.backgroundColor = l.c;
            d.style.left = (l.s == 'b' ? (l.n-2)*18 : l.n*12) + '%';
            d.onclick = () => { document.getElementById('n-val').value = l.n; document.getElementById('n-val').dispatchEvent(new Event('change')); };
            const lbl = document.createElement('div'); lbl.className = 'spec-label'; lbl.innerText = l.nm; d.appendChild(lbl);
            (l.s == 'b' ? bal : oth).appendChild(d);
        });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
