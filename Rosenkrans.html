<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv Realistisk Rosenkrans</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #12121c; 
            color: #ffffff; 
            text-align: center; 
            padding: 10px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 0px; color: #e9e9eb; font-size: 24px; }
        #status { font-size: 13px; color: #8a8a93; margin-bottom: 20px; }
        
        /* Container til den grafiske rosenkrans */
        #svg-container {
            width: 100%;
            max-width: 400px;
            height: auto;
            margin: 0 auto 20px auto;
            position: relative;
        }
        
        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
        }

        /* SVG interaktions-klasser */
       .bead-node {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-box: fill-box;
            transform-origin: center;
        }
       .bead-node:hover {
            transform: scale(1.15);
        }
       .active-glow {
            stroke: #ffffff;
            stroke-width: 2.5px;
            filter: drop-shadow(0 0 12px #ffffff) drop-shadow(0 0 5px #a0c4ff);
            transform: scale(1.4);
        }

        /* Tekst og Kontrolpanel */
        #text-display { 
            min-height: 140px; 
            font-size: 18px;
            font-style: italic; 
            color: #d4e6f1; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 600px;
            width: 90%;
            margin: 0 auto;
            line-height: 1.6;
            box-sizing: border-box;
        }

        #controls { margin-top: 20px; margin-bottom: 40px; }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            background: linear-gradient(135deg, #4a90e2, #1e5cb3); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            margin: 5px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); 
        }
        button:disabled { 
            background: #444; 
            color: #888;
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>Den Hellige Rosenkrans</h1>
    <div id="status">Tilpasser sig automatisk dagens mysterier</div>
    
    <div id="svg-container">
        <svg viewBox="0 0 400 680" id="rosary-svg">
            <defs>
                <radialGradient id="blueGlass" cx="35%" cy="35%" r="65%">
                    <stop offset="0%" stop-color="#8ab4f8" />
                    <stop offset="30%" stop-color="#1e5cb3" />
                    <stop offset="100%" stop-color="#071b3b" />
                </radialGradient>
                <radialGradient id="goldMetal" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#fff6d6" />
                    <stop offset="40%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#7a5500" />
                </radialGradient>
                <radialGradient id="medalMetal" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffd700" />
                    <stop offset="80%" stop-color="#cda434" />
                    <stop offset="100%" stop-color="#8a6300" />
                </radialGradient>
            </defs>
            <g id="rosary-svg-group"></g>
        </svg>
    </div>

    <div id="text-display">Indlæser talemotor... Vent venligst.</div>

    <div id="controls">
        <button id="btn-start" disabled>Start Rosenkrans</button>
        <button id="btn-pause" disabled>Pause / Genoptag</button>
    </div>

    <script>
        // --- 1. DATAMODEL & TEKSTER ---
        const texts = {
            signumCrucis: "I Faderens og Sønnens og Helligåndens navn. Amen.",
            credo: "Jeg tror på Gud, den almægtige Fader, Himlens og jordens Skaber. Jeg tror på Jesus Kristus, Hans enbårne Søn, vor Herre, som er undfanget ved Helligånden og født af Jomfru Maria, har lidt under Pontius Pilatus, blev korsfæstet, døde og blev begravet, nedfór til Dødsriget, opstod på den tredje dag fra de døde, opfór til Himlen, sidder ved Gud, den almægtige Faders højre hånd, hvorfra han skal komme igen for at dømme de levende og de døde. Jeg tror på Helligånden, den hellige katolske Kirke, de helliges samfund, syndernes forladelse, kødets opstandelse og det evige liv. Amen.",
            paterNoster: "Fader vor, du som er i Himlen. Helliget vorde dit navn. Komme dit rige. Ske din vilje, som i Himlen så og på jorden. Giv os i dag vort daglige brød. Og forlad os vor skyld, som og vi forlader vore skyldnere. Og led os ikke i fristelse, men frels os fra det onde. Amen.",
            aveMaria: function(insert) { return "Hil dig, Maria, fuld af nåde, Herren er med dig. Velsignet er du iblandt kvinder og velsignet er dit livs frugt, Jesus, " + insert + ". Hellige Maria, Guds moder, bed for os syndere, nu og i vor dødstime. Amen."; },
            gloriaPatri: "Ære være Faderen og Sønnen og Helligånden, som det var i begyndelsen, så nu og altid og i al evighed. Amen.",
            fatima: "O min Jesus, tilgiv os vores synder, frels os fra Helvedes ild og led alle sjæle til Himlen, især dem, der har størst behov for Din barmhjertighed. Amen.",
            michael: "O Hellige Ærkeengel Mikael, herlighedens og de himmelske Hærskarers Fyrste, vogter af sjæle, sejrherre over de oprørske engle, tjener i den royale guddommeligheds bolig og du vor højt ophøjede leder som stråler glorværdigt og med overmenneskelig dyd, udfri os fra alt ondt, vi som med tillid vender os til dig og gør os i stand til igennem din nådefulde beskyttelse at kunne tjene Gud mere trofast for hver dag. Amen.",
            salveRegina: "Hil dig, Dronning, barmhjertighedens Moder, vort liv, vor fryd og vort håb, vær hilset. Til dig råber vi, Evas landflygtige børn. Til dig sukker vi sørgende og grædende i denne tårernes dal. Så vend da, du vor tilflugt, dine barmhjertigheds øjne ned til os...",
            memorare: "Kom i hu, nådefulde Jomfru Maria, at man aldrig har hørt, at den, der tager sin tilflugt til dig, påkalder din hjælp og anråber om din forbøn, er blevet forladt. Besjælet af en sådan tillid tager jeg min tilflugt til dig, Maria, jomfru over alle jomfruer og moder til Jesus Kristus! Til dig kommer jeg; for dig står jeg som en sukkende synder. Du, det evige Ords moder! Forsmå ikke mine ord, men hør mig nådigt og bønhør mig. Amen.",
            concluding: "O Gud, hvis enbårne Søn ved sit liv, sin død og sin opstandelse har erhvervet os det evige livs løn. Vi beder dig: Giv os, som mindes disse mysterier i den salige Jomfru Marias hellige rosenkrans, at vi må efterfølge det, de indeholder, og opnå det, de lover. Ved Kristus, vor Herre. Amen."
        };

        const introInserts = new Array("som forøge vor tro", "som styrke vort håb", "som opflamme vor kærlighed");

        const mysteriesList = {
            glaedesfulde: new Array("som du undfangede ved Helligånden", "som du bar ved dit besøg hos Elisabet", "som du fødte i stalden i Betlehem", "som du ofrede i templet", "som du genfandt i templet"),
            lysfyldte: new Array("som blev døbt i Jordan", "som forvandlede vand til vin i Kana", "som forkyndte Guds rige", "som blev forklaret på bjerget", "som indstiftede Eukaristien"),
            smertefulde: new Array("som svedte blod for os", "som blev hudstrøget for os", "som blev kronet med torne for os", "som bar det tunge kors for os", "som blev korsfæstet for os"),
            herlighedsfulde: new Array("som opstod fra de døde", "som opfor til Himlen", "som nedsendte Helligånden", "som optog dig i Himlen", "som kronede dig i Himlen")
        };

        function getTodaysMysteries() {
            const day = new Date().getDay(); 
            if (day === 1) return mysteriesList.glaedesfulde;
            if (day === 6) return mysteriesList.glaedesfulde;
            if (day === 4) return mysteriesList.lysfyldte;   
            if (day === 2) return mysteriesList.smertefulde; 
            if (day === 5) return mysteriesList.smertefulde; 
            return mysteriesList.herlighedsfulde;            
        }

        const currentMysteries = getTodaysMysteries();
        let playQueue = new Array();
        
        // --- 2. OPBYGNING AF FSM & KOBING TIL VISUELLE ID'ER ---
        
        // Korset
        playQueue.push({ target: 'cross', text: texts.signumCrucis });
        playQueue.push({ target: 'cross', text: texts.credo });
        
        // Halskædens vedhæng
        playQueue.push({ target: 'pendant_gold_1', text: texts.paterNoster });
        for(let i=0; i<3; i++) {
            playQueue.push({ target: 'pendant_blue_' + (i+1), text: texts.aveMaria(introInserts[i]) });
        }
        playQueue.push({ target: 'pendant_gold_2', text: texts.gloriaPatri });

        // De 5 dekader i selve kransen
        let loopIndex = 1; // Holder styr på de 54 perler i den store cirkel
        
        for(let dekade=0; dekade<5; dekade++) {
            // Første dekades Fadervor bedes ofte ved midterstykket. Resten på de store guldperler.
            let centerTarget = (dekade === 0)? 'centerpiece' : 'loop_b_' + loopIndex;
            
            playQueue.push({ target: centerTarget, text: "Vi mediterer over det " + (dekade+1) + ". mysterium." });
            playQueue.push({ target: centerTarget, text: texts.paterNoster });
            
            if (dekade > 0) loopIndex++; // Spring guldperlen over, så vi når til de blå
            
            // 10 Ave Maria
            for(let i=0; i<10; i++) {
                playQueue.push({ target: 'loop_b_' + loopIndex, text: texts.aveMaria(currentMysteries[dekade]) });
                loopIndex++;
            }
            
            // Afslutning på dekaden (Vi bliver visuelt stående på den sidste blå perle)
            let lastSmallBead = 'loop_b_' + (loopIndex - 1);
            playQueue.push({ target: lastSmallBead, text: texts.gloriaPatri });
            playQueue.push({ target: lastSmallBead, text: texts.fatima });
            playQueue.push({ target: lastSmallBead, text: texts.michael });
        }
        
        // Afsluttende bønner på midterstykket og korset
        playQueue.push({ target: 'centerpiece', text: texts.salveRegina });
        playQueue.push({ target: 'centerpiece', text: texts.memorare });
        playQueue.push({ target: 'centerpiece', text: texts.concluding });
        playQueue.push({ target: 'cross', text: texts.signumCrucis });

        // --- 3. GENERERING AF SVG GRAFIK ---
        let svgHTML = "";
        
        // Tegn Guldkæden til selve kransen (cirklen)
        svgHTML += '<path d="M 200 390 ';
        for(let i=1; i<=54; i++) {
            let angleDeg = 90 + (i * 360 / 55);
            let angleRad = angleDeg * Math.PI / 180;
            let x = 200 + 130 * Math.cos(angleRad);
            let y = 230 + 130 * Math.sin(angleRad);
            svgHTML += "L " + x + " " + y + " ";
        }
        svgHTML += 'Z" fill="none" stroke="#a68428" stroke-width="2" />';
        
        // Tegn Guldkæden til vedhænget (den lige linje ned)
        svgHTML += '<line x1="200" y1="390" x2="200" y2="590" stroke="#a68428" stroke-width="2" />';
        
        // Funktion til at placere en perle
        function drawBead(id, x, y, isLarge, isCenter) {
            let r = isCenter? 20 : (isLarge? 10 : 6);
            let fill = isCenter? "url(#medalMetal)" : (isLarge? "url(#goldMetal)" : "url(#blueGlass)");
            svgHTML += '<circle id="' + id + '" class="bead-node" cx="' + x + '" cy="' + y + '" r="' + r + '" fill="' + fill + '" stroke="#000" stroke-width="0.8" onclick="jumpToNode(\'' + id + '\')" />';
        }

        // Tegn perlerne i cirklen (Index 1 til 54)
        // Hver 11. perle (11, 22, 33, 44) er en stor guldperle
        for(let i=1; i<=54; i++) {
            let angleDeg = 90 + (i * 360 / 55);
            let angleRad = angleDeg * Math.PI / 180;
            let x = 200 + 130 * Math.cos(angleRad);
            let y = 230 + 130 * Math.sin(angleRad);
            let isLarge = (i === 11 |

| i === 22 |
| i === 33 |
| i === 44);
            drawBead('loop_b_' + i, x, y, isLarge, false);
        }

        // Tegn vedhænget (Pendant) præcis som på billedet
        drawBead('centerpiece', 200, 390, false, true); // Maria guld-medalje
        
        // Tilføj en lille indre gravering på midterstykket for realisme
        svgHTML += '<ellipse cx="200" cy="390" rx="8" ry="12" fill="none" stroke="#8a6300" stroke-width="1.5" pointer-events="none" />';
        
        drawBead('pendant_gold_2', 200, 435, true, false);
        drawBead('pendant_blue_3', 200, 465, false, false);
        drawBead('pendant_blue_2', 200, 485, false, false);
        drawBead('pendant_blue_1', 200, 505, false, false);
        drawBead('pendant_gold_1', 200, 540, true, false);
        
        // Tegn det store guldkors i bunden
        svgHTML += '<path id="cross" class="bead-node" d="M 194 575 L 206 575 L 206 595 L 225 595 L 225 607 L 206 607 L 206 660 L 194 660 L 194 607 L 175 607 L 175 595 L 194 595 Z" fill="url(#goldMetal)" stroke="#332200" stroke-width="1" onclick="jumpToNode(\'cross\')" />';

        document.getElementById('rosary-svg-group').innerHTML = svgHTML;

        // --- 4. KONTROL OG LOGIK ---
        let currentIndex = -1;
        let isPlaying = false;
        let synth = window.speechSynthesis;
        let selectedVoice = null;

        function initVoices() {
            let voices = synth.getVoices();
            if (voices.length > 0) {
                for(let i = 0; i < voices.length; i++) {
                    if(voices[i].lang === 'da-DK' |

| voices[i].lang === 'da_DK') {
                        selectedVoice = voices[i];
                        break;
                    }
                }
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-pause').disabled = false;
                document.getElementById('text-display').innerText = "Tryk på 'Start Rosenkrans' for at begynde meditationen...";
            }
        }

        if (synth.onvoiceschanged!== undefined) {
            synth.onvoiceschanged = initVoices;
        }
        initVoices(); 

        setTimeout(() => {
            if (document.getElementById('btn-start').disabled) {
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-pause').disabled = false;
                document.getElementById('text-display').innerText = "Tryk på 'Start Rosenkrans' for at begynde. (Standardstemme benyttes).";
            }
        }, 3000);

        function updateUI() {
            let allNodes = document.querySelectorAll('.bead-node');
            for(let i=0; i<allNodes.length; i++) {
                allNodes[i].classList.remove('active-glow');
            }
            if(currentIndex >= 0 && currentIndex < playQueue.length) {
                let targetId = playQueue[currentIndex].target;
                let targetEl = document.getElementById(targetId);
                if(targetEl) {
                    targetEl.classList.add('active-glow');
                }
                document.getElementById('text-display').innerText = playQueue[currentIndex].text;
            }
        }

        function playNext() {
            if(currentIndex >= playQueue.length - 1) {
                isPlaying = false;
                document.getElementById('text-display').innerText = "Rosenkransen er fuldført. Fred være med dig.";
                return;
            }
            currentIndex++;
            updateUI();
            
            if(navigator.vibrate) {
                navigator.vibrate(30);
            }
            speakCurrent();
        }

        // Håndterer hvis man tapper/klikker direkte på en perle i SVG'en
        function jumpToNode(targetId) {
            let matches = new Array();
            for(let i = 0; i < playQueue.length; i++) {
                if(playQueue[i].target === targetId) matches.push(i);
            }
            if(matches.length > 0) {
                // Find den næste bøn for denne perle (f.eks. ved midterstykket), eller start forfra
                let nextIndex = undefined;
                for(let j = 0; j < matches.length; j++) {
                    if(matches[j] > currentIndex) {
                        nextIndex = matches[j];
                        break;
                    }
                }
                if(nextIndex === undefined) nextIndex = matches;
                
                currentIndex = nextIndex;
                updateUI();
                if(isPlaying) {
                    speakCurrent();
                } else {
                    document.getElementById('text-display').innerText = playQueue[currentIndex].text;
                }
            }
        }

        function speakCurrent() {
            synth.cancel(); 
            
            let utterance = new SpeechSynthesisUtterance(playQueue[currentIndex].text);
            utterance.lang = 'da-DK'; 
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }
            utterance.rate = 0.85; 
            utterance.pitch = 0.95; 
            
            utterance.onend = () => {
                if(isPlaying) playNext();
            };
            
            utterance.onerror = (e) => console.log('Speech error', e);
            synth.speak(utterance);
        }

        document.getElementById('btn-start').onclick = () => {
            if(currentIndex === -1) {
                synth.speak(new SpeechSynthesisUtterance(''));
                currentIndex = 0;
            } else if (!isPlaying) {
                // Hvis sat på pause og man trykker start igen, kan man lade den fortsætte
                // eller skifte manuelt frem. Vi fortsætter bare her.
            }
            
            isPlaying = true;
            updateUI();
            speakCurrent();
        };

        document.getElementById('btn-pause').onclick = () => {
            if(synth.paused) {
                synth.resume();
                isPlaying = true;
            } else if(synth.speaking) {
                synth.pause();
                isPlaying = false;
            } else {
                isPlaying = false;
            }
        };
    </script>
</body>
</html>
