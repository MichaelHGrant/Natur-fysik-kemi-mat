<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv Digital Rosenkrans</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a2e; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { margin-bottom: 5px; color: #e9e9eb; }
        #status { font-size: 14px; color: #8a8a93; margin-bottom: 30px; }
        
        #rosary-ui { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center;
            gap: 10px; 
            max-width: 350px; 
            margin: 0 auto 30px auto; 
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }
        
      .bead { 
            width: 16px; 
            height: 16px; 
            background-color: #a0a0a0; 
            border-radius: 50%; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }
      .bead.large { width: 24px; height: 24px; background-color: #cda434; }
      .bead.crucifix { width: 30px; height: 40px; border-radius: 4px; background-color: #8b4513; position: relative;}
      .bead.crucifix::after {
            content: ''; position: absolute; top: 10%; left: 45%; width: 10%; height: 80%; background: #ffd700;
        }
      .bead.crucifix::before {
            content: ''; position: absolute; top: 30%; left: 10%; width: 80%; height: 10%; background: #ffd700;
        }
      .bead.centerpiece { width: 30px; height: 30px; border-radius: 30%; background-color: #4682b4; }
        
      .bead.active { 
            transform: scale(1.6); 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.9); 
            background-color: #ffffff; 
        }

        #text-display { 
            min-height: 120px; 
            font-size: 18px;
            font-style: italic; 
            color: #d4e6f1; 
            padding: 20px; 
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 8px; 
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        #controls { margin-top: 30px; }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #4682b4; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            margin: 5px; 
            transition: background 0.3s;
        }
        button:hover { background: #5c9bc0; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Den Hellige Rosenkrans</h1>
    <div id="status">Bønneteksten og oplæsningen tilpasser sig automatisk dagens mysterier.</div>
    
    <div id="rosary-ui"></div>

    <div id="text-display">Indlæser talemotor... Vent venligst.</div>

    <div id="controls">
        <button id="btn-start" disabled>Start Rosenkrans</button>
        <button id="btn-pause" disabled>Pause / Genoptag</button>
    </div>

    <script>
        // Datamodel: Tekster og bønner
        const texts = {
            signumCrucis: "I Faderens og Sønnens og Helligåndens navn. Amen.",
            credo: "Jeg tror på Gud, den almægtige Fader, Himlens og jordens Skaber. Jeg tror på Jesus Kristus, Hans enbårne Søn, vor Herre, som er undfanget ved Helligånden og født af Jomfru Maria, har lidt under Pontius Pilatus, blev korsfæstet, døde og blev begravet, nedfór til Dødsriget, opstod på den tredje dag fra de døde, opfór til Himlen, sidder ved Gud, den almægtige Faders højre hånd, hvorfra han skal komme igen for at dømme de levende og de døde. Jeg tror på Helligånden, den hellige katolske Kirke, de helliges samfund, syndernes forladelse, kødets opstandelse og det evige liv. Amen.",
            paterNoster: "Fader vor, du som er i Himlen. Helliget vorde dit navn. Komme dit rige. Ske din vilje, som i Himlen så og på jorden. Giv os i dag vort daglige brød. Og forlad os vor skyld, som og vi forlader vore skyldnere. Og led os ikke i fristelse, men frels os fra det onde. Amen.",
            aveMaria: function(insert) { return "Hil dig, Maria, fuld af nåde, Herren er med dig. Velsignet er du iblandt kvinder og velsignet er dit livs frugt, Jesus, " + insert + ". Hellige Maria, Guds moder, bed for os syndere, nu og i vor dødstime. Amen."; },
            gloriaPatri: "Ære være Faderen og Sønnen og Helligånden, som det var i begyndelsen, så nu og altid og i al evighed. Amen.",
            fatima: "O min Jesus, tilgiv os vores synder, frels os fra Helvedes ild og led alle sjæle til Himlen, især dem, der har størst behov for Din barmhjertighed. Amen.",
            michael: "O Hellige Ærkeengel Mikael, herlighedens og de himmelske Hærskarers Fyrste, vogter af sjæle, sejrherre over de oprørske engle, tjener i den royale guddommeligheds bolig og du vor højt ophøjede leder som stråler glorværdigt og med overmenneskelig dyd, udfri os fra alt ondt, vi som med tillid vender os til dig og gør os i stand til igennem din nådefulde beskyttelse at kunne tjene Gud mere trofast for hver dag. Amen.",
            salveRegina: "Hil dig, Dronning, barmhjertighedens Moder, vort liv, vor fryd og vort håb, vær hilset. Til dig råber vi, Evas landflygtige børn. Til dig sukker vi sørgende og grædende i denne tårernes dal. Så vend da, du vor tilflugt, dine barmhjertigheds øjne ned til os...",
            memorare: "Kom i hu, nådefulde Jomfru Maria, at man aldrig har hørt, at den, der tager sin tilflugt til dig, påkalder din hjælp og anråber om din forbøn, er blevet forladt. Besjælet af en sådan tillid tager jeg min tilflugt til dig, Maria, jomfru over alle jomfruer og moder til Jesus Kristus! Til dig kommer jeg; for dig står jeg som en sukkende synder. Du, det evige Ords moder! Forsmå ikke mine ord, men hør mig nådigt og bønhør mig. Amen.",
            concluding: "O Gud, hvis enbårne Søn ved sit liv, sin død og sin opstandelse har erhvervet os det evige livs løn. Vi beder dig: Giv os, som mindes disse mysterier i den salige Jomfru Marias hellige rosenkrans, at vi må efterfølge det, de indeholder, og opnå det, de lover. Ved Kristus, vor Herre. Amen."
        };

        const introInserts = new Array("som forøge vor tro", "som styrke vort håb", "som opflamme vor kærlighed");

        const mysteriesList = {
            glaedesfulde: new Array(
                "som du undfangede ved Helligånden", 
                "som du bar ved dit besøg hos Elisabet", 
                "som du fødte i stalden i Betlehem", 
                "som du ofrede i templet", 
                "som du genfandt i templet"
            ),
            lysfyldte: new Array(
                "som blev døbt i Jordan", 
                "som forvandlede vand til vin i Kana", 
                "som forkyndte Guds rige", 
                "som blev forklaret på bjerget", 
                "som indstiftede Eukaristien"
            ),
            smertefulde: new Array(
                "som svedte blod for os", 
                "som blev hudstrøget for os", 
                "som blev kronet med torne for os", 
                "som bar det tunge kors for os", 
                "som blev korsfæstet for os"
            ),
            herlighedsfulde: new Array(
                "som opstod fra de døde", 
                "som opfor til Himlen", 
                "som nedsendte Helligånden", 
                "som optog dig i Himlen", 
                "som kronede dig i Himlen"
            )
        };

        // Algoritme til valg af mysterier baseret på dags dato
        function getTodaysMysteries() {
            const day = new Date().getDay(); 
            if (day === 1) return mysteriesList.glaedesfulde; // Mandag
            if (day === 6) return mysteriesList.glaedesfulde; // Lørdag
            if (day === 4) return mysteriesList.lysfyldte;    // Torsdag
            if (day === 2) return mysteriesList.smertefulde;  // Tirsdag
            if (day === 5) return mysteriesList.smertefulde;  // Fredag
            return mysteriesList.herlighedsfulde;             // Onsdag, Søndag
        }

        const currentMysteries = getTodaysMysteries();
        let playQueue = new Array();
        
        // FSM Køreplan: Her samles bønnerne sekventielt
        playQueue.push({ type: 'crucifix', text: texts.signumCrucis });
        playQueue.push({ type: 'crucifix', text: texts.credo });
        playQueue.push({ type: 'large', text: texts.paterNoster });
        
        for(let i=0; i<3; i++) {
            playQueue.push({ type: 'bead', text: texts.aveMaria(introInserts[i]) });
        }
        playQueue.push({ type: 'bead', text: texts.gloriaPatri });
        
        // Generer de 5 dekader med Fatima og Skt. Michael efter hver
        for(let dekade=0; dekade<5; dekade++) {
            playQueue.push({ type: 'centerpiece', text: "Vi mediterer over det " + (dekade+1) + ". mysterium." });
            playQueue.push({ type: 'large', text: texts.paterNoster });
            for(let i=0; i<10; i++) {
                playQueue.push({ type: 'bead', text: texts.aveMaria(currentMysteries[dekade]) });
            }
            playQueue.push({ type: 'bead', text: texts.gloriaPatri });
            playQueue.push({ type: 'bead', text: texts.fatima });
            playQueue.push({ type: 'bead', text: texts.michael }); // Skt. Michael tilføjet
        }
        
        // Afslutning med Memorare
        playQueue.push({ type: 'centerpiece', text: texts.salveRegina });
        playQueue.push({ type: 'centerpiece', text: texts.memorare }); // Memorare tilføjet
        playQueue.push({ type: 'centerpiece', text: texts.concluding });
        playQueue.push({ type: 'crucifix', text: texts.signumCrucis });

        // Visuel UI Generering af perlerne
        const uiContainer = document.getElementById('rosary-ui');
        const nodes = new Array();
        
        for(let idx = 0; idx < playQueue.length; idx++) {
            const item = playQueue[idx];
            const div = document.createElement('div');
            div.className = "bead " + item.type;
            div.title = "Klik for at hoppe til bøn " + (idx + 1);
            div.onclick = () => jumpTo(idx);
            uiContainer.appendChild(div);
            nodes.push(div);
        }

        // Styring af tilstand
        let currentIndex = -1;
        let isPlaying = false;
        let synth = window.speechSynthesis;
        let selectedVoice = null;

        // Funktion til at sikre stemmerne er klar (Chrome/Safari workaround)
        function initVoices() {
            let voices = synth.getVoices();
            if (voices.length > 0) {
                // Sikker logik til at finde den danske stemme uden at bruge problematiske tegn
                for(let i = 0; i < voices.length; i++) {
                    if(voices[i].lang === 'da-DK') {
                        selectedVoice = voices[i];
                        break;
                    }
                    if(voices[i].lang === 'da_DK') {
                        selectedVoice = voices[i];
                        break;
                    }
                }
                
                // Aktiverer knapperne, når systemet er klar
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-pause').disabled = false;
                document.getElementById('text-display').innerText = "Tryk på 'Start Rosenkrans' for at begynde meditationen...";
            }
        }

        // Lytter efter når browseren har hentet sine stemmer
        if (synth.onvoiceschanged!== undefined) {
            synth.onvoiceschanged = initVoices;
        }
        initVoices(); 

        // Sikkerhedsnet hvis browseren er for langsom: Låser op efter 3 sekunder alligevel
        setTimeout(() => {
            if (document.getElementById('btn-start').disabled) {
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-pause').disabled = false;
                document.getElementById('text-display').innerText = "Tryk på 'Start Rosenkrans' for at begynde. (Standardstemme benyttes).";
            }
        }, 3000);

        function updateUI() {
            for(let i=0; i<nodes.length; i++) {
                nodes[i].classList.remove('active');
            }
            if(currentIndex >= 0 && currentIndex < nodes.length) {
                nodes[currentIndex].classList.add('active');
                document.getElementById('text-display').innerText = playQueue[currentIndex].text;
            }
        }

        function playNext() {
            if(currentIndex >= playQueue.length - 1) {
                isPlaying = false;
                document.getElementById('text-display').innerText = "Rosenkransen er fuldført. Fred være med dig.";
                return;
            }
            currentIndex++;
            updateUI();
            
            // Haptisk feedback til mobile enheder
            if(navigator.vibrate) {
                navigator.vibrate(30);
            }

            speakCurrent();
        }

        function jumpTo(index) {
            currentIndex = index;
            updateUI();
            if(isPlaying) {
                speakCurrent();
            } else {
                document.getElementById('text-display').innerText = playQueue[currentIndex].text;
            }
        }

        function speakCurrent() {
            synth.cancel(); // Stop nuværende tale
            
            let utterance = new SpeechSynthesisUtterance(playQueue[currentIndex].text);
            utterance.lang = 'da-DK'; 
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }
            utterance.rate = 0.85; // Sænker hastigheden til meditativt tempo
            utterance.pitch = 0.95; 
            
            utterance.onend = () => {
                if(isPlaying) playNext();
            };
            
            utterance.onerror = (e) => console.log('Speech error', e);
            
            synth.speak(utterance);
        }

        document.getElementById('btn-start').onclick = () => {
            // Hvis det er allerførste gang, aktiverer vi lydenheden korrekt med en tom streng
            if(currentIndex === -1) {
                synth.speak(new SpeechSynthesisUtterance(''));
                currentIndex = 0;
            }
            
            isPlaying = true;
            updateUI();
            speakCurrent();
        };

        document.getElementById('btn-pause').onclick = () => {
            if(synth.paused) {
                synth.resume();
                isPlaying = true;
            } else if(synth.speaking) {
                synth.pause();
                isPlaying = false;
            } else {
                isPlaying = false;
            }
        };
    </script>
</body>
</html>
